<style>

:root {

  --primary-color: #8b5cf6;
  --secondary-color: #d3c0f9;
  --accent-color: #d8b4fe;

  /* PALETA REAL DEL ICONO */
  --green-dark: #2f6f5f;
  --green-mid: #5aa892;
  --green-base: #a5dcaf;

  --card-shadow: rgba(0,0,0,0.1);
  --hover-shadow: rgba(0,0,0,0.2);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Roboto', sans-serif;
}

body {
  background-color: var(--secondary-color);
  color: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 1rem;
}

/* HEADER */

header {
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
  gap: 1rem;
  text-align: center;
  margin-bottom: 1.5rem;
}

.header-icon img {
  width: 80px;
  border-radius: 12px;
}

.title-container {
  display: flex;
  flex-direction: column;
  align-items: center;
}

header h1 {
  font-size: 2rem;
  color: var(--green-dark);
  font-weight: 700;
}

.hospital {
  font-size: 1rem;
  color: var(--green-mid);
  font-weight: 600;
}

.warning {
  font-size: 0.8rem;
  font-weight: 500;
  color: #444;
  border: 1px solid #ccc;
  padding: 2px 6px;
  border-radius: 4px;
  background: #f8f8f8;
  margin: 0.5rem 0;
}

.autor {
  font-size: 1rem;
  color: var(--green-base);
  font-weight: 600;
}

/* SEARCH */

.search-container {
  width: 100%;
  max-width: 600px;
  margin-bottom: 2rem;
}

#searchInput {
  width: 100%;
  padding: 12px 20px;
  font-size: 1rem;
  border: 2px solid var(--green-base);
  border-radius: 25px;
  outline: none;
  box-shadow: 0 2px 8px var(--card-shadow);
}

/* SECTIONS */

.section-wrapper {
  width: 100%;
  max-width: 1200px;
}

.section-title {
  font-size: 1.3rem;
  color: #4c1d95;
  margin: 1.5rem 0 0.5rem 0;
  font-weight: 600;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.5rem;
}

/* CARDS */

.card {
  background-color: #fff;
  border-radius: 12px;
  padding: 1rem;
  box-shadow: 0 4px 12px var(--card-shadow);
  text-align: center;
}

.icon-container {
  width: 100%;
  height: 150px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 0.8rem;
  background-color: transparent;
}

/* COLORES MODULOS */

.icon-sepsis { background-color: #f3e8ff; }
.icon-ictus { background-color: #fce7f3; }
.icon-polimedicados { background-color: #fff4e5; }
.icon-lectura { background-color: #e0f2fe; }
.icon-guiaempirica { background-color: #d1f7e0; }
.icon-funcionrenal { background-color: #e0fafb; }
.icon-antidoto { background-color: #e6f7ff; }
.icon-infucalc { background-color: #fde2e4; }

.card img {
  max-width: 80%;
  max-height: 80%;
}

.card h2 {
  font-size: 1.1rem;
  color: #4c1d95;
  margin-bottom: 0.5rem;
}

.card a {
  display: inline-block;
  margin-top: 0.5rem;
  padding: 0.4rem 0.8rem;
  background-color: var(--green-mid);
  color: white;
  border-radius: 6px;
  text-decoration: none;
}

footer {
  margin-top: 2rem;
  color: #777;
  font-size: 0.85rem;
}

@media (max-width:768px){
header{flex-direction:column;}
}

</style>
</head>
