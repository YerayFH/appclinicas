<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APP GUÍAS CLÍNICAS</title>

<!-- Fuente seria y profesional -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Iconos -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root {
    --primary-color: #8b5cf6;  /* Morado principal */
    --secondary-color: #ede9fe; /* Morado pastel de fondo */
    --card-bg: #ffffff;
    --card-shadow: rgba(0,0,0,0.1);
    --hover-shadow: rgba(0,0,0,0.2);
    --accent-color: #d8b4fe; /* Para resaltar textos secundarios */
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }

body {
    background-color: var(--secondary-color);
    color: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 1rem;
}

header {
    text-align: center;
    margin-bottom: 2rem;
    padding: 1rem 2rem;
}

header .hospital {
    font-size: 1rem;
    color: #4c1d95;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    font-weight: 500;
}

header h1 {
    font-size: 2.5rem;
    color: var(--primary-color);
    margin: 0.5rem 0;
    font-weight: 700;
}

header .autor {
    font-size: 1rem;
    color: var(--accent-color);
    margin-top: 0.3rem;
    font-weight: 500;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1.5rem;
    width: 100%;
    max-width: 1200px;
}

.card {
    background-color: var(--card-bg);
    border-radius: 12px;
    padding: 1rem;
    box-shadow: 0 4px 12px var(--card-shadow);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    text-align: center;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px var(--hover-shadow);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 0.8rem;
}

.card h2 {
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
    color: #4c1d95;
}

.card a {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.4rem 0.8rem;
    background-color: var(--primary-color);
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-weight: 500;
    transition: background-color 0.2s ease;
}

.card a:hover {
    background-color: #6d28d9;
}

footer {
    margin-top: 2rem;
    color: #777;
    font-size: 0.85rem;
}

@media (max-width: 600px) {
    header h1 { font-size: 2rem; }
    header .hospital, header .autor { font-size: 0.85rem; }
    .card img { height: 120px; }
}
</style>
</head>

<body>

<header>
    <div class="hospital"><i class="fas fa-hospital"></i> FARMACIA HOSPITALARIA. HOSPITAL UNIVERSITARIO PUERTO REAL</div>
    <h1>APP GUÍAS CLÍNICAS</h1>
    <div class="autor">Autor: Yeray Reyes de la Mata. <br>Contacto: ydelamata01@gmail.com</div>
</header>

<div class="grid">
    <!-- Tarjeta App 1 -->
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png" alt="Sepsis">
        <h2>Sepsis: diagnóstico y manejo terapéutico</h2>
        <a href="sepsis/">Abrir App</a>
    </div>

    <!-- Tarjeta App 2 -->
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2965/2965567.png" alt="Ictus">
        <h2>Ictus isquémico agudo: motor interactivo de manejo terapéutico</h2>
        <a href="ictus/">Abrir App</a>
    </div>

    <!-- Más tarjetas se pueden agregar aquí -->
</div>

<footer>
    &copy; 2026 Mi Hub Clínico
</footer>

</body>
</html>
