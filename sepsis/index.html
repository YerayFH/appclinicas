<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sepsis Decision Support</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
a{color:#2563eb}
#top-banner{background:#0f2d5e;color:#fff;text-align:center;padding:10px 16px;border-bottom:3px solid #f0c040}
#top-banner h1{font-size:clamp(12px,3.5vw,16px);font-weight:800;letter-spacing:1px;text-transform:uppercase}
#hdr{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr-title{font-size:clamp(14px,4vw,20px);font-weight:700}
#hdr-sub{font-size:11px;color:#93c5fd;margin-top:2px}
#step-counter{color:#93c5fd;font-size:13px;white-space:nowrap}
#prog{background:#dbeafe;padding:8px 12px;display:flex;align-items:flex-start;gap:2px;overflow-x:auto}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.pd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#cbd5e1;color:#64748b}
.pd.act{background:#2563eb;color:#fff}.pd.dn{background:#16a34a;color:#fff}
.pl{font-size:10px;color:#64748b;white-space:nowrap}.pl.act{color:#2563eb;font-weight:700}
.pc{width:12px;height:2px;background:#cbd5e1;margin-top:13px;flex-shrink:0}
#main{flex:1;width:100%;max-width:760px;margin:0 auto;padding:0 4px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:22px;margin:16px 0}
.ct{font-size:17px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.cs{font-size:12px;color:#64748b;margin-bottom:16px}
button{cursor:pointer;border:none;font-family:inherit}
.btn{border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;color:#fff;background:#2563eb;margin:4px 4px 4px 0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;color:#2563eb;border:2px solid #2563eb;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;margin:4px 4px 4px 0}
.btn-g{background:#e2e8f0;color:#1e293b}
.btn-s{background:#16a34a}.btn-d{background:#dc2626}.btn-w{background:#d97706}
.bgrp{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.lbl{display:block;font-size:13px;font-weight:600;color:#1e293b;margin:12px 0 4px}
input[type=number],select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #cbd5e1;font-size:14px;background:#fff;outline:none;font-family:inherit}
input[type=number]:focus,select:focus{border-color:#2563eb}
.wmsg{font-size:11px;color:#dc2626;margin-top:2px}
.r2c{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.sbox{border-radius:10px;padding:14px;text-align:center}
.snum{font-size:36px;font-weight:800}.slbl{font-size:12px;font-weight:600;margin-top:2px}
.al{border-radius:10px;padding:14px 16px;margin-top:10px;font-size:13px;line-height:1.75;word-break:break-word}
.al b{font-size:14px;display:block;margin-bottom:4px}
.al-r{background:#fef2f2;border:1.5px solid #fca5a5}.al-r b{color:#dc2626}
.al-y{background:#fffbeb;border:1.5px solid #fcd34d}.al-y b{color:#d97706}
.al-g{background:#f0fdf4;border:1.5px solid #86efac}.al-g b{color:#16a34a}
.al-b{background:#eff6ff;border:1.5px solid #93c5fd}.al-b b{color:#2563eb}
.al-p{background:#f5f3ff;border:1.5px solid #c4b5fd}.al-p b{color:#7c3aed}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tag{border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600}
.tag-p{background:#fef2f2;border:1.5px solid #fca5a5;color:#dc2626}
.tag-n{background:#f0fdf4;border:1.5px solid #86efac;color:#16a34a}
.dv{height:1px;background:#cbd5e1;margin:14px 0}
.sr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.sr span{color:#64748b}
.mc{border-radius:10px;margin-bottom:10px;overflow:hidden}
.mh{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;user-select:none}
.mht{font-weight:700;color:#1a3a5c;font-size:14px;flex:1;min-width:0;word-break:break-word}
.mar{color:#64748b;flex-shrink:0}
.mb{padding:14px 16px;font-size:13px;line-height:1.85;word-break:break-word;overflow-wrap:break-word}
.r2row{display:flex;flex-wrap:wrap;gap:2px 8px;margin-bottom:7px}
.r2l{color:#64748b}.r2v{font-weight:700;word-break:break-word}
.dxbox{border-radius:12px;padding:20px;text-align:center;margin-top:12px}
.dxtit{font-size:12px;color:#64748b;margin-bottom:4px}
.dxname{font-size:clamp(18px,5vw,26px);font-weight:800}
.dxsub{font-size:13px;margin-top:6px}
#footer{padding:14px 20px;border-top:1px solid #cbd5e1;background:#fff;font-size:12px;color:#64748b;line-height:1.8}
.hidden{display:none!important}
#welcome{display:flex;justify-content:center;padding:24px}
#welcome .card{max-width:560px;text-align:center}
@media(max-width:480px){.card{padding:16px}.mb{padding:12px}.snum{font-size:28px}.dxname{font-size:18px}}
</style>
</head>
<body>
<div id="top-banner"><h1>🏛 Farmacia Hospitalaria · Hospital Universitario Puerto Real</h1></div>
<div id="hdr">
  <div><div id="hdr-title">🏥 SEPSIS DECISION SUPPORT</div><div id="hdr-sub">SSC 2021 · NICE 2025 · J-SSCG 2024 — Clinical Decision Aid</div></div>
  <div id="step-counter"></div>
</div>
<div id="prog" class="hidden"></div>
<div id="main"></div>
<div id="footer"><strong style="color:#1e293b">Autor:</strong> Yeray Reyes de la Mata<br><strong style="color:#1e293b">Contacto:</strong> <a href="mailto:ydelamata01@gmail.com">ydelamata01@gmail.com</a></div>

<script>
const STEPS=["Sospecha","Lactato","NEWS/SIRS","qSOFA","SOFA","Clasificación","Manejo"];
let step=0,data={};

function $(id){return document.getElementById(id);}
function mk(tag,props){
  const e=document.createElement(tag);
  if(props) for(const[k,v]of Object.entries(props)){
    if(k==='cls')e.className=v;
    else if(k==='text')e.textContent=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='style')e.style.cssText=v;
    else e.setAttribute(k,v);
  }
  return e;
}
function ap(p,...k){k.forEach(c=>c&&p.appendChild(c));return p;}
function div(cls){const d=document.createElement('div');if(cls)d.className=cls;return d;}
function divider(){return div('dv');}

function btn(label,cls,onclick){
  const b=mk('button',{cls:'btn '+(cls||''),text:label});
  b.onclick=onclick;return b;
}
function numInp(label,initVal,min,max,step_,unit,warnFn){
  const wrap=div('');
  const lbl=mk('label',{cls:'lbl',text:unit?label+' ('+unit+')':label});
  const inp=mk('input',{type:'number',min,max,step:step_||'any'});
  inp.value=initVal;
  const wm=div('wmsg hidden');
  inp.addEventListener('input',()=>{
    const w=warnFn?warnFn(Number(inp.value)):null;
    wm.textContent=w||'';w?wm.classList.remove('hidden'):wm.classList.add('hidden');
  });
  inp.addEventListener('blur',()=>{const n=clamp(Number(inp.value),min,max);inp.value=n;});
  ap(wrap,lbl,inp,wm);return{wrap,inp};
}
function selInp(label,options,initVal){
  const wrap=div('');
  const lbl=mk('label',{cls:'lbl',text:label});
  const sel=mk('select');
  options.forEach(([v,t])=>{const o=mk('option',{value:v,text:t});if(v===initVal)o.selected=true;sel.appendChild(o);});
  ap(wrap,lbl,sel);return{wrap,sel};
}
function alert_(color,title,bodyHTML){
  const d=div('al al-'+color);
  if(title){const b=mk('b',{text:title});d.appendChild(b);}
  const p=document.createElement('p');p.innerHTML=bodyHTML||'';d.appendChild(p);
  return d;
}
function scoreBox(score,denom,pos,posLbl,negLbl){
  const d=div('sbox');d.style.background=pos?'#fef2f2':'#f0fdf4';
  const num=mk('div',{cls:'snum',text:String(score)});
  if(denom){const sp=mk('span',{style:'font-size:18px',text:'/'+denom});num.appendChild(sp);}
  num.style.color=pos?'#dc2626':'#16a34a';
  const lbl=mk('div',{cls:'slbl',text:pos?posLbl:negLbl});lbl.style.color=pos?'#dc2626':'#16a34a';
  ap(d,num,lbl);return d;
}
function r2row(label,val){
  const d=div('r2row');
  ap(d,mk('span',{cls:'r2l',text:label}),mk('strong',{cls:'r2v',text:val}));
  return d;
}
function clamp(v,mn,mx){return Math.min(mx,Math.max(mn,isNaN(Number(v))?mn:Number(v)));}
function save(obj){Object.assign(data,obj);}
function go(s){step=s;render();window.scrollTo(0,0);}

// ── Scales ────────────────────────────────────────────────────────
function calcNEWS(d){
  let s=0;
  const{spo2,fr,tas,fc,temp,conc,o2sup}=d;
  if(spo2<=91)s+=3;else if(spo2<=93)s+=2;else if(spo2<=95)s+=1;
  if(fr<=8)s+=3;else if(fr<=11)s+=1;else if(fr<=20)s+=0;else if(fr<=24)s+=2;else s+=3;
  if(tas<=90)s+=3;else if(tas<=100)s+=2;else if(tas<=110)s+=1;else if(tas<=219)s+=0;else s+=3;
  if(fc<=40)s+=3;else if(fc<=50)s+=1;else if(fc<=90)s+=0;else if(fc<=110)s+=1;else if(fc<=130)s+=2;else s+=3;
  if(temp<=35)s+=3;else if(temp<=36)s+=1;else if(temp<=38)s+=0;else if(temp<=39)s+=1;else s+=2;
  s+=conc==='Alerta'?0:3;s+=o2sup?2:0;return s;
}
function calcSIRS(d){
  return((d.temp>38||d.temp<36)?1:0)+(d.fc>90?1:0)+(d.fr>20?1:0)+((d.leucos>12||d.leucos<4)?1:0);
}
function sofaBD(d){
  const{pf,pla,bili,cv,pam,gcs,cr,di}=d;
  let res=0,plq=0,bl=0,cvs=0,neu=0,ren=0;
  if(pf<=100)res=4;else if(pf<=200)res=3;else if(pf<=300)res=2;else if(pf<=400)res=1;
  if(pla<20)plq=4;else if(pla<50)plq=3;else if(pla<100)plq=2;else if(pla<150)plq=1;
  if(bili>=12)bl=4;else if(bili>=6)bl=3;else if(bili>=2)bl=2;else if(bili>=1.2)bl=1;
  if(cv==='dopa15'||cv==='epi'||cv==='nrA')cvs=4;
  else if(cv==='dopa510'||cv==='nrB')cvs=3;
  else if(cv==='dopa5'||cv==='dobu')cvs=2;
  else if(pam<70)cvs=1;
  if(gcs<6)neu=4;else if(gcs<10)neu=3;else if(gcs<13)neu=2;else if(gcs<15)neu=1;
  if(cr>=5||di<200)ren=4;
  else if((cr>=3.5&&cr<5)||(di>=200&&di<500))ren=3;
  else if(cr>=2&&cr<3.5)ren=2;
  else if(cr>=1.2&&cr<2)ren=1;
  return{res,plq,bl,cvs,neu,ren};
}
function calcSOFA(d){const b=sofaBD(d);return b.res+b.plq+b.bl+b.cvs+b.neu+b.ren;}

// ── Chrome ────────────────────────────────────────────────────────
function updateChrome(){
  const sc=$('step-counter'),prog=$('prog');
  if(step===0){sc.textContent='';prog.classList.add('hidden');return;}
  sc.textContent='Paso '+step+' / '+STEPS.length;
  prog.classList.remove('hidden');prog.innerHTML='';
  STEPS.forEach((lbl,i)=>{
    const done=step>i+1,active=step===i+1;
    const dot=mk('div',{cls:'pd'+(done?' dn':active?' act':''),text:done?'✓':String(i+1)});
    const label=mk('span',{cls:'pl'+(active?' act':''),text:lbl});
    const item=div('pi');ap(item,dot,label);prog.appendChild(item);
    if(i<STEPS.length-1){const conn=div('pc');prog.appendChild(conn);}
  });
}
function render(){
  updateChrome();
  const main=$('main');main.innerHTML='';
  if(step===0)main.appendChild(renderWelcome());
  else if(step===1)main.appendChild(renderS1());
  else if(step===2)main.appendChild(renderS2());
  else if(step===3)main.appendChild(renderS3());
  else if(step===4)main.appendChild(renderS4());
  else if(step===5)main.appendChild(renderS5());
  else if(step===6)main.appendChild(renderS6());
  else if(step===7)main.appendChild(renderS7());
}

// ── S0: Welcome ───────────────────────────────────────────────────
function renderWelcome(){
  const w=div('');w.id='welcome';
  const c=div('card');
  c.innerHTML=`<div style="font-size:52px;margin-bottom:12px">🩺</div>
    <h2 style="font-size:22px;font-weight:800;color:#1a3a5c;margin-bottom:6px">Sistema de Soporte Clínico</h2>
    <p style="font-size:15px;color:#64748b;margin-bottom:8px">Sepsis y Shock Séptico</p>
    <div style="background:#dbeafe;border-radius:8px;padding:8px 14px;font-size:13px;color:#2563eb;display:inline-block;margin-bottom:18px">SSC 2021 · NICE 2025 · J-SSCG 2024</div>
    <p style="font-size:13px;color:#64748b;line-height:1.8;margin-bottom:20px">
      Algoritmo clínico paso a paso: cribado → lactato → escalas → clasificación → manejo.<br>
      Cálculo automático de NEWS · SIRS · qSOFA · SOFA.<br>
      Lógica diagnóstica basada en Sepsis-3 y guías vigentes.<br><br>
      <strong style="color:#dc2626">⚠ Solo apoyo clínico. No reemplaza el juicio médico.</strong>
    </p>`;
  ap(c,btn('Iniciar Evaluación →','btn-s',()=>go(1)));
  ap(w,c);return w;
}

// ── S1: Sospecha ──────────────────────────────────────────────────
function renderS1(){
  const c=div('card');
  ap(c,mk('div',{cls:'ct',text:'🔍 Step 1 — Sospecha de Infección'}),
       mk('div',{cls:'cs',text:'Activación de protocolo de cribado multimodal (Nodo 0)'}));

  c.appendChild(alert_('r','⛔ RESTRICCIÓN CRÍTICA (SSC 2021)',
    '<strong>PROHIBIDO</strong> usar qSOFA como herramienta <em>única</em> de cribado.<br>Sensibilidad del qSOFA para detección precoz: <strong>~24%</strong>. Úselo exclusivamente como predictor de mortalidad.'));

  c.appendChild(alert_('b','✅ Herramientas de elección',
    '• <strong>NEWS / MEWS</strong> — alta sensibilidad para deterioro clínico precoz (NICE 2025)<br>• <strong>SIRS</strong> — herramienta diagnóstica inicial (SSC 2021)<br>• Puntuación positiva en NEWS/SIRS bajo sospecha activa → <strong>activación inmediata del protocolo de sepsis</strong>'));

  c.appendChild(mk('label',{cls:'lbl',text:'¿Existe sospecha clínica de infección?'}));
  const grp=div('bgrp');
  const bSi=btn('Sí',data.sospecha==='Sí'?'btn-s':'btn-g',()=>{save({sospecha:'Sí'});render();});
  const bNo=btn('No',data.sospecha==='No'?'btn-d':'btn-g',()=>{save({sospecha:'No'});render();});
  ap(grp,bSi,bNo);c.appendChild(grp);

  if(data.sospecha==='No')
    c.appendChild(alert_('y','Sin sospecha de infección activa','Considere diagnósticos alternativos no infecciosos. Reevalúe ante cualquier cambio clínico.'));
  if(data.sospecha==='Sí')
    c.appendChild(alert_('g','✓ Protocolo activado','Proceder a medición de lactato sérico de forma inmediata. La confirmación bioquímica es el paso imperativo para la estratificación del riesgo.'));

  const nxt=btn('Siguiente →','btn-s',()=>go(2));
  if(!data.sospecha)nxt.disabled=true;
  const nav=div('bgrp');nav.style.marginTop='16px';ap(nav,nxt);c.appendChild(nav);
  return c;
}

// ── S2: Lactato ───────────────────────────────────────────────────
function renderS2(){
  const initLac=data.lactato!==undefined?data.lactato:1.0;
  const c=div('card');
  ap(c,mk('div',{cls:'ct',text:'🩸 Step 2 — Lactato Sérico'}),
       mk('div',{cls:'cs',text:'Marcador de perfusión y estratificación de riesgo (SSC 2021 · NICE 2025 · J-SSCG 2024)'}));

  c.appendChild(alert_('b','Orden clínica',
    'Mida el lactato en <strong>todo</strong> paciente con sospecha de sepsis.<br>'
    +'El lactato es un <strong>modificador de probabilidad y guía de resucitación</strong>, no solo un marcador diagnóstico.<br>'
    +'Rango de corte: <strong>1.6–2.5 mmol/L</strong> · LR+ elevado: 4.75 · LR− normal: 0.29<br>'
    +'Un lactato normal <strong>no descarta sepsis</strong>: mantener vigilancia clínica.'));

  const{wrap:wLac,inp:iLac}=numInp('Lactato sérico',initLac,0,30,0.1,'mmol/L',v=>v>20?'Valor extremo — verificar muestra':null);
  c.appendChild(wLac);
  c.appendChild(divider());

  const lacEl=div('');c.appendChild(lacEl);
  const recEl=div('');c.appendChild(recEl);

  const nav=div('bgrp');nav.style.marginTop='16px';
  ap(nav,btn('← Anterior','btn-o',()=>go(1)),btn('Siguiente →','btn-s',submitS2));
  c.appendChild(nav);

  function update(){
    const v=clamp(iLac.value,0,30);
    const bg=v>4?'#fef2f2':v>2?'#fffbeb':'#f0fdf4';
    const bd=v>4?'#fca5a5':v>2?'#fcd34d':'#86efac';
    const col=v>4?'#dc2626':v>2?'#d97706':'#16a34a';
    const msg=v>4?'🔴 Lactato >4 mmol/L — Hipoperfusión grave · Mortalidad elevada · Resucitación URGENTE':
      v>2?'🟡 Lactato 2–4 mmol/L — Hipoperfusión oculta · Iniciar resucitación agresiva':'🟢 Lactato ≤2 mmol/L — Sin hipoperfusión evidente (mantener vigilancia)';
    lacEl.innerHTML='';
    const box=div('sbox');box.style.cssText=`background:${bg};border:1.5px solid ${bd}`;
    const num=mk('div',{cls:'snum',html:Number(v).toFixed(1)+' <span style="font-size:18px">mmol/L</span>'});num.style.color=col;
    const lbl=mk('div',{cls:'slbl',text:msg});lbl.style.color=col;
    ap(box,num,lbl);
    if(v>2){box.appendChild(mk('div',{style:'font-size:12px;color:#64748b;margin-top:6px',text:'Meta terapéutica: reducción ≥10% cada 2h · Normalización como guía de resucitación (SSC 2021)'}));}
    lacEl.appendChild(box);

    recEl.innerHTML='';
    if(v>4){
      recEl.appendChild(alert_('r','Shock séptico probable',
        '• Probabilidad de sepsis <strong>muy elevada</strong> (LR+ 4.75)<br>'
        +'• Activar Bundle de las 3 horas de forma inmediata<br>'
        +'• Iniciar resucitación con cristaloides balanceados<br>'
        +'• Considerar shock séptico hasta demostración contraria'));
    } else if(v>2){
      recEl.appendChild(alert_('y','Hipoperfusión oculta detectada',
        '• Probabilidad de sepsis incrementada<br>'
        +'• Activar Bundle de las 3 horas · Iniciar cristaloides balanceados<br>'
        +'• Continuar evaluación con escalas NEWS/SIRS, qSOFA y SOFA'));
    } else {
      recEl.appendChild(alert_('g','Lactato dentro del rango normal',
        '• Probabilidad reducida pero no descartada<br>'
        +'• Continuar evaluación clínica con NEWS/SIRS/SOFA<br>'
        +'• Repetir lactato si deterioro clínico'));
    }
  }
  function submitS2(){save({lactato:clamp(iLac.value,0,30),lacPos:Number(iLac.value)>2});go(3);}
  iLac.addEventListener('input',update);
  update();
  return c;
}

// ── S3: NEWS / SIRS ───────────────────────────────────────────────
function renderS3(){
  const nv=data.newsVars||{spo2:97,fr:16,tas:120,fc:80,temp:37.0,conc:'Alerta',o2sup:false};
  const initLeuc=data.sirsLeuc!==undefined?data.sirsLeuc:8;
  const c=div('card');
  ap(c,mk('div',{cls:'ct',text:'📊 Step 3 — NEWS · SIRS'}),
       mk('div',{cls:'cs',text:'Tamizaje multimodal de alta sensibilidad — NICE 2025 · SSC 2021 (Nodo 1)'}));

  c.appendChild(alert_('b','Interpretación',
    '• <strong>NEWS ≥5 o SIRS ≥2</strong> → tamizaje positivo: alta sensibilidad para sepsis<br>'
    +'• Resultado positivo: proceder a qSOFA y SOFA<br>'
    +'• Resultado negativo: vigilancia y reevaluación si cambia la clínica'));

  const{wrap:wSpo2,inp:iSpo2}=numInp('SpO₂',nv.spo2,50,100,1,'%');
  const{wrap:wFr,inp:iFr}=numInp('Frec. Resp.',nv.fr,1,70,1,'/min');
  const{wrap:wTas,inp:iTas}=numInp('TAS',nv.tas,40,270,1,'mmHg');
  const{wrap:wFc,inp:iFc}=numInp('FC',nv.fc,20,220,1,'/min');
  const{wrap:wTemp,inp:iTemp}=numInp('Temperatura',nv.temp,30,43,0.1,'°C');
  const{wrap:wConc,sel:sConc}=selInp('Conciencia',[['Alerta','Alerta (A)'],['Alterada','Alterada (V/P/U)']],nv.conc);
  const{wrap:wO2,sel:sO2}=selInp('O₂ sup.',[['no','No'],['si','Sí (+2 pts)']],nv.o2sup?'si':'no');

function renderS6(){
  const initPam=data.pamActual||65;

       mk('div',{cls:'cs',text:'Criterios Sepsis-3 / SSC 2021 · Nodos 5-6'}));

    +'• Shock séptico: emergencia · Traslado UCI en &lt;6h · Escalamiento terapéutico máximo'));

  const tags=div('tags');
  [[`ΔSOFA ≥2`,data.sofaDelta>=2],[`Lactato >2 (${Number(data.lactato||0).toFixed(1)})`,data.lacPos],
   ['NEWS ≥5',data.newsPos],['qSOFA ≥2',data.qsofaPos]].forEach(([lbl,pos])=>{
    tags.appendChild(mk('div',{cls:'tag '+(pos?'tag-p':'tag-n'),text:(pos?'✓':'✗')+' '+lbl}));
  });
  c.appendChild(tags);

  const{wrap:wPam,inp:iPam}=numInp('PAM actual',initPam,20,200,1,'mmHg',v=>Number(v)<65?'PAM <65 mmHg — umbral crítico de perfusión':null);
  c.appendChild(wPam);
  c.appendChild(mk('label',{cls:'lbl',text:'Respuesta a carga de cristaloides balanceados (30 mL/kg)'}));
  const rfGrp=div('bgrp');let rfSel=data.respFluid||'';
  const rfOpts=['Adecuada (PAM ≥65)','Refractaria (PAM <65 persiste)','No aplica / No administrada'];
  const rfBtns=rfOpts.map(v=>{
    const b=btn(v,rfSel===v?'btn-s':'btn-g',()=>{rfSel=v;rfBtns.forEach((bb,i)=>bb.className='btn '+(rfOpts[i]===v?'btn-s':'btn-g'));dxUpdate();});
    rfGrp.appendChild(b);return b;
  });
  c.appendChild(rfGrp);
  c.appendChild(mk('label',{cls:'lbl',text:'¿Requiere vasopresores para mantener PAM ≥65 mmHg?'}));
  const vpGrp=div('bgrp');let vpSel=data.vasoPresores!==undefined?data.vasoPresores:null;
  const vpBtns=[['Sí',true],['No',false]].map(([lbl,v])=>{
    const active=vpSel===v;
    const b=btn(lbl,active?(v?'btn-d':'btn-s'):'btn-g',()=>{vpSel=v;vpBtns.forEach((bb,i)=>{const vv=[true,false][i];bb.className='btn '+(vpSel===vv?(vv?'btn-d':'btn-s'):'btn-g');});dxUpdate();});
    vpGrp.appendChild(b);return b;
  });
  c.appendChild(vpGrp);c.appendChild(divider());
  const dxEl=div('');c.appendChild(dxEl);
  const nxtBtn=btn('Ver Plan Terapéutico →','btn-s',submitS6);
  const nav=div('bgrp');nav.style.marginTop='16px';ap(nav,btn('← Anterior','btn-o',()=>go(5)),nxtBtn);c.appendChild(nav);

  function getDx(){
    const sep=data.sofaDelta>=2,shock=sep&&vpSel===true&&data.lacPos;
    let dx,bg,bd,col;
    if(shock){dx='SHOCK SÉPTICO';bg='#fef2f2';bd='#fca5a5';col='#dc2626';}
    else if(sep){dx='SEPSIS';bg='#fffbeb';bd='#fcd34d';col='#d97706';}
    else if(data.newsPos||data.qsofaPos||data.lacPos){dx='SOSPECHA DE SEPSIS';bg='#fffbeb';bd='#fcd34d';col='#d97706';}
    else{dx='SEPSIS NO CONFIRMADA';bg='#f0fdf4';bd='#86efac';col='#16a34a';}
    return{dx,bg,bd,col,sep,shock};
  }
  function dxUpdate(){
    const{dx,bg,bd,col,sep,shock}=getDx();
    dxEl.innerHTML='';
    const box=div('dxbox');box.style.cssText=`background:${bg};border:2px solid ${bd}`;
    box.appendChild(mk('div',{cls:'dxtit',text:'DIAGNÓSTICO (Sepsis-3 / SSC 2021)'}));
    const name=mk('div',{cls:'dxname',text:dx});name.style.color=col;box.appendChild(name);
    const sub=shock?'Escalamiento terapéutico máximo · Bundle 3h · UCI en <6h':sep&&!shock?'Activar manejo terapéutico · Evaluar UCI':'';
    if(sub){const s=mk('div',{cls:'dxsub',html:sub});s.style.color=col;box.appendChild(s);}
    dxEl.appendChild(box);

  }
  iPam.addEventListener('input',dxUpdate);dxUpdate();
  return c;

  function submitS6(){
    if(!rfSel)return;
    const pam=clamp(iPam.value,20,200);
    const{dx,sep,shock}=getDx();
    const dxCol=shock?'red':sep?'yellow':'green';
    save({pamActual:pam,vasoPresores:vpSel,respFluid:rfSel,dx,shockSeptico:shock,sepsis:sep,dxCol});go(7);
  }
}

         +'• Retirar CVC / dispositivos vasculares sospechosos del foco<br>'
         +'• Drenaje percutáneo guiado por imagen si técnicamente factible<br>'
         +'• Cirugía si el foco no es controlable por vía percutánea'}));
       b.appendChild(alert_('r','',
         '⚠ <strong>No retrasar el control de foco</strong> por intentos prolongados de estabilización médica.<br>'
         +'Sin control de foco, la resucitación y los antibióticos solo ofrecen estabilidad transitoria.'));
     }},
    {id:'c1',title:'📊 C1 — Monitorización Dinámica',color:'#0e7490',
     build(b){
       b.appendChild(alert_('r','',
         '⚠ <strong>Prohibido</strong> guiar la administración de volumen por CVP o presión sistólica aislada.<br>'
         +'Usar únicamente parámetros dinámicos para predecir la respuesta a fluidos.'));
       ap(b,
         r2row('Herramientas preferidas:','PLR (Passive Leg Raising) · Minibolo + medición de GC'),
         r2row('Parámetros:','VVS (Variación Vol. Sistólico) · PPV (Variación Presión Pulso) · Eco a pie de cama'),
         r2row('Perfusión periférica:','CRT (Tiempo de Llenado Capilar) — guía de perfusión tisular'));
       b.appendChild(alert_('g','Evidencia ANDROMEDA-SHOCK',
         'Grupo guiado por CRT: SOFA día 3 menor (5.6 vs 6.6) · Tendencia a menor mortalidad (34.9% vs 43.4%)'));
       ap(b,r2row('Meta:','PAM ≥65 mmHg · CRT normal · Lactato descendente'));
     }},
    {id:'c2',title:'💊 C2 — Vasopresores',color:'#dc2626',
     build(b){
       b.appendChild(alert_('r','',
         '• Iniciar vasopresores <strong>inmediatamente</strong> si PAM &lt;65 mmHg persiste tras bolo inicial<br>'
         +'• No demorar por administración adicional de fluidos'));
       ap(b,
         r2row('Meta PAM:','≥65 mmHg (SSC 2021 · NICE 2025)'),
         r2row('1ª línea:','Norepinefrina (NE) — menor riesgo de arritmias, mejor supervivencia'),
         divider());
       b.appendChild(mk('div',{html:'<strong>Jerarquía vasopresora (mínima carga adrenérgica):</strong><br>'
         +'• 2ª línea (NE 0.25-0.5 µg/kg/min): <strong>Vasopresina 0.03 U/min</strong> — ahorro de catecolaminas<br>'
         +'• 3ª línea: <strong>Epinefrina</strong> si no se alcanza la MAP objetivo<br>'
         +'• Disfunción miocárdica + hipoperfusión pese a MAP adecuada: <strong>Dobutamina</strong><br>'
         +'• Levosimendan en disfunción miocárdica por sepsis (J-SSCG 2024 — condicional)<br>'
         +'• Angiotensina II en shock refractario (J-SSCG 2024 — condicional)'}));
       b.appendChild(alert_('y','Acceso vascular',
         '• Iniciar por vía periférica (proximal a fosa antecubital) para evitar retrasos<br>'
         +'• Uso periférico máximo <strong>6 horas</strong> · Transicionar a vía central lo antes posible'));
       b.appendChild(alert_('y','Retirada progresiva (Nodo E1)',
         'Reducir 20-30% cada 1-2h cuando PAM estable y lactato normalizado'));
     }},
    {id:'d1',title:'💊 D1 — Corticoterapia',color:'#16a34a',
     build(b){
       if(d.shockSeptico){
         ap(b,
           r2row('Indicación:','Shock refractario tras ≥4h con vasopresores (SSC 2021)'),
           r2row('Fármaco:','Hidrocortisona IV'),
           r2row('Dosis:','200 mg/día en perfusión continua o fraccionada'),
           r2row('Pauta fraccionada:','50 mg/6h o 100 mg/12h'));
         b.appendChild(alert_('g','','Objetivo: acortar duración del shock y reducir tiempo en vasopresores'));
       } else {
         b.appendChild(alert_('y','','Corticoides no indicados en ausencia de shock séptico.'));
       }
     }},
    {id:'d2',title:'🫁 D2 — Soporte Ventilatorio y Protección Pulmonar',color:'#6366f1',
     build(b){
       b.appendChild(alert_('b','Fallo hipoxémico inicial',
         '• Preferir <strong>HFNC</strong> (Oxígeno de Alto Flujo) sobre NIV (Ventilación No Invasiva)<br>'
         +'• Evidencia: mejores tasas de supervivencia y menores fallos de intubación'));
       b.appendChild(mk('div',{style:'font-weight:600;margin:10px 0 6px',text:'Estrategia ARDS (sepsis-inducido):'}));
       ap(b,
         r2row('Volumen tidal:','6 mL/kg (peso corporal ideal)'),
         r2row('Presión meseta (Pplat):','< 30 cmH₂O'),
         r2row('Presión de conducción (DP):','< 15 cmH₂O (J-SSCG 2024)'),
         r2row('PEEP elevada:','ARDS moderado-severo (PaO₂/FiO₂ <200)'),
         r2row('Decúbito prono:','> 12h/día si PaO₂/FiO₂ < 150 mmHg'));
       b.appendChild(alert_('r','','<strong>Objetivo:</strong> prevenir VILI (Lesión Pulmonar Asociada al Ventilador). No convertir el soporte ventilatorio en fuente adicional de inflamación sistémica.'));
     }},
    {id:'d3',title:'🫀 D3 — Terapia de Reemplazo Renal (RRT)',color:'#475569',
     build(b){
       b.appendChild(alert_('b','Indicación: LRA asociada a sepsis con criterios de urgencia',
         '• Oliguria refractaria (&lt;200 mL/12h)<br>'
         +'• Hiperpotasemia &gt;6.5 mEq/L o con cambios ECG<br>'
         +'• Acidosis metabólica severa (pH &lt;7.1)<br>'
         +'• Sobrecarga hídrica sin respuesta a diuréticos'));
       ap(b,r2row('Modalidad preferida:','CRRT (continua) en inestabilidad hemodinámica'));
       b.appendChild(alert_('y','','SSC 2021 · NICE 2025: <strong>No</strong> se recomienda inicio temprano de RRT sin criterios de urgencia.'));
     }},
    {id:'d4',title:'🩸 D4 — Control de Glucemia',color:'#b45309',
     build(b){
       ap(b,
         r2row('Umbral de inicio:','Glucemia > 180 mg/dL en dos determinaciones'),
         r2row('Meta SSC 2021:','144–180 mg/dL'),
         r2row('Meta NICE 2025:','108–180 mg/dL'));
       b.appendChild(alert_('y','','Evitar hipoglucemia &lt;70 mg/dL. Objetivo conservador para reducir variabilidad glucémica.'));
     }},
    {id:'e1',title:'🔄 E1 — Desescalada y Discontinuación de Terapias',color:'#1a3a5c',
     build(b){
       b.appendChild(alert_('b','Evaluación diaria — buscar activamente oportunidad de desescalada',
         '• Estabilidad hemodinámica sostenida<br>'
         +'• Aclaramiento de lactato ≥10% cada 2h<br>'
         +'• Patógeno identificado en cultivos → reducir a espectro dirigido<br>'
         +'• Procalcitonina en descenso → guiar discontinuación de antibióticos'));
       b.appendChild(mk('div',{html:'<br><strong>Uso de Procalcitonina (SSC 2021):</strong><br>'
         +'✅ <strong>Sí</strong> usar para <strong>discontinuación</strong> de tratamiento (14 RCTs con beneficio)<br>'
         +'❌ <strong>No</strong> usar para <strong>inicio</strong> de tratamiento (3 RCTs sin beneficio)',style:'font-size:13px'}));
       b.appendChild(divider());
       b.appendChild(mk('div',{html:'<strong>Acciones de retirada progresiva:</strong><br>'
         +'• Desescalar antibióticos · Retirar vasopresores gradualmente · Transición a vía oral si tolerancia digestiva',style:'font-size:13px'}));
       b.appendChild(alert_('b','Loops de reevaluación',
         '• Shock recurre → módulo C2 (Vasopresores)<br>'
         +'• Hipoperfusión nueva → módulo B0 (Bundle) / C1 (Monitorización)<br>'
         +'• Nueva sospecha infecciosa → módulo B1 (Antibióticos)'));
     }},
  ];

  const openState={a1:true};const bodyMap={};
  mods.forEach(m=>{
    const mc=div('mc');mc.style.border=`1.5px solid ${m.color}`;
    const hd=div('mh');hd.style.background=m.color+'18';
    const ht=mk('div',{cls:'mht',text:m.title});
    const arr=mk('div',{cls:'mar',text:openState[m.id]?'▲':'▼'});
    ap(hd,ht,arr);
    const body=div('mb');m.build(body);
    if(!openState[m.id])body.style.display='none';
    bodyMap[m.id]=body;
    hd.onclick=()=>{openState[m.id]=!openState[m.id];body.style.display=openState[m.id]?'':'none';arr.textContent=openState[m.id]?'▲':'▼';};
    ap(mc,hd,body);c.appendChild(mc);
  });

  const actBtns=div('bgrp');actBtns.style.marginTop='16px';
  actBtns.appendChild(btn('↩ Nueva Evaluación','btn-d',()=>{step=0;data={};render();}));
  c.appendChild(actBtns);
  return c;
}

render();
</script>
</body>
</html>
