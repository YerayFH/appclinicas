<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sepsis Decision Support</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh;display:flex;flex-direction:column}
a{color:#2563eb}
#top-banner{background:#0f2d5e;color:#fff;text-align:center;padding:10px 16px;border-bottom:3px solid #f0c040}
#top-banner h1{font-size:clamp(12px,3.5vw,16px);font-weight:800;letter-spacing:1px;text-transform:uppercase}
#hdr{background:#1a3a5c;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2)}
#hdr-title{font-size:clamp(14px,4vw,20px);font-weight:700}
#hdr-sub{font-size:11px;color:#93c5fd;margin-top:2px}
#step-counter{color:#93c5fd;font-size:13px;white-space:nowrap}
#prog{background:#dbeafe;padding:8px 12px;display:flex;align-items:flex-start;gap:2px;overflow-x:auto}
.pi{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.pd{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#cbd5e1;color:#64748b}
.pd.act{background:#2563eb;color:#fff}.pd.dn{background:#16a34a;color:#fff}
.pl{font-size:10px;color:#64748b;white-space:nowrap}.pl.act{color:#2563eb;font-weight:700}
.pc{width:12px;height:2px;background:#cbd5e1;margin-top:13px;flex-shrink:0}
#main{flex:1;width:100%;max-width:760px;margin:0 auto;padding:0 4px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:22px;margin:16px 0}
.ct{font-size:17px;font-weight:700;color:#1a3a5c;margin-bottom:4px}
.cs{font-size:12px;color:#64748b;margin-bottom:16px}
button{cursor:pointer;border:none;font-family:inherit}
.btn{border-radius:8px;padding:11px 20px;font-size:14px;font-weight:600;color:#fff;background:#2563eb;margin:4px 4px 4px 0}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;color:#2563eb;border:2px solid #2563eb;border-radius:8px;padding:9px 18px;font-size:14px;font-weight:600;margin:4px 4px 4px 0}
.btn-g{background:#e2e8f0;color:#1e293b}
.btn-s{background:#16a34a}.btn-d{background:#dc2626}.btn-w{background:#d97706}
.bgrp{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.lbl{display:block;font-size:13px;font-weight:600;color:#1e293b;margin:12px 0 4px}
input[type=number],select{width:100%;padding:10px 12px;border-radius:8px;border:1.5px solid #cbd5e1;font-size:14px;background:#fff;outline:none;font-family:inherit}
input[type=number]:focus,select:focus{border-color:#2563eb}
.wmsg{font-size:11px;color:#dc2626;margin-top:2px}
.r2c{display:flex;gap:12px;flex-wrap:wrap}
.col{flex:1;min-width:140px}
.sbox{border-radius:10px;padding:14px;text-align:center}
.snum{font-size:36px;font-weight:800}.slbl{font-size:12px;font-weight:600;margin-top:2px}
.al{border-radius:10px;padding:14px 16px;margin-top:10px;font-size:13px;line-height:1.75;word-break:break-word}
.al b{font-size:14px;display:block;margin-bottom:4px}
.al-r{background:#fef2f2;border:1.5px solid #fca5a5}.al-r b{color:#dc2626}
.al-y{background:#fffbeb;border:1.5px solid #fcd34d}.al-y b{color:#d97706}
.al-g{background:#f0fdf4;border:1.5px solid #86efac}.al-g b{color:#16a34a}
.al-b{background:#eff6ff;border:1.5px solid #93c5fd}.al-b b{color:#2563eb}
.tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.tag{border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600}
.tag-p{background:#fef2f2;border:1.5px solid #fca5a5;color:#dc2626}
.tag-n{background:#f0fdf4;border:1.5px solid #86efac;color:#16a34a}
.dv{height:1px;background:#cbd5e1;margin:14px 0}
.sr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}
.sr span{color:#64748b}
.mc{border-radius:10px;margin-bottom:10px;overflow:hidden}
.mh{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;gap:8px;cursor:pointer;user-select:none}
.mht{font-weight:700;color:#1a3a5c;font-size:14px;flex:1;min-width:0;word-break:break-word}
.mar{color:#64748b;flex-shrink:0}
.mb{padding:14px 16px;font-size:13px;line-height:1.85;word-break:break-word;overflow-wrap:break-word}
.r2row{display:flex;flex-wrap:wrap;gap:2px 8px;margin-bottom:7px}
.r2l{color:#64748b}.r2v{font-weight:700;word-break:break-word}
.dxbox{border-radius:12px;padding:20px;text-align:center;margin-top:12px}
.dxtit{font-size:12px;color:#64748b;margin-bottom:4px}
.dxname{font-size:clamp(18px,5vw,26px);font-weight:800}
.dxsub{font-size:13px;margin-top:6px}
#footer{padding:14px 20px;border-top:1px solid #cbd5e1;background:#fff;font-size:12px;color:#64748b;line-height:1.8}
.hidden{display:none!important}
#welcome{display:flex;justify-content:center;padding:24px}
#welcome .card{max-width:560px;text-align:center}
@media(max-width:480px){.card{padding:16px}.mb{padding:12px}.snum{font-size:28px}.dxname{font-size:18px}}
</style>
</head>
<body>
<div id="top-banner"><h1>🏛 Farmacia Hospitalaria · Hospital Universitario Puerto Real</h1></div>
<div id="hdr">
  <div><div id="hdr-title">🏥 SEPSIS DECISION SUPPORT</div><div id="hdr-sub">SSC 2021 · NICE 2025 · J-SSCG 2024 — Clinical Decision Aid</div></div>
  <div id="step-counter"></div>
</div>
<div id="prog" class="hidden"></div>
<div id="main"></div>
<div id="footer"><strong style="color:#1e293b">Autor:</strong> Yeray Reyes de la Mata<br><strong style="color:#1e293b">Contacto:</strong> <a href="mailto:ydelamata01@gmail.com">ydelamata01@gmail.com</a></div>

<script>
// ── globals ──────────────────────────────────────────────────────────
const STEPS = ["Sospecha","NEWS/SIRS","qSOFA","SOFA","Lactato","Clasificación","Manejo"];
let step = 0, data = {};

// ── tiny DOM helpers ─────────────────────────────────────────────────
function $(id){ return document.getElementById(id); }

function mk(tag, props){
  const e = document.createElement(tag);
  if(props) for(const [k,v] of Object.entries(props)){
    if(k==='cls') e.className=v;
    else if(k==='text') e.textContent=v;
    else if(k==='html') e.innerHTML=v;
    else if(k==='style') e.style.cssText=v;
    else e.setAttribute(k,v);
  }
  return e;
}
function ap(parent,...kids){ kids.forEach(k=>k&&parent.appendChild(k)); return parent; }
function div(cls){ const d=document.createElement('div'); if(cls) d.className=cls; return d; }
function divider(){ return div('dv'); }

function btn(label, cls, onclick){
  const b = mk('button',{cls:'btn '+(cls||''),text:label});
  b.onclick = onclick;
  return b;
}

// labeled number input — returns {wrap, input}
function numInp(label, initVal, min, max, step_, unit, warnFn){
  const wrap = div('');
  const lbl = mk('label',{cls:'lbl',text: unit ? label+' ('+unit+')' : label});
  const inp = mk('input',{type:'number',min,max,step:step_||'any'});
  inp.value = initVal;
  const wm = div('wmsg hidden');
  inp.addEventListener('input',()=>{
    const w = warnFn ? warnFn(Number(inp.value)) : null;
    wm.textContent = w||''; w ? wm.classList.remove('hidden') : wm.classList.add('hidden');
  });
  inp.addEventListener('blur',()=>{ const n=clamp(Number(inp.value),min,max); inp.value=n; });
  ap(wrap,lbl,inp,wm);
  return {wrap,inp};
}

// labeled select — returns {wrap, sel}
function selInp(label, options, initVal){
  const wrap = div('');
  const lbl = mk('label',{cls:'lbl',text:label});
  const sel = mk('select');
  options.forEach(([v,t])=>{ const o=mk('option',{value:v,text:t}); if(v===initVal) o.selected=true; sel.appendChild(o); });
  ap(wrap,lbl,sel);
  return {wrap,sel};
}

function alert_(color,title,bodyHTML){
  const d = div('al al-'+color);
  if(title){ const b=mk('b',{text:title}); d.appendChild(b); }
  const p = document.createElement('p'); p.innerHTML=bodyHTML||'';
  d.appendChild(p);
  return d;
}

function scoreBox(score, denom, pos, posLbl, negLbl){
  const d = div('sbox');
  d.style.background = pos?'#fef2f2':'#f0fdf4';
  const num = mk('div',{cls:'snum',text: denom ? score+'' : score+''});
  if(denom){ const sp=mk('span',{style:'font-size:18px',text:'/'+denom}); num.appendChild(sp); }
  num.style.color = pos?'#dc2626':'#16a34a';
  const lbl = mk('div',{cls:'slbl',text: pos?posLbl:negLbl});
  lbl.style.color = pos?'#dc2626':'#16a34a';
  ap(d,num,lbl);
  return d;
}

function r2row(label,val){
  const d=div('r2row');
  ap(d, mk('span',{cls:'r2l',text:label}), mk('strong',{cls:'r2v',text:val}));
  return d;
}

// ── utils ────────────────────────────────────────────────────────────
function clamp(v,mn,mx){ return Math.min(mx,Math.max(mn,isNaN(Number(v))?mn:Number(v))); }
function save(obj){ Object.assign(data,obj); }
function go(s){ step=s; render(); window.scrollTo(0,0); }

// ── scales ───────────────────────────────────────────────────────────
function calcNEWS(d){
  let s=0;
  const {spo2,fr,tas,fc,temp,conc,o2sup}=d;
  if(spo2<=91)s+=3; else if(spo2<=93)s+=2; else if(spo2<=95)s+=1;
  if(fr<=8)s+=3; else if(fr<=11)s+=1; else if(fr<=20)s+=0; else if(fr<=24)s+=2; else s+=3;
  if(tas<=90)s+=3; else if(tas<=100)s+=2; else if(tas<=110)s+=1; else if(tas<=219)s+=0; else s+=3;
  if(fc<=40)s+=3; else if(fc<=50)s+=1; else if(fc<=90)s+=0; else if(fc<=110)s+=1; else if(fc<=130)s+=2; else s+=3;
  if(temp<=35)s+=3; else if(temp<=36)s+=1; else if(temp<=38)s+=0; else if(temp<=39)s+=1; else s+=2;
  s+=conc==='Alerta'?0:3;
  s+=o2sup?2:0;
  return s;
}
function calcSIRS(d){
  return ((d.temp>38||d.temp<36)?1:0)+(d.fc>90?1:0)+(d.fr>20?1:0)+((d.leucos>12||d.leucos<4)?1:0);
}
function sofaBD(d){
  const {pf,pla,bili,cv,pam,gcs,cr,di}=d;
  let res=0,plq=0,bl=0,cvs=0,neu=0,ren=0;
  if(pf<=100)res=4; else if(pf<=200)res=3; else if(pf<=300)res=2; else if(pf<=400)res=1;
  if(pla<20)plq=4; else if(pla<50)plq=3; else if(pla<100)plq=2; else if(pla<150)plq=1;
  if(bili>=12)bl=4; else if(bili>=6)bl=3; else if(bili>=2)bl=2; else if(bili>=1.2)bl=1;
  if(cv==='dopa15'||cv==='epi'||cv==='nrA')cvs=4;
  else if(cv==='dopa510'||cv==='nrB')cvs=3;
  else if(cv==='dopa5'||cv==='dobu')cvs=2;
  else if(pam<70)cvs=1;
  if(gcs<6)neu=4; else if(gcs<10)neu=3; else if(gcs<13)neu=2; else if(gcs<15)neu=1;
  if(cr>=5||di<200)ren=4;
  else if((cr>=3.5&&cr<5)||(di>=200&&di<500))ren=3;
  else if(cr>=2&&cr<3.5)ren=2;
  else if(cr>=1.2&&cr<2)ren=1;
  return {res,plq,bl,cvs,neu,ren};
}
function calcSOFA(d){ const b=sofaBD(d); return b.res+b.plq+b.bl+b.cvs+b.neu+b.ren; }

// ── chrome ───────────────────────────────────────────────────────────
function updateChrome(){
  const sc=$('step-counter'), prog=$('prog');
  if(step===0){ sc.textContent=''; prog.classList.add('hidden'); return; }
  sc.textContent='Paso '+step+' / '+STEPS.length;
  prog.classList.remove('hidden');
  prog.innerHTML='';
  STEPS.forEach((lbl,i)=>{
    const done=step>i+1, active=step===i+1;
    const dot=mk('div',{cls:'pd'+(done?' dn':active?' act':''), text:done?'✓':String(i+1)});
    const label=mk('span',{cls:'pl'+(active?' act':''),text:lbl});
    const item=div('pi'); ap(item,dot,label);
    prog.appendChild(item);
    if(i<STEPS.length-1){ const conn=div('pc'); prog.appendChild(conn); }
  });
}

// ── render router ────────────────────────────────────────────────────
function render(){
  updateChrome();
  const main=$('main'); main.innerHTML='';
  if(step===0) main.appendChild(renderWelcome());
  else if(step===1) main.appendChild(renderS1());
  else if(step===2) main.appendChild(renderS2());
  else if(step===3) main.appendChild(renderS3());
  else if(step===4) main.appendChild(renderS4());
  else if(step===5) main.appendChild(renderS5());
  else if(step===6) main.appendChild(renderS6());
  else if(step===7) main.appendChild(renderS7());
}

// ── S0: Welcome ──────────────────────────────────────────────────────
function renderWelcome(){
  const w=div(''); w.id='welcome';
  const c=div('card');
  c.innerHTML=`<div style="font-size:52px;margin-bottom:12px">🩺</div>
    <h2 style="font-size:22px;font-weight:800;color:#1a3a5c;margin-bottom:6px">Sistema de Soporte Clínico</h2>
    <p style="font-size:15px;color:#64748b;margin-bottom:8px">Sepsis y Shock Séptico</p>
    <div style="background:#dbeafe;border-radius:8px;padding:8px 14px;font-size:13px;color:#2563eb;display:inline-block;margin-bottom:18px">SSC 2021 · NICE 2025 · J-SSCG 2024</div>
    <p style="font-size:13px;color:#64748b;line-height:1.8;margin-bottom:20px">
      Guía paso a paso para diagnóstico y manejo terapéutico.<br>
      Cálculo automático de NEWS · SIRS · qSOFA · SOFA.<br>
      Lógica diagnóstica basada en Sepsis-3 y guías vigentes.<br><br>
      <strong style="color:#dc2626">⚠ Solo apoyo clínico. No reemplaza el juicio médico.</strong>
    </p>`;
  ap(c, btn('Iniciar Evaluación →','btn-s',()=>go(1)));
  ap(w,c); return w;
}

// ── S1: Sospecha ─────────────────────────────────────────────────────
function renderS1(){
  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'🔍 Step 1 — Sospecha de Infección'}),
        mk('div',{cls:'cs',text:'Activación de protocolo de cribado multimodal (Nodo 0)'}),
        mk('label',{cls:'lbl',text:'¿Existe sospecha clínica de infección?'}));

  const grp=div('bgrp');
  const bSi=btn('Sí', data.sospecha==='Sí'?'btn-s':'btn-g', ()=>{ save({sospecha:'Sí'}); render(); });
  const bNo=btn('No', data.sospecha==='No'?'btn-d':'btn-g', ()=>{ save({sospecha:'No'}); render(); });
  ap(grp,bSi,bNo); c.appendChild(grp);

  if(data.sospecha==='No') c.appendChild(alert_('y','Sin sospecha de infección activa','No se activan los protocolos de cribado. Considere diagnósticos alternativos no infecciosos.'));
  if(data.sospecha==='Sí') c.appendChild(alert_('g','✓ Protocolos de cribado activados','Iniciar evaluación simultánea de NEWS/SIRS y Lactato. Continúe con el paso 2.'));

  const nxt=btn('Siguiente →','btn-s',()=>go(2));
  if(!data.sospecha) nxt.disabled=true;
  const nav=div('bgrp'); nav.style.marginTop='16px'; ap(nav,nxt);
  c.appendChild(nav);
  return c;
}

// ── S2: NEWS/SIRS ────────────────────────────────────────────────────
function renderS2(){
  const nv = data.newsVars || {spo2:97,fr:16,tas:120,fc:80,temp:37.0,conc:'Alerta',o2sup:false};
  const initLeuc = data.sirsLeuc !== undefined ? data.sirsLeuc : 8;

  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'📊 Step 2 — NEWS · SIRS'}),
        mk('div',{cls:'cs',text:'Tamizaje multimodal primario — NEWS (NICE 2025) y SIRS (SSC 2021) (Nodo 1)'}));

  // build all inputs first
  const {wrap:wSpo2, inp:iSpo2}   = numInp('SpO₂',      nv.spo2,   50,  100, 1,   '%');
  const {wrap:wFr,   inp:iFr}     = numInp('Frec. Resp.', nv.fr,    1,   70,  1,   '/min');
  const {wrap:wTas,  inp:iTas}    = numInp('TAS',         nv.tas,   40,  270, 1,   'mmHg');
  const {wrap:wFc,   inp:iFc}     = numInp('FC',          nv.fc,    20,  220, 1,   '/min');
  const {wrap:wTemp, inp:iTemp}   = numInp('Temperatura', nv.temp,  30,  43,  0.1, '°C');
  const {wrap:wConc, sel:sConc}   = selInp('Conciencia', [['Alerta','Alerta (A)'],['Alterada','Alterada (V/P/U)']], nv.conc);
  const {wrap:wO2,   sel:sO2}     = selInp('O₂ sup.', [['no','No'],['si','Sí (+2 pts)']], nv.o2sup?'si':'no');
  const {wrap:wLeuc, inp:iLeuc}   = numInp('Leucocitos (SIRS)', initLeuc, 0, 150, 1, '×10³/µL');

  const col1=div('col'); ap(col1,wSpo2,wFr,wTas,wFc);
  const col2=div('col'); ap(col2,wTemp,wConc,wO2,wLeuc);
  const row=div('r2c'); ap(row,col1,col2);
  c.appendChild(row);
  c.appendChild(divider());

  const hint=mk('p',{style:'font-size:11px;color:#64748b;margin-bottom:8px',
    text:'Ref. NEWS: FR ≤8→3|9-11→1|12-20→0|21-24→2|≥25→3 · TAS ≤90→3|91-100→2|101-110→1|111-219→0|≥220→3'});
  c.appendChild(hint);

  // score boxes
  const newsBox=div('col'), sirsBox=div('col');
  const scRow=div('r2c'); ap(scRow,newsBox,sirsBox);
  c.appendChild(scRow);

  const alEl=div(''); c.appendChild(alEl);

  // nav
  const nav=div('bgrp'); nav.style.marginTop='16px';
  ap(nav,
    btn('← Anterior','btn-o',()=>go(1)),
    btn('Siguiente →','btn-s',submitS2)
  );
  c.appendChild(nav);

  function getVals(){
    return {
      spo2:clamp(iSpo2.value,50,100), fr:clamp(iFr.value,1,70),
      tas:clamp(iTas.value,40,270),   fc:clamp(iFc.value,20,220),
      temp:clamp(iTemp.value,30,43),  conc:sConc.value,
      o2sup:sO2.value==='si',         leucos:clamp(iLeuc.value,0,150)
    };
  }
  function update(){
    const v=getVals();
    const news=calcNEWS(v), sirs=calcSIRS(v), pos=news>=5||sirs>=2;
    newsBox.innerHTML=''; sirsBox.innerHTML='';
    const nb=div(''); nb.appendChild(mk('div',{cls:'',text:'Puntuación NEWS',style:'font-size:13px;color:#64748b;text-align:center'}));
    nb.appendChild(scoreBox(news,null,news>=5,'≥5 — POSITIVO','<5 — Riesgo bajo'));
    newsBox.appendChild(nb);
    const sb=div(''); sb.appendChild(mk('div',{cls:'',text:'Criterios SIRS',style:'font-size:13px;color:#64748b;text-align:center'}));
    sb.appendChild(scoreBox(sirs,4,sirs>=2,'≥2 — POSITIVO','<2 — Negativo'));
    sirsBox.appendChild(sb);
    alEl.innerHTML='';
    alEl.appendChild(pos
      ? alert_('r','⚠ Tamizaje POSITIVO — Alta sensibilidad para sepsis','Proceder a evaluación de riesgo de mortalidad (qSOFA) y disfunción orgánica (SOFA).')
      : alert_('g','✓ Tamizaje negativo','Baja probabilidad actual. Vigilar y reevaluar si cambia la clínica.')
    );
  }
  function submitS2(){
    const v=getVals();
    const news=calcNEWS(v), sirs=calcSIRS(v);
    save({newsVars:{spo2:v.spo2,fr:v.fr,tas:v.tas,fc:v.fc,temp:v.temp,conc:v.conc,o2sup:v.o2sup},
          sirsLeuc:v.leucos, news, sirs, newsPos:news>=5||sirs>=2});
    go(3);
  }
  [iSpo2,iFr,iTas,iFc,iTemp,sConc,sO2,iLeuc].forEach(i=>i.addEventListener('input',update));
  update();
  return c;
}

// ── S3: qSOFA ────────────────────────────────────────────────────────
function renderS3(){
  const qv = data.qsofaVars || {pas:data.newsVars?.tas||120, fr:data.newsVars?.fr||16, gcs:15};
  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'⚡ Step 3 — qSOFA'}),
        mk('div',{cls:'cs',text:'Predictor de mal pronóstico — no usar como cribado único (SSC 2021 · J-SSCG 2024) (Nodo 2)'}),
        alert_('y','','ℹ qSOFA evalúa riesgo de mortalidad elevada. Un resultado negativo <strong>no excluye</strong> sepsis.'));

  const {wrap:wPas,inp:iPas} = numInp('TAS',qv.pas,40,270,1,'mmHg');
  const {wrap:wFr, inp:iFr}  = numInp('Frec. Respiratoria',qv.fr,1,70,1,'/min');
  const {wrap:wGcs,inp:iGcs} = numInp('Glasgow',qv.gcs||15,3,15,1);

  const tipPas=div(''); const tipFr=div(''); const tipGcs=div('');
  const c1=div('col'); ap(c1,wPas,tipPas);
  const c2=div('col'); ap(c2,wFr,tipFr);
  const c3=div('col'); ap(c3,wGcs,tipGcs);
  const row=div('r2c'); ap(row,c1,c2,c3);
  c.appendChild(row); c.appendChild(divider());

  const scEl=div(''); c.appendChild(scEl);

  const nav=div('bgrp'); nav.style.marginTop='16px';
  ap(nav, btn('← Anterior','btn-o',()=>go(2)), btn('Siguiente →','btn-s',submitS3));
  c.appendChild(nav);

  function tip(el,pos,yes,no){ el.innerHTML=`<span style="font-size:12px;font-weight:600;color:${pos?'#dc2626':'#16a34a'}">${pos?yes:no}</span>`; }
  function update(){
    const pas=clamp(iPas.value,40,270), fr=clamp(iFr.value,1,70), gcs=clamp(iGcs.value,3,15);
    const score=(pas<=100?1:0)+(fr>=22?1:0)+(gcs<15?1:0), pos=score>=2;
    tip(tipPas,pas<=100,'✓ ≤100 mmHg (+1)','✗ >100 mmHg (0)');
    tip(tipFr,fr>=22,'✓ ≥22/min (+1)','✗ <22/min (0)');
    tip(tipGcs,gcs<15,'✓ <15 (+1)','✗ =15 (0)');
    scEl.innerHTML='';
    const box=div('sbox'); box.style.background=pos?'#fef2f2':'#f0fdf4';
    const num=mk('div',{cls:'snum',text:score+'/3'}); num.style.color=pos?'#dc2626':'#16a34a';
    const lbl=mk('div',{cls:'slbl',text:pos?'⚠ Riesgo elevado de mortalidad — SOFA urgente':'Riesgo bajo — Continuar con SOFA'}); lbl.style.color=pos?'#dc2626':'#16a34a';
    ap(box,num,lbl); scEl.appendChild(box);
  }
  function submitS3(){
    const pas=clamp(iPas.value,40,270),fr=clamp(iFr.value,1,70),gcs=clamp(iGcs.value,3,15);
    const score=(pas<=100?1:0)+(fr>=22?1:0)+(gcs<15?1:0);
    save({qsofaVars:{pas,fr,gcs},qsofa:score,qsofaPos:score>=2}); go(4);
  }
  [iPas,iFr,iGcs].forEach(i=>i.addEventListener('input',update));
  update();
  return c;
}

// ── S4: SOFA ─────────────────────────────────────────────────────────
function renderS4(){
  const sv = data.sofaVars || {pf:400,pla:200,bili:0.8,cv:'ninguno',pam:data.newsVars?.tas||80,gcs:data.qsofaVars?.gcs||15,cr:0.9,di:1200};
  const initBasal = data.sofaBasal||0;
  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'🧮 Step 4 — SOFA Score'}),
        mk('div',{cls:'cs',text:'Disfunción orgánica (Sepsis-3 / SSC 2021): ΔSOFA ≥2 vs. basal (Nodo 4)'}));

  const {wrap:wPf,  inp:iPf}  = numInp('PaO₂/FiO₂',sv.pf,0,600,1,'mmHg',v=>v>600?'Valor inusualmente alto':null);
  const {wrap:wPla, inp:iPla} = numInp('Plaquetas',sv.pla,0,800,1,'×10³/µL');
  const {wrap:wBili,inp:iBili}= numInp('Bilirrubina',sv.bili,0,40,0.1,'mg/dL');
  const {wrap:wGcs, inp:iGcs} = numInp('Glasgow',sv.gcs,3,15,1);
  const {wrap:wPam, inp:iPam} = numInp('PAM',sv.pam,20,200,1,'mmHg');
  const {wrap:wCv,  sel:sCv}  = selInp('Soporte vasoactivo',[
    ['ninguno','Sin vasopresores'],['dobu','Dobutamina (cualquier dosis)'],
    ['dopa5','Dopamina ≤5 µg/kg/min'],['dopa510','Dopamina 5.1–15 µg/kg/min'],
    ['dopa15','Dopamina >15 µg/kg/min'],['nrB','Norepinefrina ≤0.1 µg/kg/min'],
    ['nrA','Norepinefrina >0.1 µg/kg/min'],['epi','Epinefrina >0.1 µg/kg/min']
  ],sv.cv);
  const {wrap:wCr,  inp:iCr}  = numInp('Creatinina',sv.cr,0,25,0.1,'mg/dL');
  const {wrap:wDi,  inp:iDi}  = numInp('Diuresis',sv.di,0,6000,50,'mL/24h');

  const col1=div('col'); ap(col1,wPf,wPla,wBili,wGcs);
  const col2=div('col'); ap(col2,wPam,wCv,wCr,wDi);
  const row=div('r2c'); ap(row,col1,col2);
  c.appendChild(row);

  // basal
  const bWrap=div(''); const bLbl=mk('label',{cls:'lbl',text:'SOFA basal previo'});
  const bInp=mk('input',{type:'number',min:0,max:24,style:'width:120px'});
  bInp.value=initBasal;
  ap(bWrap,bLbl,bInp); c.appendChild(bWrap);
  c.appendChild(divider());

  const bdEl=div(''), scEl=div('');
  ap(c,bdEl,scEl);

  const nav=div('bgrp'); nav.style.marginTop='16px';
  ap(nav, btn('← Anterior','btn-o',()=>go(3)), btn('Siguiente →','btn-s',submitS4));
  c.appendChild(nav);

  function getVals(){
    return {pf:clamp(iPf.value,0,600),pla:clamp(iPla.value,0,800),bili:clamp(iBili.value,0,40),
      cv:sCv.value,pam:clamp(iPam.value,20,200),gcs:clamp(iGcs.value,3,15),
      cr:clamp(iCr.value,0,25),di:clamp(iDi.value,0,6000)};
  }
  function update(){
    const v=getVals(), bas=clamp(bInp.value,0,24);
    const bd=sofaBD(v);
    const score=bd.res+bd.plq+bd.bl+bd.cvs+bd.neu+bd.ren, delta=score-bas;
    // breakdown
    bdEl.innerHTML='';
    const bdBox=div(''); bdBox.style.cssText='background:#f8fafc;border-radius:8px;padding:12px;margin-bottom:10px';
    bdBox.appendChild(mk('div',{style:'font-weight:600;font-size:13px;margin-bottom:6px',text:'Desglose SOFA por órgano'}));
    [['Respiratorio (PaO₂/FiO₂)',bd.res],['Coagulación (Plaquetas)',bd.plq],['Hepático (Bilirrubina)',bd.bl],
     ['Cardiovascular',bd.cvs],['Neurológico (Glasgow)',bd.neu],['Renal',bd.ren]].forEach(([lbl,val])=>{
      const r=div('sr');
      r.appendChild(mk('span',{text:lbl}));
      const v2=mk('strong',{text:val>0?'+'+val+' pts':'0 pts'}); v2.style.color=val>0?'#dc2626':'#16a34a';
      r.appendChild(v2); bdBox.appendChild(r);
    });
    bdEl.appendChild(bdBox);
    // scores
    scEl.innerHTML='';
    const sr=div('r2c');
    const b1=div('col'),b2=div('col');
    const sb1=div('sbox'); sb1.style.background='#eff6ff';
    const n1=mk('div',{cls:'snum',text:score+'/24'}); n1.style.color='#2563eb';
    const l1=mk('div',{style:'font-size:13px;color:#64748b;text-align:center;margin-bottom:4px',text:'SOFA actual'});
    ap(sb1,l1,n1); b1.appendChild(sb1);
    const pos=delta>=2;
    const sb2=div('sbox'); sb2.style.background=pos?'#fef2f2':'#f0fdf4';
    const l2=mk('div',{style:'font-size:13px;color:#64748b;text-align:center;margin-bottom:4px',text:'ΔSOFA vs. basal'});
    const n2=mk('div',{cls:'snum',text:'+'+delta}); n2.style.color=pos?'#dc2626':'#16a34a';
    const l3=mk('div',{cls:'slbl',text:pos?'≥2 — Criterio SEPSIS cumplido':'<2 — Sin criterios'}); l3.style.color=pos?'#dc2626':'#16a34a';
    ap(sb2,l2,n2,l3); b2.appendChild(sb2);
    ap(sr,b1,b2); scEl.appendChild(sr);
  }
  function submitS4(){
    const v=getVals(), bas=clamp(bInp.value,0,24);
    const score=calcSOFA(v), delta=score-bas;
    save({sofaVars:v,sofa:score,sofaBasal:bas,sofaDelta:delta,sofaPos:delta>=2}); go(5);
  }
  [iPf,iPla,iBili,iGcs,iPam,sCv,iCr,iDi,bInp].forEach(i=>i.addEventListener('input',update));
  update();
  return c;
}

// ── S5: Lactato ──────────────────────────────────────────────────────
function renderS5(){
  const initLac = data.lactato !== undefined ? data.lactato : 1.0;
  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'🩸 Step 5 — Lactato Sérico'}),
        mk('div',{cls:'cs',text:'Prueba adjunta de hipoperfusión tisular oculta (SSC 2021 · NICE 2025 · J-SSCG 2024) (Nodo 3)'}));

  const {wrap:wLac,inp:iLac} = numInp('Lactato sérico',initLac,0,30,0.1,'mmol/L',v=>v>20?'Valor extremo — verificar muestra':null);
  c.appendChild(wLac);
  c.appendChild(mk('p',{style:'font-size:12px;color:#64748b;margin-top:4px',text:'Umbral diagnóstico: >2 mmol/L · Umbral de gravedad: >4 mmol/L (SSC 2021)'}));
  c.appendChild(divider());

  const lacEl=div(''); c.appendChild(lacEl);

  const nav=div('bgrp'); nav.style.marginTop='16px';
  ap(nav, btn('← Anterior','btn-o',()=>go(4)), btn('Siguiente →','btn-s',submitS5));
  c.appendChild(nav);

  function update(){
    const v=clamp(iLac.value,0,30);
    const bg=v>4?'#fef2f2':v>2?'#fffbeb':'#f0fdf4';
    const bd=v>4?'#fca5a5':v>2?'#fcd34d':'#86efac';
    const col=v>4?'#dc2626':v>2?'#d97706':'#16a34a';
    const msg=v>4?'🔴 Lactato >4 mmol/L — Hipoperfusión grave · Resucitación urgente':
      v>2?'🟡 Lactato 2–4 mmol/L — Hipoperfusión oculta · Iniciar aclaramiento':'🟢 Lactato ≤2 mmol/L — Sin evidencia de hipoperfusión';
    lacEl.innerHTML='';
    const box=div('sbox'); box.style.cssText=`background:${bg};border:1.5px solid ${bd}`;

    const lbl=mk('div',{cls:'slbl',text:msg}); lbl.style.color=col;
    ap(box,num,lbl);
    if(v>2){ const sub=mk('div',{style:'font-size:12px;color:#64748b;margin-top:6px',text:'Meta: reducción ≥10% cada 2h (SSC 2021 · J-SSCG 2024)'}); box.appendChild(sub); }
    lacEl.appendChild(box);
  }
  function submitS5(){ save({lactato:clamp(iLac.value,0,30),lacPos:Number(iLac.value)>2}); go(6); }
  iLac.addEventListener('input',update);
  update();
  return c;
}

// ── S6: Clasificación ────────────────────────────────────────────────
function renderS6(){
  const initPam = data.pamActual||65;
  const c=div('card');
  ap(c, mk('div',{cls:'ct',text:'🏷 Step 6 — Clasificación Final'}),
        mk('div',{cls:'cs',text:'Criterios Sepsis-3 / SSC 2021 (Nodos 5-6)'}));

  // tags
  const tags=div('tags');
  [[`ΔSOFA ≥2`,data.sofaDelta>=2],[`Lactato >2 (${Number(data.lactato||0).toFixed(1)})`,data.lacPos],
   ['NEWS ≥5',data.newsPos],['qSOFA ≥2',data.qsofaPos]].forEach(([lbl,pos])=>{
    tags.appendChild(mk('div',{cls:'tag '+(pos?'tag-p':'tag-n'),text:(pos?'✓':'✗')+' '+lbl}));
  });
  c.appendChild(tags);

  const {wrap:wPam,inp:iPam} = numInp('PAM actual',initPam,20,200,1,'mmHg',v=>Number(v)<65?'PAM <65 mmHg — umbral crítico de perfusión':null);
  c.appendChild(wPam);

  // respuesta fluidos
  c.appendChild(mk('label',{cls:'lbl',text:'Respuesta a carga de cristaloides (30 mL/kg)'}));
  const rfGrp=div('bgrp');
  let rfSel=data.respFluid||'';
  const rfOpts=['Adecuada (PAM ≥65)','Refractaria (PAM <65 persiste)','No aplica / No administrada'];
  const rfBtns=rfOpts.map(v=>{
    const b=btn(v,rfSel===v?'btn-s':'btn-g',()=>{ rfSel=v; rfBtns.forEach((bb,i)=>bb.className='btn '+(rfOpts[i]===v?'btn-s':'btn-g')); dxUpdate(); });
    rfGrp.appendChild(b); return b;
  });
  c.appendChild(rfGrp);

  // vasopresores
  c.appendChild(mk('label',{cls:'lbl',text:'¿Requiere vasopresores para mantener PAM ≥65 mmHg?'}));
  const vpGrp=div('bgrp');
  let vpSel = data.vasoPresores !== undefined ? data.vasoPresores : null;
  const vpBtns=[['Sí',true],['No',false]].map(([lbl,v])=>{
    const active=vpSel===v;
    const b=btn(lbl,active?(v?'btn-d':'btn-s'):'btn-g',()=>{ vpSel=v; vpBtns.forEach((bb,i)=>{ const vv=[true,false][i]; bb.className='btn '+(vpSel===vv?(vv?'btn-d':'btn-s'):'btn-g'); }); dxUpdate(); });
    vpGrp.appendChild(b); return b;
  });
  c.appendChild(vpGrp);
  c.appendChild(divider());

  const dxEl=div(''); c.appendChild(dxEl);

  const nxtBtn=btn('Ver Plan Terapéutico →','btn-s',submitS6);
  const nav=div('bgrp'); nav.style.marginTop='16px';
  ap(nav, btn('← Anterior','btn-o',()=>go(5)), nxtBtn);
  c.appendChild(nav);

  function getDx(){
    const sep=data.sofaDelta>=2, shock=sep&&vpSel===true&&data.lacPos;
    let dx,bg,bd,col;
    if(shock){dx='SHOCK SÉPTICO';bg='#fef2f2';bd='#fca5a5';col='#dc2626';}
    else if(sep){dx='SEPSIS';bg='#fffbeb';bd='#fcd34d';col='#d97706';}
    else if(data.newsPos||data.qsofaPos||data.lacPos){dx='SOSPECHA DE SEPSIS';bg='#fffbeb';bd='#fcd34d';col='#d97706';}
    else{dx='SEPSIS NO CONFIRMADA';bg='#f0fdf4';bd='#86efac';col='#16a34a';}
    return {dx,bg,bd,col,sep,shock};
  }
  function dxUpdate(){
    const {dx,bg,bd,col,sep,shock}=getDx();
    dxEl.innerHTML='';
    const box=div('dxbox'); box.style.cssText=`background:${bg};border:2px solid ${bd}`;
    box.appendChild(mk('div',{cls:'dxtit',text:'DIAGNÓSTICO (Sepsis-3 / SSC 2021)'}));
    const name=mk('div',{cls:'dxname',text:dx}); name.style.color=col;
    box.appendChild(name);
    const sub=shock?'Escalamiento terapéutico máximo — Traslado UCI en <6h':sep&&!shock?'Activar manejo terapéutico — Evaluar necesidad de UCI':'';
    if(sub){ const s=mk('div',{cls:'dxsub',html:sub}); s.style.color=col; box.appendChild(s); }
    dxEl.appendChild(box);
    nxtBtn.disabled=!rfSel;
  }
  iPam.addEventListener('input',dxUpdate);
  dxUpdate();
  return c;

  function submitS6(){
    if(!rfSel) return;
    const pam=clamp(iPam.value,20,200);
    const {dx,sep,shock}=getDx();
    const dxCol=shock?'red':sep?'yellow':'green';
    save({pamActual:pam,vasoPresores:vpSel,respFluid:rfSel,dx,shockSeptico:shock,sepsis:sep,dxCol});
    go(7);
  }
}

    {id:'e1',title:'🔄 E1 — Reevaluación y Desescalada',color:'#475569',
     build(b){
       b.appendChild(mk('div',{html:'<strong>Criterios para desescalada:</strong><br>✓ Estabilidad hemodinámica sostenida · ✓ Aclaramiento lactato ≥10%/2h<br>✓ Patógeno identificado → reducir espectro · ✓ Procalcitonina en descenso'}));
       b.appendChild(alert_('b','Loops activos:','• Shock recurre → C2 Vasopresores<br>• Hipoperfusión nueva → C1 Fluidos<br>• Nueva infección → B1 Antibióticos'));
     }},
  ];

  const openState={a1:true};
  const bodyMap={};

  mods.forEach(m=>{
    const mc=div('mc'); mc.style.border=`1.5px solid ${m.color}`;
    const hd=div('mh'); hd.style.background=m.color+'18';
    const ht=mk('div',{cls:'mht',text:m.title});
    const arr=mk('div',{cls:'mar',text:openState[m.id]?'▲':'▼'});
    ap(hd,ht,arr);
    const body=div('mb');
    m.build(body);
    if(!openState[m.id]) body.style.display='none';
    bodyMap[m.id]=body;
    hd.onclick=()=>{
      openState[m.id]=!openState[m.id];
      body.style.display=openState[m.id]?'':'none';
      arr.textContent=openState[m.id]?'▲':'▼';
    };
    ap(mc,hd,body); c.appendChild(mc);
  });

  // reeval panel
  let reeval=false;
  const reBtn=btn('🔄 Reevaluación','btn-w',()=>{
    reeval=!reeval; rvPanel.style.display=reeval?'':'none';
  });
  const restBtn=btn('↩ Nueva Evaluación','btn-d',()=>{ step=0; data={}; render(); });
  const actBtns=div('bgrp'); actBtns.style.marginTop='16px'; ap(actBtns,reBtn,restBtn);
  c.appendChild(actBtns);

  const rvPanel=div('al al-b'); rvPanel.style.display='none';
  rvPanel.appendChild(mk('b',{text:'Módulo de Reevaluación activo — Nodo E1'}));
  const rvGrp=div('bgrp'); rvGrp.style.marginTop='8px';
  [['↩ Vasopresores','btn-d','c2'],['↩ Fluidos','','c1'],['↩ Antibióticos','','b1']].forEach(([lbl,cls,id])=>{
    const b=btn(lbl,cls,()=>{
      openState[id]=true;
      bodyMap[id].style.display='';
      bodyMap[id].parentElement.querySelector('.mar').textContent='▲';
      bodyMap[id].scrollIntoView({behavior:'smooth',block:'start'});
    });
    if(id==='b1') b.style.background='#7c3aed';
    rvGrp.appendChild(b);
  });
  rvPanel.appendChild(rvGrp);
  c.appendChild(rvPanel);

  return c;
}

// ── init ─────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
