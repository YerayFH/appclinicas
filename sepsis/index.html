<style>
:root {

  --text:#1e293b;--text2:#64748b;--text3:#93c5fd;

}
body.dark {
  --bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#60a5fa;
  --hdr1:#020817;--hdr2:#0f172a;--hdr3:#1e293b;
  --prog-bg:#1e293b;--prog-dot:#334155;--prog-dotTxt:#94a3b8;
  --inp-bg:#334155;--inp-border:#475569;--inp-focus:#60a5fa;
  --btn-g-bg:#334155;--btn-g-txt:#e2e8f0;
  --alert-r-bg:#450a0a;--alert-r-border:#991b1b;--alert-r-title:#fca5a5;
  --alert-y-bg:#422006;--alert-y-border:#92400e;--alert-y-title:#fcd34d;
  --alert-g-bg:#052e16;--alert-g-border:#166534;--alert-g-title:#86efac;
  --alert-b-bg:#172554;--alert-b-border:#1d4ed8;--alert-b-title:#93c5fd;
  --alert-p-bg:#2e1065;--alert-p-border:#6d28d9;--alert-p-title:#c4b5fd;

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;transition:background .2s,color .2s}
a{color:#2563eb}

#hdr{background:var(--hdr2);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-wrap:wrap}

.bgrp{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}

.al-g{background:var(--alert-g-bg);border:1.5px solid var(--alert-g-border)}.al-g b{color:var(--alert-g-title)}

.sr{display:flex;justify-content:space-between;font-size:12px;padding:3px 0}

.mc{border-radius:10px;margin-bottom:10px;overflow:hidden}

.mht{font-weight:700;color:var(--hdr3);font-size:14px;flex:1;min-width:0;word-break:break-word}
.mar{color:var(--text2);flex-shrink:0}
.mb{padding:14px 16px;font-size:13px;line-height:1.85;word-break:break-word;overflow-wrap:break-word;background:var(--surface)}
.r2row{display:flex;flex-wrap:wrap;gap:2px 8px;margin-bottom:7px}
.r2l{color:var(--text2)}.r2v{font-weight:700;word-break:break-word}
.dxbox{border-radius:12px;padding:20px;text-align:center;margin-top:12px}
.dxtit{font-size:12px;color:var(--text2);margin-bottom:4px}
.dxname{font-size:clamp(18px,5vw,26px);font-weight:800}
.dxsub{font-size:13px;margin-top:6px}
/* Toggle switch */
.toggle-row{display:flex;align-items:center;gap:10px;margin:10px 0}
.toggle-lbl{font-size:13px;font-weight:600;color:var(--text);flex:1}

.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border);border-radius:24px;transition:.2s}

/* Glasgow quick buttons */

.gcs-btn.sel{background:#2563eb;color:#fff;border-color:#2563eb}
/* PaO2/FiO2 calc */
.pf-calc{background:var(--surface2);border-radius:8px;padding:12px;margin-top:4px;border:1px solid var(--border)}
.pf-result{font-size:13px;font-weight:700;color:#2563eb;margin-top:6px}
/* checkbox */
.cb-row{display:flex;align-items:center;gap:8px;margin:8px 0}
.cb-row input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:#2563eb}
.cb-lbl{font-size:13px;font-weight:600;color:var(--text)}
#footer{padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--text2);line-height:1.8;transition:background .2s}
.hidden{display:none!important}
#welcome{display:flex;justify-content:center;padding:24px}
#welcome .card{max-width:560px;text-align:center}

<body class="dark">
<div id="top-banner"><h1>🏛 Farmacia Hospitalaria · Hospital Universitario Puerto Real</h1></div>
<div id="hdr">
  <div id="hdr-left">
    <div>
      <div id="hdr-title">🏥 SEPSIS DECISION SUPPORT</div>
      <div id="hdr-sub">SSC 2021 · NICE 2025 · J-SSCG 2024 — Clinical Decision Aid</div>
    </div>
  </div>
  <div id="hdr-right">
    <div id="step-counter"></div>
    
  </div>
</div>
<div id="status-bar" class="hidden"></div>
<div id="prog-mobile" class="hidden"></div>
<div id="prog" class="hidden"></div>
<div id="main"></div>
<div id="footer">
  <strong style="color:var(--text)">Autor:</strong> Yeray Reyes de la Mata<br>
  <strong style="color:var(--text)">Contacto:</strong> <a href="mailto:ydelamata01@gmail.com">ydelamata01@gmail.com</a>
</div>

<script>
const STEPS=["Sospecha","Lactato","NEWS/SIRS","qSOFA","SOFA","Clasificación","Manejo"];
let step=0,data={},darkMode=true;

function toggleDark(){
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  document.getElementById('dark-toggle').textContent=darkMode?'☀️ Claro':'🌙 Oscuro';
  // update toggle label on init

}
function $(id){return document.getElementById(id);}
function mk(tag,props){
  const e=document.createElement(tag);
  if(props) for(const[k,v]of Object.entries(props)){
    if(k==='cls')e.className=v;
    else if(k==='text')e.textContent=v;
    else if(k==='html')e.innerHTML=v;
    else if(k==='style')e.style.cssText=v;
    else e.setAttribute(k,v);
  }
  return e;
}
function ap(p,...k){k.forEach(c=>c&&p.appendChild(c));return p;}
function div(cls){const d=document.createElement('div');if(cls)d.className=cls;return d;}
function divider(){return div('dv');}
function btn(label,cls,onclick){
  const b=mk('button',{cls:'btn '+(cls||''),text:label});
  b.onclick=onclick;return b;
}

// Limits for visual warning on inputs
const WARN_LIMITS={
  spo2:[50,100],fr:[4,50],tas:[50,250],fc:[30,200],temp:[32,42],
  pf:[20,600],pla:[1,800],bili:[0,40],pam:[20,200],cr:[0,25],di:[0,6000],
  pa:[40,700],fio2:[21,100]
};
function numInp(label,initVal,min,max,step_,unit,warnFn,warnKey){
  const wrap=div('');
  const lbl=mk('label',{cls:'lbl',text:unit?label+' ('+unit+')':label});
  const inp=mk('input',{type:'number',min,max,step:step_||'any'});
  inp.value=initVal;
  const wm=div('wmsg hidden');
  function check(){
    const v=Number(inp.value);
    const w=warnFn?warnFn(v):null;
    // Extreme value border
    const lim=warnKey&&WARN_LIMITS[warnKey];
    const extreme=lim&&(v<lim[0]||v>lim[1]);
    inp.classList.toggle('inp-warn',!!(w||extreme));
    wm.textContent=w||(extreme?'Valor extremo — verificar':'');
    (w||extreme)?wm.classList.remove('hidden'):wm.classList.add('hidden');
  }
  inp.addEventListener('input',check);
  inp.addEventListener('blur',()=>{const n=clamp(Number(inp.value),min,max);inp.value=n;check();});
  ap(wrap,lbl,inp,wm);return{wrap,inp};
}
function selInp(label,options,initVal){
  const wrap=div('');
  const lbl=mk('label',{cls:'lbl',text:label});
  const sel=mk('select');
  options.forEach(([v,t])=>{const o=mk('option',{value:v,text:t});if(v===initVal)o.selected=true;sel.appendChild(o);});
  ap(wrap,lbl,sel);return{wrap,sel};
}
function alert_(color,title,bodyHTML){
  const d=div('al al-'+color);
  if(title){const b=mk('b',{text:title});d.appendChild(b);}
  const p=document.createElement('p');p.innerHTML=bodyHTML||'';d.appendChild(p);
  return d;
}
function scoreBox(score,denom,pos,posLbl,negLbl){
  const d=div('sbox');d.style.background=pos?'var(--alert-r-bg)':'var(--alert-g-bg)';
  const num=mk('div',{cls:'snum',text:String(score)});
  if(denom){const sp=mk('span',{style:'font-size:18px',text:'/'+denom});num.appendChild(sp);}
  num.style.color=pos?'#dc2626':'#16a34a';
  const lbl=mk('div',{cls:'slbl',text:pos?posLbl:negLbl});lbl.style.color=pos?'#dc2626':'#16a34a';
  ap(d,num,lbl);return d;
}
function r2row(label,val){
  const d=div('r2row');
  ap(d,mk('span',{cls:'r2l',text:label}),mk('strong',{cls:'r2v',text:val}));
  return d;
}
function clamp(v,mn,mx){return Math.min(mx,Math.max(mn,isNaN(Number(v))?mn:Number(v)));}
function save(obj){Object.assign(data,obj);}
function go(s){step=s;render();window.scrollTo(0,0);}

// Glasgow quick-select helper
function gcsWidget(label,initGcs,onChange){
  const wrap=div('');
  wrap.appendChild(mk('div',{cls:'lbl',text:label}));
  const opts=[[15,15,'15'],[13,14,'13–14'],[9,12,'9–12'],[3,8,'≤8']];
  const btnRow=div('gcs-btns');
  let selMin=initGcs,selMax=initGcs;
  // find which bucket initGcs falls in
  let initBucket=opts[0];
  for(const o of opts){if(initGcs>=o[0]&&initGcs<=o[1]){initBucket=o;break;}}
  const btns=opts.map(([mn,mx,lbl])=>{
    const b=mk('button',{cls:'gcs-btn'+(initBucket[0]===mn?' sel':''),text:lbl});
    b.type='button';
    b.onclick=()=>{
      btns.forEach(bb=>bb.classList.remove('sel'));b.classList.add('sel');
      selMin=mn;selMax=mx;
      onChange(mx); // use max (less severe) value when not specific
    };
    btnRow.appendChild(b);return b;
  });
  wrap.appendChild(btnRow);
  return{wrap,getVal:()=>selMax,getMin:()=>selMin};
}

// Toggle switch helper
function toggleSwitch(label,initVal,onChange){
  const row=div('toggle-row');
  const lbl=mk('span',{cls:'toggle-lbl',text:label});
  const tog=mk('label',{cls:'toggle'});
  const inp=mk('input',{type:'checkbox'});
  if(initVal)inp.checked=true;
  const slider=div('toggle-slider');
  inp.addEventListener('change',()=>onChange(inp.checked));
  ap(tog,inp,slider);ap(row,lbl,tog);
  return{row,inp};
}

// ── Scales ────────────────────────────────────────────────────────
// NEWS2 with Scale 2 support for SpO2 target 88-92%
function newsSpO2Score(spo2,o2sup,scale2){
  if(scale2){
    // Scale 2: only used when target is 88-92% (e.g. COPD)
    if(spo2>=93&&o2sup)return 3;
    if(spo2>=93&&!o2sup)return 0;
    if(spo2>=88)return 0;
    if(spo2>=86)return 1;
    if(spo2>=84)return 2;
    return 3;
  } else {
    if(spo2<=91)return 3;
    if(spo2<=93)return 2;
    if(spo2<=95)return 1;
    return 0;
  }
}
function calcNEWS(d){
  let s=0;
  const{spo2,fr,tas,fc,temp,conc,o2sup,scale2}=d;
  s+=newsSpO2Score(spo2,o2sup,scale2);
  if(fr<=8)s+=3;else if(fr<=11)s+=1;else if(fr<=20)s+=0;else if(fr<=24)s+=2;else s+=3;
  if(tas<=90)s+=3;else if(tas<=100)s+=2;else if(tas<=110)s+=1;else if(tas<=219)s+=0;else s+=3;
  if(fc<=40)s+=3;else if(fc<=50)s+=1;else if(fc<=90)s+=0;else if(fc<=110)s+=1;else if(fc<=130)s+=2;else s+=3;
  if(temp<=35)s+=3;else if(temp<=36)s+=1;else if(temp<=38)s+=0;else if(temp<=39)s+=1;else s+=2;
  s+=conc==='Alerta'?0:3;s+=o2sup?2:0;return s;
}
function calcSIRS(d){
  return((d.temp>38||d.temp<36)?1:0)+(d.fc>90?1:0)+(d.fr>20?1:0)+((d.leucos>12||d.leucos<4)?1:0);
}
// SOFA with ventilation flag for respiratory scoring
function sofaRespScore(pf,ventilated){
  if(pf<=100)return ventilated?4:2;
  if(pf<=200)return ventilated?3:2;
  if(pf<=300)return 2;
  if(pf<=400)return 1;
  return 0;
}
function sofaBD(d){
  const{pf,pla,bili,cv,pam,gcs,cr,di,ventilated}=d;
  let plq=0,bl=0,cvs=0,neu=0,ren=0;
  const res=sofaRespScore(pf,ventilated);
  if(pla<20)plq=4;else if(pla<50)plq=3;else if(pla<100)plq=2;else if(pla<150)plq=1;
  if(bili>=12)bl=4;else if(bili>=6)bl=3;else if(bili>=2)bl=2;else if(bili>=1.2)bl=1;
  // Updated CV scoring: epiLow = epinefrina ≤0.1 = 3pts
  if(cv==='dopa15'||cv==='epiHigh'||cv==='nrA')cvs=4;
  else if(cv==='dopa510'||cv==='nrB'||cv==='epiLow')cvs=3;
  else if(cv==='dopa5'||cv==='dobu')cvs=2;
  else if(pam<70)cvs=1;
  if(gcs<6)neu=4;else if(gcs<10)neu=3;else if(gcs<13)neu=2;else if(gcs<15)neu=1;
  if(cr>=5||di<200)ren=4;
  else if((cr>=3.5&&cr<5)||(di>=200&&di<500))ren=3;
  else if(cr>=2&&cr<3.5)ren=2;
  else if(cr>=1.2&&cr<2)ren=1;
  return{res,plq,bl,cvs,neu,ren};
}
function calcSOFA(d){const b=sofaBD(d);return b.res+b.plq+b.bl+b.cvs+b.neu+b.ren;}

// ── Chrome & Status Bar ─────────────────────────────────────────
function updateStatusBar(){
  const sb=$('status-bar');
  if(step<=1){sb.classList.add('hidden');return;}
  sb.classList.remove('hidden');
  const items=[];
  if(data.lactato!==undefined){
    const v=Number(data.lactato).toFixed(1);
    const cls=data.lacPos?'sb-pos':'sb-neg';
    items.push(`<div class="sb-item"><span class="sb-label">Lactato</span><span class="sb-val ${cls}">${v} mmol/L</span></div>`);
  }
  if(data.news!==undefined){
    const cls=data.newsPos?'sb-pos':'sb-neg';
    items.push(`<div class="sb-item"><span class="sb-label">NEWS</span><span class="sb-val ${cls}">${data.news}</span></div>`);
  }
  if(data.sirs!==undefined){
    const cls=data.sirs>=2?'sb-pos':'sb-neg';

function updateChrome(){
  const sc=$('step-counter'),prog=$('prog'),progM=$('prog-mobile');
  if(step===0){sc.textContent='';prog.classList.add('hidden');progM.classList.add('hidden');return;}
  sc.textContent='Paso '+step+' / '+STEPS.length;
  progM.classList.remove('hidden');
  progM.textContent='Paso '+step+' de '+STEPS.length+': '+STEPS[step-1];
  prog.classList.remove('hidden');prog.innerHTML='';
  STEPS.forEach((lbl,i)=>{
    const done=step>i+1,active=step===i+1;
    const dot=mk('div',{cls:'pd'+(done?' dn':active?' act':''),text:done?'✓':String(i+1)});
    const label=mk('span',{cls:'pl'+(active?' act':''),text:lbl});
    const item=div('pi');ap(item,dot,label);prog.appendChild(item);
    if(i<STEPS.length-1){const conn=div('pc');prog.appendChild(conn);}
  });
  updateStatusBar();
}
function render(){
  updateChrome();
  const main=$('main');main.innerHTML='';
  if(step===0)main.appendChild(renderWelcome());
  else if(step===1)main.appendChild(renderS1());
  else if(step===2)main.appendChild(renderS2());

  else if(step===4)main.appendChild(renderS4());
  else if(step===5)main.appendChild(renderS5());
  else if(step===6)main.appendChild(renderS6());
  else if(step===7)main.appendChild(renderS7());
}

  function calcPF(){
    const pa=clamp(iPa.value,20,700);
    const fi=clamp(iFio2.value,21,100);
    return Math.round(pa/(fi/100));
  }
  function updatePfCalc(){
    const pf=calcPF();
    pfRes.textContent='PaO₂/FiO₂: '+pf+' mmHg'+(pf<=100?' 🔴 Fallo severo':pf<=200?' 🟠 Fallo moderado':pf<=300?' 🟡 Leve':'');
    pfHidden.value=pf;
    update();
  }

  function getVals(){
    return{pf:calcPF(),pla:clamp(iPla.value,0,800),bili:clamp(iBili.value,0,40),
      cv:sCv.value,pam:clamp(iPam.value,20,200),gcs:getGcsSofa(),
      cr:clamp(iCr.value,0,25),di:clamp(iDi.value,0,6000),
      ventilated:ventCb.checked,
      _pa:clamp(iPa.value,20,700),_fio2:clamp(iFio2.value,21,100)};
  }
  function update(){
    const v=getVals(),bas=clamp(bInp.value,0,24);
    const bd=sofaBD(v);
    const score=bd.res+bd.plq+bd.bl+bd.cvs+bd.neu+bd.ren,delta=score-bas;
    bdEl.innerHTML='';
    const bdBox=div('');bdBox.style.cssText='background:var(--surface2);border-radius:8px;padding:12px;margin-bottom:10px;border:1px solid var(--border)';
    bdBox.appendChild(mk('div',{style:'font-weight:600;font-size:13px;margin-bottom:6px',text:'Desglose SOFA por órgano'}));
    [['Respiratorio (PaO₂/FiO₂'+(v.ventilated?', VM/CPAP)':' sin VM)'),bd.res],
     ['Coagulación (Plaquetas)',bd.plq],['Hepático (Bilirrubina)',bd.bl],
     ['Cardiovascular',bd.cvs],['Neurológico (Glasgow)',bd.neu],['Renal',bd.ren]].forEach(([lbl,val])=>{
      const r=div('sr');r.appendChild(mk('span',{text:lbl}));
      const v2=mk('strong',{text:val>0?'+'+val+' pts':'0 pts'});v2.style.color=val>0?'#dc2626':'#16a34a';r.appendChild(v2);bdBox.appendChild(r);
    });
    if(!v.ventilated&&v.pf<=200){
      bdBox.appendChild(mk('p',{style:'font-size:11px;color:#d97706;margin-top:6px',text:'⚠ Sin VM/CPAP: puntuación respiratoria limitada a máx. 2 pts (marcar checkbox si hay soporte ventilatorio)'}));
    }
    bdEl.appendChild(bdBox);
    scEl.innerHTML='';
    const sr=div('r2c');const b1=div('col'),b2=div('col');
    const sb1=div('sbox');sb1.style.background='var(--alert-b-bg)';sb1.style.border='1.5px solid var(--alert-b-border)';
    const l1=mk('div',{style:'font-size:13px;color:var(--text2);text-align:center;margin-bottom:4px',text:'SOFA actual'});
    const n1=mk('div',{cls:'snum',text:score+'/24'});n1.style.color='#2563eb';ap(sb1,l1,n1);b1.appendChild(sb1);
    const pos=delta>=2;
    const sb2=div('sbox');sb2.style.background=pos?'var(--alert-r-bg)':'var(--alert-g-bg)';sb2.style.border='1.5px solid '+(pos?'#fca5a5':'#86efac');
    const l2=mk('div',{style:'font-size:13px;color:var(--text2);text-align:center;margin-bottom:4px',text:'ΔSOFA vs. basal'});
    const n2=mk('div',{cls:'snum',text:(delta>=0?'+':'')+delta});n2.style.color=pos?'#dc2626':'#16a34a';
    const l3=mk('div',{cls:'slbl',text:pos?'≥2 — Criterio SEPSIS cumplido':'<2 — Sin criterios'});l3.style.color=pos?'#dc2626':'#16a34a';
    ap(sb2,l2,n2,l3);b2.appendChild(sb2);ap(sr,b1,b2);scEl.appendChild(sr);
  }
  function submitS5(){
    const v=getVals(),bas=clamp(bInp.value,0,24);
    const score=calcSOFA(v),delta=score-bas;
    save({sofaVars:v,sofa:score,sofaBasal:bas,sofaDelta:delta,sofaPos:delta>=2});go(6);
  }
  [iPa,iFio2].forEach(i=>i.addEventListener('input',updatePfCalc));
  [iPla,iBili,iPam,sCv,iCr,iDi,bInp].forEach(i=>i.addEventListener('input',update));
  ventCb.addEventListener('change',update);
  updatePfCalc();
  return c;
}

// ── S6: Clasificación ────────────────────────────────────────────
function renderS6(){
  const initPam=data.pamActual||65;
  const c=div('card');
  ap(c,mk('div',{cls:'ct',text:'🏷 Step 6 — Clasificación Final'}),
       mk('div',{cls:'cs',text:'Criterios Sepsis-3 / SSC 2021 · Nodos 5-6'}));
  c.appendChild(alert_('b','Criterios diagnósticos (Sepsis-3)',
    '• <strong>ΔSOFA ≥2</strong> → Sepsis<br>'
    +'• Sepsis + vasopresores para PAM ≥65 + Lactato &gt;2 mmol/L → <strong>Shock Séptico</strong><br>'
    +'• Shock séptico: emergencia · Traslado UCI en &lt;6h · Escalamiento terapéutico máximo'));

  const tags=div('tags');
  [[`ΔSOFA ≥2 (Δ=${data.sofaDelta??'—'})`,data.sofaDelta>=2],
   [`Lactato >2 (${Number(data.lactato||0).toFixed(1)})`,data.lacPos],
   ['NEWS2 ≥5',data.newsPos],['qSOFA ≥2',data.qsofaPos]].forEach(([lbl,pos])=>{
    tags.appendChild(mk('div',{cls:'tag '+(pos?'tag-p':'tag-n'),text:(pos?'✓':'✗')+' '+lbl}));
  });
  c.appendChild(tags);

  const{wrap:wPam,inp:iPam}=numInp('PAM actual',initPam,20,200,1,'mmHg',v=>Number(v)<65?'PAM <65 mmHg — umbral crítico de perfusión':null,'pam');
  c.appendChild(wPam);
  c.appendChild(mk('label',{cls:'lbl',text:'Respuesta a carga de cristaloides balanceados (30 mL/kg)'}));
  const rfGrp=div('bgrp');let rfSel=data.respFluid||'';
  const rfOpts=['Adecuada (PAM ≥65)','Refractaria (PAM <65 persiste)','No aplica / No administrada'];
  const rfBtns=rfOpts.map(v=>{
    const b=btn(v,rfSel===v?'btn-s':'btn-g',()=>{rfSel=v;rfBtns.forEach((bb,i)=>bb.className='btn '+(rfOpts[i]===v?'btn-s':'btn-g'));dxUpdate();});
    rfGrp.appendChild(b);return b;
  });
  c.appendChild(rfGrp);
  c.appendChild(mk('label',{cls:'lbl',text:'¿Requiere vasopresores para mantener PAM ≥65 mmHg?'}));
  const vpGrp=div('bgrp');let vpSel=data.vasoPresores!==undefined?data.vasoPresores:null;
  const vpBtns=[['Sí',true],['No',false]].map(([lbl,v])=>{
    const active=vpSel===v;
    const b=btn(lbl,active?(v?'btn-d':'btn-s'):'btn-g',()=>{vpSel=v;vpBtns.forEach((bb,i)=>{const vv=[true,false][i];bb.className='btn '+(vpSel===vv?(vv?'btn-d':'btn-s'):'btn-g');});dxUpdate();});
    vpGrp.appendChild(b);return b;
  });
  c.appendChild(vpGrp);c.appendChild(divider());
  const dxEl=div('');c.appendChild(dxEl);
  const nxtBtn=btn('Ver Plan Terapéutico →','btn-s',submitS6);
  const nav=div('bgrp');nav.style.marginTop='16px';ap(nav,btn('← Anterior','btn-o',()=>go(5)),nxtBtn);c.appendChild(nav);

  function getDx(){
    const sep=data.sofaDelta>=2,shock=sep&&vpSel===true&&data.lacPos;
    let dx,bg,bd,col;
    if(shock){dx='SHOCK SÉPTICO';bg='var(--alert-r-bg)';bd='#fca5a5';col='#dc2626';}
    else if(sep){dx='SEPSIS';bg='var(--alert-y-bg)';bd='#fcd34d';col='#d97706';}
    else if(data.newsPos||data.qsofaPos||data.lacPos){dx='SOSPECHA DE SEPSIS';bg='var(--alert-y-bg)';bd='#fcd34d';col='#d97706';}
    else{dx='SEPSIS NO CONFIRMADA';bg='var(--alert-g-bg)';bd='#86efac';col='#16a34a';}
    return{dx,bg,bd,col,sep,shock};
  }
  function dxUpdate(){
    const{dx,bg,bd,col,sep,shock}=getDx();
    dxEl.innerHTML='';
    const box=div('dxbox');box.style.cssText=`background:${bg};border:2px solid ${bd}`;
    box.appendChild(mk('div',{cls:'dxtit',text:'DIAGNÓSTICO (Sepsis-3 / SSC 2021)'}));
    const name=mk('div',{cls:'dxname',text:dx});name.style.color=col;box.appendChild(name);
    const sub=shock?'Escalamiento terapéutico máximo · Hour-1 Bundle · UCI en <6h':sep&&!shock?'Activar manejo terapéutico · Evaluar UCI':'';
    if(sub){const s=mk('div',{cls:'dxsub',html:sub});s.style.color=col;box.appendChild(s);}
    dxEl.appendChild(box);
    nxtBtn.disabled=!rfSel;
  }
  iPam.addEventListener('input',dxUpdate);dxUpdate();

  function submitS6(){
    if(!rfSel)return;
    const pam=clamp(iPam.value,20,200);
    const{dx,sep,shock}=getDx();
    const dxCol=shock?'red':sep?'yellow':'green';
    save({pamActual:pam,vasoPresores:vpSel,respFluid:rfSel,dx,shockSeptico:shock,sepsis:sep,dxCol});go(7);
  }
  return c;
}

  const actBtns=div('bgrp');actBtns.style.marginTop='16px';
  actBtns.appendChild(btn('↩ Nueva Evaluación','btn-d',()=>{step=0;data={};render();}));
  c.appendChild(actBtns);
  return c;
}

render();
</script>
