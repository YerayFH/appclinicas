// --- VARIABLES DE ESTADO ---
let MODE = 'normal';

// --- FUNCIONES DE INTERFAZ Y MODO ---
function setMode(m){
  MODE = m;
  // Actualizar botones (pestañas)
  ['normal','hd','hfvvc'].forEach(id => {
    const el = document.getElementById('tab_' + id);
    if(el) el.classList.toggle('act', id === m);
  });

  // Actualizar barra de información
  const bar = document.getElementById('mode_bar');
  const fgRow = document.getElementById('fg_row');
  const cr = document.getElementById('creatinine');
  const fgm = document.getElementById('fg_manual');

  if(m === 'normal'){
    bar.className = 'mode-bar mb-normal';
    bar.textContent = '🫘 Cálculo por filtrado glomerular (FG)';
    if(fgRow) fgRow.style.display = '';
    if(cr) cr.disabled = false;
    if(fgm) fgm.disabled = false;
  } else if(m === 'hd'){
    bar.className = 'mode-bar mb-hd';
    bar.textContent = '🩸 Hemodiálisis — columna HD';
    if(fgRow) fgRow.style.display = 'none';
    if(cr) cr.disabled = true;
    if(fgm) fgm.disabled = true;
  } else {
    bar.className = 'mode-bar mb-hfvvc';
    bar.textContent = '🔄 HFVVC — hemofiltración venovenosa continua';
    if(fgRow) fgRow.style.display = 'none';
    if(cr) cr.disabled = true;
    if(fgm) fgm.disabled = true;
  }
  updateFGDisplay();
}

// --- FUNCIONES DE CÁLCULO RENAL ---
function calcCG(age,sex,w,cr){if(!age||!sex||!w||!cr||cr<=0)return null;let v=((140-age)*w)/(72*cr);if(sex==='F')v*=0.85;return Math.round(v*10)/10;}
function calcCKDEPI(age,sex,cr){if(!age||!sex||!cr||cr<=0)return null;const k=sex==='F'?0.7:0.9,a=sex==='F'?-0.241:-0.302;const mn=Math.min(cr/k,1),mx=Math.max(cr/k,1);let v=142*Math.pow(mn,a)*Math.pow(mx,-1.2)*Math.pow(0.9938,age);if(sex==='F')v*=1.012;return Math.round(v*10)/10;}

function getFG(){
  if(MODE !== 'normal') return null;
  const manual = parseFloat(document.getElementById('fg_manual').value);
  if(!isNaN(manual) && manual > 0) return {val: manual, method: 'Manual'};
  const age = parseFloat(document.getElementById('age').value);
  const sex = document.getElementById('sex').value;
  const weight = parseFloat(document.getElementById('weight').value);
  const cr = parseFloat(document.getElementById('creatinine').value);
  const height = parseFloat(document.getElementById('height').value);
  if(age && sex && weight && cr){
    let w = weight;
    if(height){
      const ibw = sex === 'M' ? 50 + 0.91 * (height - 152.4) : 45.5 + 0.91 * (height - 152.4);
      w = weight > ibw ? ibw + 0.4 * (weight - ibw) : weight;
    }
    const cg = calcCG(age,sex,w,cr);
    if(cg) return {val: cg, method: 'Cockcroft-Gault'};
  }
  if(age && sex && cr){
    const ckd = calcCKDEPI(age,sex,cr);
    if(ckd) return {val: ckd, method: 'CKD-EPI'};
  }
  return null;
}

function updateFGDisplay(){
  const disp = document.getElementById('fg_display');
  const meth = document.getElementById('fg_method');
  if(!disp || !meth) return;
  if(MODE !== 'normal'){ disp.textContent = '—'; meth.textContent = ''; return; }
  const r = getFG();
  disp.textContent = r ? r.val + ' ml/min' : '—';
  meth.textContent = r ? 'Método: ' + r.method : 'Introduce datos';
}

// --- LÓGICA DE BÚSQUEDA Y ANÁLISIS ---
function normalizeText(t) { return t.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim(); }

function findDrug(name) {
  let clean = normalizeText(name);
  return DB.find(d => normalizeText(d.name) === clean || (d.al && d.al.some(a => normalizeText(a) === clean)));
}

function clearAll() {
  ['age','weight','height','creatinine','fg_manual','drug_input'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value = '';
  });
  document.getElementById('sex').value = '';
  updateFGDisplay();
  document.getElementById('results_area').innerHTML = '<div class="empty-state"><div class="empty-icon">🩺</div><p>Selecciona el modo renal e introduce datos.</p></div>';
}

function loadExample() {
  document.getElementById('age').value = '78';
  document.getElementById('sex').value = 'F';
  document.getElementById('weight').value = '65';
  document.getElementById('creatinine').value = '1.8';
  document.getElementById('drug_input').value = "Omeprazol 40 mg\nMetformina 850 mg\nEnoxaparina 40 mg cada 24h\nGabapentina 300 mg cada 8 h";
  setMode('normal');
  analyze();
}

function analyze() {
  const inputText = document.getElementById('drug_input').value;
  const lines = inputText.split('\n').filter(l => l.trim().length > 0);
  if (lines.length === 0) { alert("Introduce al menos un fármaco."); return; }

  const fgData = getFG();
  const fgValue = fgData ? fgData.val : null;

  let modeTitle = (MODE === 'normal') ? (fgValue !== null ? `🫘 FG: ${fgValue} ml/min` : "🫘 Función Renal") : (MODE === 'hd' ? "🩸 Hemodiálisis" : "🔄 HFVVC");

  let html = `<div class="mode-bar-result mb-${MODE}">${modeTitle}</div><div class="scroll-table"><table><thead><tr><th>FÁRMACO</th><th>DOSIS ESTÁNDAR</th><th>RECOMENDACIÓN HUPR</th></tr></thead><tbody>`;

  lines.forEach(line => {
    let words = line.split(/\s+/);
    let drug = findDrug(words[0]) || (words.length > 1 ? findDrug(words[0] + " " + words[1]) : null);

    if (!drug) {
      html += `<tr class="row-unk"><td><div class="dname">${line}</div></td><td>—</td><td><span class="badge b-unk">No encontrado en guía</span></td></tr>`;
      return;
    }

    let rec = (MODE === 'hd') ? drug.hd : (MODE === 'hfvvc') ? drug.hv : (fgValue >= 50 ? drug.r1 : (fgValue >= 10 ? drug.r2 : drug.r3));
    
    // Asignación de color según recomendación
    let bClass = "b-nd";
    let rClass = "row-nd";
    let lowRec = rec.toLowerCase();
    if(lowRec.includes("evitar") || lowRec.includes("contraindicado")) { bClass="b-err"; rClass="row-err"; }
    else if(lowRec.includes("precaución") || lowRec.includes("monitorizar")) { bClass="b-warn"; rClass="row-warn"; }
    else if(lowRec.includes("100%")) { bClass="b-ok"; rClass="row-ok"; }

    html += `<tr class="${rClass}"><td><div class="dname">${drug.name.toUpperCase()}</div><div class="dcat">${drug.cat}</div></td><td>${drug.dn}</td><td><span class="badge ${bClass}">${rec}</span></td></tr>`;
  });

  document.getElementById('results_area').innerHTML = html + "</tbody></table></div>";
}

// --- INICIALIZACIÓN ---
window.onload = function() {
  ['age','sex','weight','height','creatinine','fg_manual'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.addEventListener('input', updateFGDisplay);
  });
  updateFGDisplay();
};
</script>
</body>
</html>
