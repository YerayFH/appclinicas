<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ictus Isquémico Agudo — Motor de Decisión Terapéutica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#020817;color:#f1f5f9;font-family:'Inter',sans-serif;padding:24px 16px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:22px;font-weight:800;margin:0 0 4px;color:#f1f5f9}
h2{font-size:20px;font-weight:800;color:#f1f5f9;margin:0}
input,select{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:10px 14px;width:100%;font-size:15px;outline:none}
input[type="datetime-local"]{color-scheme:dark}
select option{background:#1e293b}
button{cursor:pointer;font-family:inherit}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.field .hint{font-size:11px;color:#64748b;margin-top:4px}
.yesno{display:flex;gap:10px}
.yesno button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.yesno button.sel-yes{background:#ef4444;border-color:#ef4444;color:#fff}
.yesno button.sel-no{background:#22c55e;border-color:#22c55e;color:#fff}
.section-box{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:18px 20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b}
.row-item span:first-child{color:#94a3b8;font-size:14px}
.row-item span:last-child{font-weight:600;font-size:14px;text-align:right;max-width:60%}
.alert-box{border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.info-box{border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.6}
.chip{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;display:inline-block}
.motivo-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:12px;color:#94a3b8;line-height:1.6}
.drug-list{border-radius:7px;padding:8px 12px;margin-top:6px;margin-bottom:4px}
.drug-list .dl-title{font-size:11px;font-weight:700;margin-bottom:6px;letter-spacing:0.5px}
.drug-list .dl-drugs{display:flex;flex-wrap:wrap;gap:4px 8px}
.drug-list .dl-drugs span{font-size:11px;color:#94a3b8;background:#1e293b;border:1px solid #334155;border-radius:4px;padding:2px 7px}
.progress-bar-wrap{margin-bottom:24px}
.progress-steps{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-step{flex:1;text-align:center}
.step-circle{width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.step-label{font-size:10px}
.progress-track{height:3px;background:#1e293b;border-radius:4px}
.progress-fill{height:100%;background:#0ea5e9;border-radius:4px;transition:width .3s}
.nav-btns{display:flex;gap:12px;margin-top:24px}
.nav-btns .btn-prev{flex:1;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;font-weight:600}
.mode-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.mode-btn.active{background:#0ea5e9;border-color:#0ea5e9;color:#fff}
.nihss-item{margin-bottom:10px;border-radius:8px;padding:8px 10px;transition:background .2s}
.nihss-item.missing{background:#ef444415;border:1px solid #ef444440}
.nihss-item-head{display:flex;align-items:center;gap:10px}
.nihss-item-info{flex:1}
.nihss-item-info .ni-label{font-size:12px;color:#94a3b8;margin-bottom:2px}
.nihss-item-info .ni-hint{font-size:10px;color:#475569}
.nihss-btns{display:flex;gap:4px;flex-wrap:wrap}
.nihss-btn{width:32px;height:32px;border-radius:6px;font-size:13px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#64748b}
.nihss-btn.active{background:#0ea5e9;border-color:#0ea5e9;color:#fff}
.nihss-total{margin-top:14px;padding:10px 12px;border-radius:8px;background:#0ea5e915;border:1px solid #0ea5e940;display:flex;justify-content:space-between;align-items:center}
.radio-opt{display:block;width:100%;text-align:left;margin-bottom:8px;padding:10px 14px;border-radius:8px;font-size:14px;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.radio-opt.active{background:#0ea5e915;border-color:#0ea5e9;color:#f1f5f9}
.radio-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid #475569;background:transparent;transition:all .2s;display:inline-block}
.radio-dot.active{border-color:#0ea5e9;background:#0ea5e9}
.score-card{border-radius:10px;padding:14px}
.aspects-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.asp-btn{width:44px;height:44px;border-radius:8px;font-size:15px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#64748b;transition:all .2s}
.asp-btn.active{color:#fff}
.mrs-grid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.mrs-btn{min-width:44px;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#64748b;transition:all .2s;line-height:1.3;text-align:center}
.mrs-btn.active{color:#fff}
.veredicto-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.veredicto-card{border-radius:14px;padding:18px 14px;text-align:center}
.veredicto-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;opacity:.7}
.veredicto-emoji{font-size:36px;margin-bottom:6px}
.veredicto-titulo{font-size:18px;font-weight:900;margin-bottom:4px}
.veredicto-sub{font-size:11px;opacity:.75}
.subsec{border-radius:10px;padding:14px;margin-bottom:12px}
.subsec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.fast-track-btn{font-size:10px;font-weight:700;padding:4px 10px;border-radius:6px;border:1px solid #334155;background:#1e293b;color:#64748b;cursor:pointer;text-transform:none;letter-spacing:0}
.fast-track-btn:hover{background:#22c55e22;border-color:#22c55e;color:#22c55e}
.abort-btn{background:linear-gradient(135deg,#ef4444,#dc2626)!important;color:#fff!important;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #ef444440}50%{box-shadow:0 0 0 8px #ef444400}}
.footer-credit{margin-top:32px;padding-top:16px;border-top:1px solid #1e293b;text-align:center;line-height:1.8}
.footer-app{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;font-size:11px;color:#475569;text-align:center;line-height:1.7}
.tags{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
a{color:#0ea5e9;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
// ═══════════════ ESTADO ═══════════════
const INITIAL = {
  edad:"", peso:"", lkw:"", llegada:"",
  tiempoDesconocido:null, wakeUpDentro9h:null, sintomasReconocidos45h:null,
  nihssMode:"manual", nihss:"",
  nihssItems:{n1a:"",n1b:"",n1c:"",n2:"",n3:"",n4:"",n5a:"",n5b:"",n6a:"",n6b:"",n7:"",n8:"",n9:"",n10:"",n11:""},
  deficitIncapacitante:null,
  mrs: null,   // 0–5: Rankin modificado previo al ictus
  hemorragia:null, sospechaHSA:null, signosExtensosInfarto:null,
  aspects:"", lvo:null, territorioLVO:"",
  core:"", penumbra:"",
  dwiFlarMismatch:null, mismatchMode:null, mismatchAutoConfirm:false,
  pas:"", pad:"", plaquetas:"", glucemia:"", inr:"", ttpa:"",
  anticoagulante:"",
  heparina:null, heparinaTerapeutica:null,
  doacMenos48h:null, antiXaDisponible:null, antiXaNormal:null, idarucizumab:null,
  ictusReciente:null, cirugiaReciente:null, hemorragiaActiva:null,
  hicPrevio:null, hicPrevioReciente:null,
  embarazo:null, crisisEpileptica:null, iamReciente:null,
  neoplasiaCranealIntraaxial:null, neoplasiaCranealExtraaxial:null,
  sangradoGIReciente:null, endocarditisActiva:null,
  aasPrevia:null, etiologiaCardioembólica:null,
  antecedenteHIC:null, hepatopatiaGrave:null,
  inhibidorCYP2C19:null, inhibidorCYP3A4:null,
  bradicardiaSignificativa:null, bloqueoAV:null,
  disneaGrave:null, hiperuricemia:null, stentIntracraneal:null
};

let step = 0;
let d = JSON.parse(JSON.stringify(INITIAL));

const STEPS = ["Datos","Gravedad","Imagen","Mismatch","Contras","Resultado"];

const NIHSS_ITEMS = [
  {key:"n1a",label:"1a. Nivel de conciencia",max:3,hint:"0=alerta · 1=somnoliento · 2=estuporoso · 3=coma"},
  {key:"n1b",label:"1b. Preguntas (mes/edad)",max:2,hint:"0=ambas · 1=una · 2=ninguna"},
  {key:"n1c",label:"1c. Órdenes",max:2,hint:"0=ambas · 1=una · 2=ninguna"},
  {key:"n2",label:"2. Mirada conjugada",max:2,hint:"0=normal · 1=paresia · 2=desviación forzada"},
  {key:"n3",label:"3. Campos visuales",max:3,hint:"0=normal · 1=parcial · 2=completa · 3=ceguera"},
  {key:"n4",label:"4. Parálisis facial",max:3,hint:"0=normal · 1=leve · 2=parcial · 3=completa"},
  {key:"n5a",label:"5a. Motor brazo izq.",max:4,hint:"0=sin caída · 1=<5s · 2=<10s · 3=sin vs g. · 4=sin mov."},
  {key:"n5b",label:"5b. Motor brazo der.",max:4,hint:"0=sin caída · 1=<5s · 2=<10s · 3=sin vs g. · 4=sin mov."},
  {key:"n6a",label:"6a. Motor pierna izq.",max:4,hint:"0=sin caída · 1=<5s · 2=<10s · 3=sin vs g. · 4=sin mov."},
  {key:"n6b",label:"6b. Motor pierna der.",max:4,hint:"0=sin caída · 1=<5s · 2=<10s · 3=sin vs g. · 4=sin mov."},
  {key:"n7",label:"7. Ataxia",max:2,hint:"0=ausente · 1=una ext. · 2=dos ext."},
  {key:"n8",label:"8. Sensibilidad",max:2,hint:"0=normal · 1=leve-mod · 2=grave/ausente"},
  {key:"n9",label:"9. Lenguaje / Afasia",max:3,hint:"0=normal · 1=leve · 2=grave · 3=mudo/global"},
  {key:"n10",label:"10. Disartria",max:2,hint:"0=normal · 1=leve-mod · 2=grave/anartria"},
  {key:"n11",label:"11. Extinción / Negligencia",max:2,hint:"0=normal · 1=una modalidad · 2=profunda"}
];

const ANTICOAGULANTES = [
  {value:"",label:"— Seleccionar —"},
  {value:"ninguno",label:"Ninguno"},
  {value:"warfarina",label:"Warfarina / Acenocumarol (AVK)"},
  {value:"dabigatran",label:"Dabigatrán (Pradaxa®)"},
  {value:"rivaroxaban",label:"Rivaroxabán (Xarelto®)"},
  {value:"apixaban",label:"Apixabán (Eliquis®)"},
  {value:"edoxaban",label:"Edoxabán (Lixiana®)"}
];

const LVO_OPTIONS = [
  {value:"",label:"— Seleccionar —"},
  {value:"ICA",label:"ACI / ICA"},
  {value:"M1",label:"M1 (ACM segmento 1)"},
  {value:"M2_proximal",label:"M2 proximal (ACM seg. 2)"},
  {value:"M2_distal_M3",label:"M2 distal / M3 / ACA / ACP (MeVO)"},
  {value:"basilar",label:"Arteria basilar"},
  {value:"ACP",label:"ACP proximal"}
];

// MeVO = Oclusión de vaso mediano
const isMeVO = () => d.territorioLVO === "M2_distal_M3";

const CYP2C19_DRUGS = ["Omeprazol","Esomeprazol","Fluoxetina","Fluvoxamina","Ketoconazol","Voriconazol","Claritromicina","Amiodarona","Cimetidina"];
const CYP3A4_DRUGS  = ["Claritromicina","Eritromicina","Ketoconazol","Itraconazol","Voriconazol","Ritonavir","Cobicistat","Diltiazem","Verapamilo","Amiodarona"];

const MRS_LABELS = ["0 – Sin síntomas","1 – Sin discapacidad significativa","2 – Discapacidad leve","3 – Discapacidad moderada","4 – Moderada-grave","5 – Grave (encamado)"];
const MRS_COLORS = ["#22c55e","#84cc16","#eab308","#f97316","#ef4444","#dc2626"];

// ═══════════════ NAVEGACIÓN CON BYPASS ═══════════════
// Paso efectivo: si hemorragia confirmada → saltar a paso 5
// Si ventana estándar clara y no wake-up → saltar paso 3 (mismatch)
function getStepSequence() {
  // [0=datos, 1=nihss, 2=imagen, 3=mismatch, 4=contras, 5=resultado]
  if (d.hemorragia === true) return [0,1,2,5];          // Abortar protocolo
  const vi = getVentanaInfo();
  const skipMismatch = vi && vi.zona === "temprana" && d.tiempoDesconocido !== true;
  if (skipMismatch) return [0,1,2,4,5];
  return [0,1,2,3,4,5];
}

function getVisualStep() {
  // Retorna el índice de progreso visual (0-4 para pasos reales, 5 = resultado)
  const seq = getStepSequence();
  return seq.indexOf(step);
}

function nextStep() {
  if (!canNext()) return;
  const seq = getStepSequence();
  const idx = seq.indexOf(step);
  if (idx < seq.length - 1) { step = seq[idx + 1]; render(); }
}

function prevStep() {
  const seq = getStepSequence();
  const idx = seq.indexOf(step);
  if (idx > 0) { step = seq[idx - 1]; render(); }
}

function abortProtocol() {
  step = 5; render();
}

function resetAll() { step = 0; d = JSON.parse(JSON.stringify(INITIAL)); render(); }

// ═══════════════ HANDLERS ═══════════════
function onTextInput(el) { d[el.dataset.key] = el.value; updateNextBtn(); }
function onTextBlur(el)  { d[el.dataset.key] = el.value; render(); }
function onSelectChange(el) {
  const key = el.dataset.key; d[key] = el.value;
  if (key === "anticoagulante") { d.doacMenos48h=null; d.antiXaDisponible=null; d.antiXaNormal=null; d.idarucizumab=null; }
  render();
}
function handleYesNo(key, val) {
  d[key] = val;
  if (key === "tiempoDesconocido") { d.lkw=""; d.llegada=""; }
  if (key === "heparina" && !val) d.heparinaTerapeutica = null;
  if (key === "hicPrevio" && !val) d.hicPrevioReciente = null;
  if (key === "lvo" && !val) d.territorioLVO = "";
  render();
}
function handleMismatchMode(val) { d.mismatchMode=val; if(val!=="auto") d.mismatchAutoConfirm=false; render(); }
function handleNihssMode(mode) { d.nihssMode=mode; render(); }
function handleNihssBtn(key, val) { d.nihssItems[key]=String(val); render(); }
function handleMismatchCheck(checked) { d.mismatchAutoConfirm=checked; render(); }
function handleAspects(val) { d.aspects=val; render(); }
function handleMrs(val) { d.mrs=val; render(); }

// Fast-track: marcar todo como NO en una sección
function fastTrackNo(keys) {
  keys.forEach(k => d[k] = false);
  render();
}

function updateNextBtn() {
  const btn = document.getElementById("btn-next"); if(!btn) return;
  const ok = canNext();
  btn.disabled = !ok;
  btn.style.background = ok ? (d.hemorragia===true ? "linear-gradient(135deg,#ef4444,#dc2626)" : "linear-gradient(135deg,#0ea5e9,#6366f1)") : "#1e293b";
  btn.style.color = ok ? "#fff" : "#475469";
  btn.style.cursor = ok ? "pointer" : "not-allowed";
}

// ═══════════════ LÓGICA CLÍNICA ═══════════════
function nihssCategory(n) {
  if(n===0)  return {label:"Sin déficit",color:"#22c55e"};
  if(n<=3)   return {label:"Ictus menor",color:"#84cc16"};
  if(n<=5)   return {label:"Leve",color:"#eab308"};
  if(n<=14)  return {label:"Moderado",color:"#f97316"};
  if(n<=24)  return {label:"Grave",color:"#ef4444"};
  return           {label:"Muy grave",color:"#dc2626"};
}
function calcNihssAuto() { return NIHSS_ITEMS.reduce((a,it)=>a+Math.min(parseInt(d.nihssItems[it.key])||0,it.max),0); }
function nihssAllFilled() { return NIHSS_ITEMS.every(it=>d.nihssItems[it.key]!==""); }
function getNihssN() { return d.nihssMode==="auto"?(nihssAllFilled()?calcNihssAuto():0):(parseInt(d.nihss)||0); }

function getVentanaInfo() {
  if (d.tiempoDesconocido === true) return {label:"Tiempo desconocido / Wake-up",color:"#a855f7",zona:"desconocido"};
  if (!d.lkw || !d.llegada) return null;
  // datetime-local → diferencia directa en minutos sin corrección de día
  const a = new Date(d.lkw), b = new Date(d.llegada);
  const diff = (b - a) / 60000;  // puede ser negativo si mal introducido
  if (isNaN(diff) || diff < 0) return null;
  const vh = diff / 60;
  if (vh <= 4.5)  return {label:"≤4.5 h",color:"#22c55e",zona:"temprana",h:vh};
  if (vh <= 9)    return {label:"4.5–9 h",color:"#eab308",zona:"extendida",h:vh};
  if (vh <= 24)   return {label:"9–24 h",color:"#f97316",zona:"tardia",h:vh};
  return               {label:">24 h",color:"#ef4444",zona:"fuera",h:vh};
}

function getMismatch() {
  if (d.mismatchMode==="auto" && d.mismatchAutoConfirm===true) return true;
  if (d.mismatchMode==="manual" && d.core!=="" && d.penumbra!=="") {
    const c=parseFloat(d.core), p=parseFloat(d.penumbra);
    if(c>70) return false;
    return (c>0?p/c:Infinity)>=1.8 && (p-c)>=15;
  }
  return false;
}

function calcAll() {
  const nihssN = getNihssN(), vi = getVentanaInfo();
  const pesoN=parseFloat(d.peso)||0, edadN=parseFloat(d.edad)||0;
  const aspectsN = d.aspects!==""?(parseInt(d.aspects)??null):null;
  const pasN=parseFloat(d.pas)||0, padN=parseFloat(d.pad)||0;
  const plaqN=parseFloat(d.plaquetas)||999;
  const glucN=parseFloat(d.glucemia)||100;
  const inrN=parseFloat(d.inr)||1, ttpaE=parseFloat(d.ttpa)||0;
  const aspectsIntroducido = d.aspects!==""&&aspectsN!==null;
  const mrsN = d.mrs !== null ? d.mrs : null;
  const mrsBueno = mrsN !== null && mrsN <= 2;   // mRS 0-2 = independiente
  const mrsExcelente = mrsN !== null && mrsN <= 1; // mRS 0-1 = para criterios DAWN/DEFUSE
  const mrsDependiente = mrsN !== null && mrsN >= 3; // mRS ≥3 = dependencia previa

  const isDoac=["dabigatran","rivaroxaban","apixaban","edoxaban"].includes(d.anticoagulante);
  const isAntiXa=["rivaroxaban","apixaban","edoxaban"].includes(d.anticoagulante);
  const isDabigatran=d.anticoagulante==="dabigatran";
  const isWarfarina=d.anticoagulante==="warfarina";
  const avkActivo=isWarfarina, doacActivo=isDoac;

  const avkContraFib  = avkActivo && inrN>1.7;
  const hepTerapContraFib = d.heparina===true && d.heparinaTerapeutica===true && (ttpaE>40||ttpaE===0);
  const doacContraFib = doacActivo && d.doacMenos48h===true &&
    (d.antiXaDisponible===false||(d.antiXaDisponible===true&&d.antiXaNormal===false));

  const nihssAptoFib  = nihssN>=4||(nihssN<4&&d.deficitIncapacitante===true);
  const altoRiesgoHem = d.hemorragiaActiva===true||d.antecedenteHIC===true||
    d.hepatopatiaGrave===true||plaqN<100||d.cirugiaReciente===true;

  // ASPECTS: 0-2 ahora son COR 2a en ventana <6h, NO contraindicación absoluta
  const vh = vi?.h ?? null;
  const ventanaCorta = vh !== null && vh < 6;
  const aspectsCritico = aspectsIntroducido && aspectsN !== null && aspectsN <= 2;
  const aspectsMuyExtensoAbsoluto = aspectsCritico && !ventanaCorta; // fuera de <6h sí es absoluta
  const aspectsCriticoCondicional = aspectsCritico && ventanaCorta;  // <6h → COR 2a

  const hicPrevioAbsoluta = d.hicPrevio===true&&(d.hicPrevioReciente===true||d.hicPrevioReciente===null);
  const neoplasiaCranealAbsoluta = d.neoplasiaCranealIntraaxial===true;

  const contraAbsolutas = [
    d.hemorragia===true&&"Hemorragia intracraneal confirmada en TAC",
    d.sospechaHSA===true&&"Sospecha de hemorragia subaracnoidea (HSA)",
    aspectsMuyExtensoAbsoluto&&"ASPECTS ≤2 fuera de ventana <6h — contraindicación absoluta",
    hicPrevioAbsoluta&&"Hemorragia intracraneal previa (reciente o antigüedad desconocida)",
    d.ictusReciente===true&&"Ictus isquémico en los últimos 3 meses",
    d.cirugiaReciente===true&&"Cirugía mayor o TCE grave reciente (<14 días)",
    d.hemorragiaActiva===true&&"Hemorragia activa o coagulopatía grave",
    avkContraFib&&"AVK activo con INR >1.7",
    doacContraFib&&"DOAC <48h sin confirmación de aclaramiento",
    hepTerapContraFib&&"Heparina terapéutica con TTPa prolongado (>40 s)",
    (pasN>185||padN>110)&&"PA >185/110 mmHg no controlable",
    plaqN<100&&"Plaquetas <100.000/μL",
    glucN<60&&"Glucemia <60 mg/dL (descartar stroke mimic; corregir primero)",
    inrN>1.7&&"INR >1.7",
    neoplasiaCranealAbsoluta&&"Neoplasia intracraneal intraaxial (GBM, metástasis)"
  ].filter(Boolean);

  // ASPECTS 3-5: AHA/ASA 2026 → COR 1 para EVT (elevado de condicional)
  const aspectsIntroducidoN = aspectsIntroducido ? aspectsN : null;
  const aspects35 = aspectsIntroducidoN !== null && aspectsIntroducidoN >= 3 && aspectsIntroducidoN <= 5;
  // ASPECTS 6 relativo para fibrinólisis
  const aspectsRelativo = aspectsIntroducido && aspectsN !== null && aspectsN === 6;

  const sinContra = contraAbsolutas.length===0 && d.hemorragia===false;
  const mismatchPositivo = getMismatch();
  const mismatchAuto = mismatchPositivo||(d.core!==""&&d.penumbra!==""&&(()=>{
    const c=parseFloat(d.core),p=parseFloat(d.penumbra);
    return c<=70&&(c===0?p>15:(p/c>=1.8&&(p-c)>=15));
  })());

  const needPerfusion  = vi?.zona==="tardia"||vi?.zona==="desconocido";
  const showMismatchExtendida = vi?.zona==="extendida";

  const candFibEstandar    = vi?.zona==="temprana"&&nihssAptoFib&&sinContra;
  const candFibCondicional = vi?.zona==="extendida"&&nihssAptoFib&&sinContra;
  const fibExtendidaMismatch  = candFibCondicional&&mismatchPositivo;
  const fibCondicionalViable  = candFibCondicional&&nihssN>=4;
  const candFibWakeUpA = vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.dwiFlarMismatch===true;
  const candFibWakeUpB = vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.wakeUpDentro9h===true&&mismatchPositivo;
  const candFibWakeUpC = vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.sintomasReconocidos45h===true;
  const candFibWakeUp  = candFibWakeUpA||candFibWakeUpB||candFibWakeUpC;
  const candFib = candFibEstandar||fibCondicionalViable||candFibWakeUp;

  const lvoConDeficit = d.lvo===true&&nihssN<6&&d.deficitIncapacitante===true;
  const nihssAptoTromb = nihssN>=6||lvoConDeficit;
  const nihssBasilarApto = d.territorioLVO==="basilar"&&nihssN>=10;
  const basilarDentro24h = nihssBasilarApto&&(vh!==null?vh<=24:d.tiempoDesconocido===true||vi?.zona!=="fuera");

  // ASPECTS para trombectomía
  // 0-2 en <6h → COR 2a razonable (con mRS 0-1 preferiblemente)
  // 3-5 → COR 1 (AHA/ASA 2026, sin condicionante de centros expertos)
  // ≥3 → apto para EVT en ventana
  const aspectsAptoTromb = aspectsIntroducidoN !== null ? aspectsIntroducidoN >= 3 || (aspectsCriticoCondicional) : true;
  const aspectsTrombCOR1 = aspects35; // ya no condicional, es COR 1
  const aspectsCriticoRazonable = aspectsCriticoCondicional; // 0-2 en <6h → COR 2a

  // mRS y trombectomía en ventana extendida / ASPECTS bajo
  const trombExtendidaBloqueadaPorMrs = mrsDependiente && (needPerfusion || aspectsCritico);
  const trombAvisarMrs = mrsDependiente && (candFibCondicional || basilarDentro24h || aspectsCritico);

  const candTromb = d.lvo===true&&(nihssAptoTromb||nihssBasilarApto)&&aspectsAptoTromb&&!trombExtendidaBloqueadaPorMrs&&(
    (vi?.zona==="temprana"||vi?.zona==="extendida")||
    basilarDentro24h||
    ((vi?.zona==="tardia"||vi?.zona==="desconocido")&&(mismatchPositivo||mismatchAuto))
  );

  // MeVO: trombectomía condicional COR 2b
  const esMeVO = isMeVO();
  const trombMeVOCondicional = esMeVO && candTromb;

  const altDosis=pesoN>0?Math.min(0.9*pesoN,90).toFixed(1):"—";
  const altBolo =pesoN>0?Math.min(0.9*pesoN*0.1,9).toFixed(1):"—";
  const altInf  =pesoN>0?(Math.min(0.9*pesoN,90)*0.9).toFixed(1):"—";
  const tncDosis=pesoN>0?Math.min(0.25*pesoN,25).toFixed(1):"—";

  const scoreHemItems=[edadN>80,nihssN>15,glucN>180,pasN>180,aspectsIntroducido&&aspectsN!==null&&aspectsN<7&&aspectsN>0];
  const scoreHem=scoreHemItems.filter(Boolean).length;
  const riesgoHem=scoreHem<=1?{label:"Bajo",color:"#22c55e"}:scoreHem<=3?{label:"Moderado",color:"#eab308"}:{label:"Alto",color:"#ef4444"};

  let pronoScore=0;
  if(edadN>80) pronoScore+=2; else if(edadN>70) pronoScore+=1;
  if(nihssN>15) pronoScore+=3; else if(nihssN>10) pronoScore+=2; else if(nihssN>5) pronoScore+=1;
  if(aspectsIntroducido&&aspectsN!==null){if(aspectsN<6) pronoScore+=2; else if(aspectsN<8) pronoScore+=1;}
  if(d.lvo===true) pronoScore+=1;
  if(vh!==null&&vh>9) pronoScore+=1;
  if(vi?.zona==="desconocido") pronoScore+=1;
  if(mrsDependiente) pronoScore+=2;
  const pronostico = pronoScore<=3
    ?{label:"Bueno",color:"#22c55e",desc:"Alta probabilidad de independencia funcional (mRS 0–2)"}
    :pronoScore<=6
    ?{label:"Intermedio",color:"#eab308",desc:"Pronóstico funcional moderado. Depende de respuesta al tratamiento."}
    :{label:"Malo",color:"#ef4444",desc:"Alta probabilidad de dependencia severa o muerte (mRS 4–6)"};

  const hicPrevioAntigua = d.hicPrevio===true&&d.hicPrevioReciente===false;
  const contraRel = [
    d.signosExtensosInfarto===true&&(!aspectsIntroducido||(aspectsN!==null&&aspectsN>6))&&"Signos precoces de infarto extenso en TAC",
    aspectsRelativo&&"ASPECTS 6 — contraindicación relativa. Fibrinólisis posible con precaución (ESO 2023)",
    aspectsCriticoCondicional&&"ASPECTS ≤2 en ventana <6h — Razonable/COR 2a (AHA/ASA 2026). Decisión individualizada con mRS previo.",
    hicPrevioAntigua&&"HIC previa >3 meses — contraindicación relativa (ESO 2023)",
    avkActivo&&inrN<=1.7&&inrN>1&&"AVK con INR 1.0–1.7 — mayor riesgo hemorrágico",
    d.heparina===true&&d.heparinaTerapeutica===false&&"Heparina SC profiláctica — no contraindica (ESO 2023)",
    d.embarazo===true&&"Embarazo — contraindicación relativa",
    d.crisisEpileptica===true&&"Crisis epiléptica al inicio del ictus — valorar Todd",
    d.iamReciente===true&&"IAM reciente (<3 meses) — riesgo de rotura miocárdica",
    d.neoplasiaCranealExtraaxial===true&&"Neoplasia extraaxial (meningioma…) — contraindicación relativa",
    d.sangradoGIReciente===true&&"Sangrado GI/urinario reciente (<21 días)",
    d.endocarditisActiva===true&&"Endocarditis bacteriana activa",
    glucN>400&&d.glucemia&&"Glucemia >400 mg/dL — insulina IV concomitante; ya no contraindica (AHA/ASA 2026)",
    edadN>80&&"Edad >80 años — NO es contraindicación (Clase I AHA/ASA 2026)",
    mrsDependiente&&"mRS previo ≥3 — dependencia previa. Individualizar indicación de terapias de reperfusión."
  ].filter(Boolean);

  let inicioAC=null;
  if(d.etiologiaCardioembólica===true){
    if(nihssN===0) inicioAC="Día 1 (AIT)";
    else if(nihssN<8) inicioAC="Día 3 (NIHSS <8)";
    else if(nihssN<=15) inicioAC="Día 6–8 (NIHSS 8–15)";
    else inicioAC="Día 12–14 (NIHSS >15)";
  }

  const contraClopidogrel = d.hepatopatiaGrave===true||d.hemorragiaActiva===true;
  const contraTicagrelor  = d.antecedenteHIC===true||d.hepatopatiaGrave===true||
    d.inhibidorCYP3A4===true||d.bradicardiaSignificativa===true||d.bloqueoAV===true||d.disneaGrave===true;
  const preferirTicagrelor = d.inhibidorCYP2C19===true;
  const forzarDAPT = nihssN<4&&d.deficitIncapacitante===false;

  let estrategiaAA;
  if(candFib){
    estrategiaAA={tipo:"AAS",motivo:"Tras fibrinólisis IV: AAS en monoterapia. No iniciar hasta TAC 24h sin hemorragia (AHA/ASA 2026).",alt:null,trasFibrinolisis:true};
  } else if(candTromb&&d.stentIntracraneal===true){
    estrategiaAA={tipo:"CLOPI",motivo:"Stent intracraneal → DAPT urgente. Consultar dosis con Neurointervencionismo (AAS + Clopidogrel 600 mg o Prasugrel/Ticagrelor según protocolo).",alt:null,stent:true};
  } else if(altoRiesgoHem){
    const mot=[d.hemorragiaActiva&&"hemorragia activa",d.antecedenteHIC&&"antecedente HIC",d.hepatopatiaGrave&&"hepatopatía grave",plaqN<100&&"plaquetas <100k",d.cirugiaReciente&&"cirugía reciente"].filter(Boolean).join(", ");
    estrategiaAA={tipo:"AAS",motivo:`Alto riesgo hemorrágico (${mot}) → AAS monoterapia.`,alt:null};
  } else if(forzarDAPT){
    if(contraClopidogrel&&contraTicagrelor) estrategiaAA={tipo:"AAS",motivo:"NIHSS <4 sin déficit incapacitante. DAPT indicada pero ambos contraindicados → AAS.",alt:null};
    else if(contraClopidogrel||preferirTicagrelor){
      if(contraTicagrelor) estrategiaAA={tipo:"AAS",motivo:"NIHSS <4. Ticagrelor contraindicado y clopidogrel no disponible → AAS.",alt:null};
      else estrategiaAA={tipo:"TICA",motivo:"NIHSS <4. Inhibidor CYP2C19 → ticagrelor+AAS (THALES).",alt:null};
    } else estrategiaAA={tipo:"CLOPI",motivo:"NIHSS <4 sin déficit incapacitante — DAPT AAS+Clopidogrel (CHANCE/POINT, AHA/ASA 2026).",alt:contraTicagrelor?null:"AAS+Ticagrelor (THALES) alternativa"};
  } else if(nihssN>5){
    estrategiaAA={tipo:"AAS",motivo:`NIHSS >5. Monoterapia AAS. ${d.aasPrevia?"Continuar 100 mg/día.":"Carga 160–300 mg → 100 mg/día."}`,alt:null};
  } else if(nihssN>=4&&nihssN<=5){
    if(contraTicagrelor) estrategiaAA={tipo:"AAS",motivo:"NIHSS 4–5. Ticagrelor contraindicado → AAS.",alt:null};
    else estrategiaAA={tipo:"TICA",motivo:"NIHSS 4–5. DAPT con ticagrelor (THALES, NEJM 2020) — 30 días.",alt:contraClopidogrel?null:"AAS+Clopidogrel si no tolerado"};
  } else {
    if(contraClopidogrel||preferirTicagrelor){
      if(contraTicagrelor) estrategiaAA=contraClopidogrel?{tipo:"AAS",motivo:"NIHSS ≤3. Ambos contraindicados → AAS.",alt:null}:{tipo:"CLOPI",motivo:"NIHSS ≤3. Ticagrelor contraindicado → clopidogrel.",alt:null};
      else estrategiaAA={tipo:"TICA",motivo:`NIHSS ≤3. ${contraClopidogrel?"Clopidogrel contraindicado.":"Inhibidor CYP2C19."} Ticagrelor preferible.`,alt:"AAS+Clopidogrel si no tolerado"};
    } else estrategiaAA={tipo:"CLOPI",motivo:"NIHSS ≤3. DAPT AAS+Clopidogrel (CHANCE/POINT) — 21 días.",alt:contraTicagrelor?null:"AAS+Ticagrelor (THALES) alternativa"};
  }

  // Motivo fibrinólisis
  let motivoFib;
  if(d.hemorragia===true) motivoFib="Contraindicada: hemorragia intracraneal en TAC.";
  else if(d.sospechaHSA===true) motivoFib="Contraindicada: sospecha de HSA.";
  else if(vi?.zona==="fuera") motivoFib="Fuera de ventana (>24h).";
  else if(vi?.zona==="tardia") motivoFib="Ventana 9–24h: fibrinólisis no indicada de rutina. Valorar trombectomía si mismatch.";
  else if(vi?.zona==="desconocido"){
    if(candFibWakeUpC) motivoFib=`Wake-up con reconocimiento <4.5h → indicada (AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(candFibWakeUpA) motivoFib=`Wake-up DWI-FLAIR mismatch → indicada (WAKE-UP / ESO 2023 Clase IIa). NIHSS ${nihssN}.`;
    else if(candFibWakeUpB) motivoFib=`Wake-up ≤9h + mismatch → indicada (AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(d.dwiFlarMismatch===false&&!mismatchPositivo&&d.wakeUpDentro9h===false) motivoFib="Wake-up sin mismatch ni criterio 9h → no indicada.";
    else motivoFib="Tiempo desconocido: evaluar DWI-FLAIR, mismatch o reconocimiento <4.5h.";
  } else if(contraAbsolutas.length>0){
    motivoFib=`Contraindicada: ${contraAbsolutas[0]}${contraAbsolutas.length>1?" (+"+(contraAbsolutas.length-1)+" más)":""}`;
  } else if(!nihssAptoFib){
    motivoFib=d.deficitIncapacitante===false?"NIHSS <4 sin déficit incapacitante — no recomendada (AHA/ASA 2026). DAPT indicada.":"NIHSS <4 y déficit incapacitante no confirmado.";
  } else if(vi?.zona==="extendida"){
    if(fibExtendidaMismatch) motivoFib=`Ventana 4.5–9h con mismatch → indicada (EXTEND/ECASS-4/EPITHET, AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(fibCondicionalViable) motivoFib=`Ventana 4.5–9h, NIHSS ${nihssN} ≥4, sin mismatch. Condicional (Clase IIb). Decisión individualizada.`;
    else motivoFib="Ventana 4.5–9h con NIHSS <4 sin déficit incapacitante. No recomendada.";
  } else if(candFibEstandar) motivoFib=`Criterios estándar: ventana ≤4.5h, NIHSS ${nihssN}${nihssN<4?" + déficit incapacitante":""}, TAC sin hemorragia, sin contraindicaciones.`;
  else motivoFib="No cumple criterios en el contexto clínico actual.";

  // Motivo trombectomía
  let motivoTromb;
  if(d.lvo===false||d.lvo===null) motivoTromb="Sin LVO confirmada.";
  else if(trombExtendidaBloqueadaPorMrs) motivoTromb=`mRS previo ${d.mrs} ≥3 (dependencia previa). Trombectomía en ventana extendida/ASPECTS bajo no recomendada. Valoración compasiva individualizada.`;
  else if(!nihssAptoTromb&&!nihssBasilarApto) motivoTromb=`NIHSS ${nihssN} <6 sin déficit incapacitante. Requiere ≥6, LVO con déficit incapacitante, o basilar NIHSS ≥10.`;
  else if(aspectsCritico&&!ventanaCorta) motivoTromb=`ASPECTS ${d.aspects} ≤2 fuera de ventana <6h. Contraindicación absoluta.`;
  else if(vi?.zona==="fuera"&&!basilarDentro24h) motivoTromb="Fuera de ventana (>24h). Trombectomía no indicada.";
  else if((vi?.zona==="tardia"||vi?.zona==="desconocido")&&!mismatchPositivo&&!mismatchAuto&&!basilarDentro24h) motivoTromb="Ventana tardía sin mismatch ni criterio basilar. No cumple DAWN/DEFUSE-3.";
  else if(candTromb){
    const extra  = lvoConDeficit?` (LVO + déficit incapacitante, NIHSS ${nihssN} — ESO 2023 Clase B)`:"";
    const basMsg = basilarDentro24h?" ★ Basilar NIHSS ≥10 — Clase I AHA/ASA 2026.":"";
    const aspMsg = aspects35?` ASPECTS ${d.aspects} (3–5): COR 1 AHA/ASA 2026.`:"";
    const aspCritMsg = aspectsCriticoCondicional?` ASPECTS ${d.aspects} (≤2, <6h): COR 2a AHA/ASA 2026 — preferible mRS previo 0-1.`:"";
    const mevoMsg= esMeVO?" ★ MeVO: EVT condicional (COR 2b). Depende de anatomía y experiencia del centro.":"";
    motivoTromb=`Cumple criterios: LVO (${d.territorioLVO}), NIHSS ${nihssN}, ventana ${vi?.label}.${extra}${basMsg}${aspMsg}${aspCritMsg}${mevoMsg}`;
  } else motivoTromb="No cumple todos los criterios para trombectomía.";

  const advertencias=[
    d.inhibidorCYP2C19===true&&"Inhibidor CYP2C19 → menor respuesta a clopidogrel. Considerar ticagrelor.",
    d.antecedenteHIC===true&&"Antecedente HIC → ticagrelor contraindicado.",
    d.hepatopatiaGrave===true&&"Hepatopatía grave → contraindicación para clopidogrel y ticagrelor.",
    d.inhibidorCYP3A4===true&&"Inhibidor potente CYP3A4 → ticagrelor contraindicado.",
    d.bradicardiaSignificativa===true&&"Bradicardia significativa → evitar ticagrelor.",
    d.bloqueoAV===true&&"Bloqueo AV avanzado → evitar ticagrelor.",
    d.disneaGrave===true&&"Disnea grave → ticagrelor contraindicado.",
    d.hiperuricemia===true&&"Hiperuricemia → ticagrelor puede elevar ácido úrico.",
    candFib&&"🛑 No iniciar antiagregación hasta TAC de control a las 24h sin hemorragia.",
    doacActivo&&d.doacMenos48h===true&&d.antiXaDisponible===true&&d.antiXaNormal===true&&"DOAC <48h con nivel normal → no contraindica fibrinólisis.",
    doacActivo&&d.doacMenos48h===false&&"DOAC ≥48h → no contraindica fibrinólisis.",
    altoRiesgoHem&&!candFib&&"Alto riesgo hemorrágico → AAS monoterapia.",
    isAntiXa&&d.doacMenos48h===true&&"Anti-Xa reciente: confirmar aclaramiento (sin Andexanet alfa en urgencias españolas).",
    scoreHem>=4&&"🔴 Score hemorrágico ALTO — riesgo elevado de transformación hemorrágica.",
    candFib&&candTromb&&"🔗 Estrategia puente: fibrinólisis IV + activar trombectomía simultáneamente.",
    vi?.zona==="desconocido"&&!candFibWakeUp&&"⏰ Wake-up: evaluar DWI-FLAIR, mismatch o reconocimiento <4.5h.",
    lvoConDeficit&&"ℹ️ LVO + NIHSS <6 con déficit incapacitante → trombectomía puede estar indicada (ESO 2023 Clase B).",
    d.aasPrevia===true&&nihssN>5&&"ℹ️ AAS previo: no recargar. Continuar 100 mg/día.",
    forzarDAPT&&!candFib&&"ℹ️ NIHSS <4 sin déficit: fibrinólisis no indicada (AHA/ASA 2026). DAPT es la estrategia.",
    basilarDentro24h&&"🔴 Oclusión basilar + NIHSS ≥10 ≤24h → Trombectomía CLASE I (AHA/ASA 2026).",
    aspects35&&d.lvo===true&&"✅ ASPECTS 3–5: EVT COR 1 (AHA/ASA 2026) — ya no requiere centros expertos específicos.",
    aspectsCriticoCondicional&&"🟡 ASPECTS ≤2 en ventana <6h: COR 2a (AHA/ASA 2026). Preferible mRS previo 0–1.",
    glucN>400&&d.glucemia&&"⚠️ Glucemia >400: insulina IV concomitante. No contraindica fibrinólisis (AHA/ASA 2026).",
    mrsDependiente&&"⚠️ mRS previo ≥3: dependencia previa. Las indicaciones de reperfusión deben individualizarse.",
    esMeVO&&candTromb&&"🟡 MeVO (M2d/M3/ACA/ACP): EVT condicional COR 2b — depende de anatomía y experiencia del neurointervencionista."
  ].filter(Boolean);

  return {
    nihssN,vi,pesoN,edadN,aspectsN,pasN,padN,plaqN,glucN,inrN,ttpaE,
    aspectsIntroducido,isDoac,isAntiXa,isDabigatran,isWarfarina,avkActivo,doacActivo,
    avkContraFib,hepTerapContraFib,doacContraFib,nihssAptoFib,altoRiesgoHem,
    aspectsMuyExtensoAbsoluto,aspectsCriticoCondicional,aspects35,
    hicPrevioAbsoluta,contraAbsolutas,sinContra,
    mismatchPositivo,mismatchAuto,needPerfusion,showMismatchExtendida,
    candFibEstandar,candFibCondicional,fibExtendidaMismatch,fibCondicionalViable,
    candFibWakeUpA,candFibWakeUpB,candFibWakeUpC,candFibWakeUp,candFib,
    lvoConDeficit,nihssAptoTromb,nihssBasilarApto,basilarDentro24h,
    aspectsAptoTromb,candTromb,trombMeVOCondicional,esMeVO,
    trombExtendidaBloqueadaPorMrs,trombAvisarMrs,
    mrsN,mrsBueno,mrsExcelente,mrsDependiente,
    altDosis,altBolo,altInf,tncDosis,
    scoreHem,riesgoHem,pronostico,pronoScore,contraRel,inicioAC,
    estrategiaAA,motivoFib,motivoTromb,advertencias,
    contraClopidogrel,contraTicagrelor,forzarDAPT,vh,ventanaCorta
  };
}

function canNext() {
  const c = calcAll();
  if (step===0) return !!(d.edad && d.peso && (d.tiempoDesconocido===true||(d.lkw&&d.llegada)));
  if (step===1) {
    const nihssOk = d.nihssMode==="manual"?d.nihss!=="":nihssAllFilled();
    return nihssOk && d.deficitIncapacitante!==null && d.mrs!==null;
  }
  if (step===2) {
    // Siempre puede avanzar si hemorragia = true (abort) o si datos completos
    if (d.hemorragia===true) return true;
    return d.hemorragia!==null && d.aspects && d.lvo!==null && (d.lvo===false||d.territorioLVO);
  }
  if (step===3) {
    if (!c.needPerfusion&&!c.showMismatchExtendida) return true;
    if (d.mismatchMode===null) return false;
    if (d.mismatchMode==="manual"&&(d.core===""||d.penumbra==="")) return false;
    if (c.vi?.zona==="desconocido"&&d.dwiFlarMismatch===null&&d.wakeUpDentro9h===null&&d.sintomasReconocidos45h===null) return false;
    return true;
  }
  if (step===4) {
    const doacOk=c.doacActivo?(d.doacMenos48h!==null&&(d.doacMenos48h===false||(d.antiXaDisponible!==null&&(d.antiXaDisponible===false||d.antiXaNormal!==null)))):true;
    const hepOk=d.heparina===true?d.heparinaTerapeutica!==null:true;
    const hepTTPaOk=d.heparina===true&&d.heparinaTerapeutica===true?d.ttpa!=="":true;
    const hicOk=d.hicPrevio===true?d.hicPrevioReciente!==null:true;
    const aaOk=d.antecedenteHIC!==null&&d.hepatopatiaGrave!==null&&d.inhibidorCYP2C19!==null&&d.inhibidorCYP3A4!==null&&d.bradicardiaSignificativa!==null&&d.bloqueoAV!==null&&d.disneaGrave!==null&&d.hiperuricemia!==null;
    const crOk=d.embarazo!==null&&d.crisisEpileptica!==null&&d.iamReciente!==null&&d.neoplasiaCranealIntraaxial!==null&&d.neoplasiaCranealExtraaxial!==null&&d.sangradoGIReciente!==null&&d.endocarditisActiva!==null;

// ═══════════════ HELPERS HTML ═══════════════
function fld(label,content,hint=""){
  return `<div class="field"><label>${label}</label>${content}${hint?`<p class="hint">${hint}</p>`:""}</div>`;
}
function inp(key,type="text",extra=""){
  return `<input type="${type}" value="${d[key]||""}" data-key="${key}" oninput="onTextInput(this)" onblur="onTextBlur(this)" ${extra}/>`;
}
function sel(key,options){
  const val=d[key]||"";
  return `<select data-key="${key}" onchange="onSelectChange(this)">${options.map(o=>`<option value="${o.value}"${val===o.value?" selected":""}>${o.label}</option>`).join("")}</select>`;
}
function yn(key){
  const val=d[key];
  return `<div class="yesno"><button class="${val===true?"sel-yes":""}" onclick="handleYesNo('${key}',true)">Sí</button><button class="${val===false?"sel-no":""}" onclick="handleYesNo('${key}',false)">No</button></div>`;

function chip(color,text){
  return `<span class="chip" style="background:${color}22;color:${color};border:1px solid ${color}55">${text}</span>`;
}
function ab(content,color="#f97316",icon="⚠️"){
  return `<div class="alert-box" style="background:${color}15;border:1px solid ${color}40;color:${color}"><span style="flex-shrink:0">${icon}</span><span>${content}</span></div>`;

function ib(content,color="#0ea5e9"){
  return `<div class="info-box" style="background:${color}15;border:1px solid ${color}40;color:${color}">${content}</div>`;
}
function ri(label,value,color="#f1f5f9"){
  return `<div class="row-item"><span>${label}</span><span style="color:${color}">${value}</span></div>`;
}
function mb(ok,motivo){
  const col=ok?"#22c55e":"#f97316";
  return `<div class="motivo-box"><span style="color:${col};font-weight:700;margin-right:6px">${ok?"✔":"✖"}</span>${motivo}</div>`;
}
function dl(title,drugs,color){
  return `<div class="drug-list" style="background:${color}10;border:1px solid ${color}30"><div class="dl-title" style="color:${color}">${title}</div><div class="dl-drugs">${drugs.map(x=>`<span>${x}</span>`).join("")}</div></div>`;

function aspectsGrid(){
  // Degradado continuo verde→rojo: 10=verde puro, 0=rojo puro
  const ASPECTS_COLORS = {
    10:"#22c55e", 9:"#4ade80", 8:"#86efac",
    7:"#a3e635", 6:"#eab308", 5:"#f97316",
    4:"#fb923c", 3:"#f87171", 2:"#ef4444",
    1:"#dc2626", 0:"#b91c1c"
  };
  let h=`<div class="aspects-grid">`;
  for(let i=10;i>=0;i--){
    const col=ASPECTS_COLORS[i];
    const active=d.aspects===String(i);
    h+=`<button class="asp-btn ${active?"active":""}" onclick="handleAspects('${i}')" style="${active?`background:${col};border-color:${col};color:#fff`:`border-color:${col}88;color:${col}`}">${i}</button>`;
  }
  h+=`</div>`;
  return h;
}

function mrsGrid(){
  let h=`<div class="mrs-grid">`;
  MRS_LABELS.forEach((label,i)=>{
    const active=d.mrs===i;
    const col=MRS_COLORS[i];
    h+=`<button class="mrs-btn ${active?"active":""}" onclick="handleMrs(${i})" style="${active?`background:${col};border-color:${col}`:`border-color:${col}55;color:${col}`}">${i} ${active?"✓":""}<div style="font-size:9px;font-weight:400;margin-top:2px;${active?"color:#fff":"color:#64748b"}">${label.split("–")[1]?.trim()||""}</div></button>`;
  });
  h+=`</div>`;
  return h;
}

function subsecFT(title,color,ftKeys,content){
  // Usar un ID único para evitar problemas de escape en el onclick inline
  const ftId = "ft_" + ftKeys.join("_");
  window[ftId] = function(){ fastTrackNo(ftKeys); };
  return `<div class="subsec" style="background:${color}08;border:1px solid ${color}25">
    <div class="subsec-title" style="color:${color}">${title}
      <button class="fast-track-btn" onclick="window['${ftId}']()">✓ Marcar todo como NO</button>
    </div>${content}</div>`;
}
function subsec(title,color,content){
  return `<div class="subsec" style="background:${color}08;border:1px solid ${color}25"><div class="subsec-title" style="color:${color}">${title}</div>${content}</div>`;
}

    h+=fld("Opción B — ¿Reconocimiento ≤9h desde punto medio del sueño estimado?",yn("wakeUpDentro9h"),"AHA/ASA 2026 Clase IIa si mismatch de perfusión presente");
    if(d.wakeUpDentro9h===true&&c.mismatchPositivo) h+=ab("≤9h + mismatch → indicada (AHA/ASA 2026 Clase IIa).","#22c55e","✅");
    if(d.wakeUpDentro9h===true&&!c.mismatchPositivo) h+=ab("≤9h pero sin mismatch documentado. Confirmar con TC-perfusión o RM.","#eab308","⚠️");
    h+=fld("Opción C — ¿Reconocimiento de síntomas hace <4.5h?",yn("sintomasReconocidos45h"),"AHA/ASA 2026 Clase IIa si DWI <1/3 ACM y FLAIR negativo");
    if(d.sintomasReconocidos45h===true) h+=ab("Reconocimiento <4.5h → candidato (AHA/ASA 2026 Clase IIa). Verificar DWI <1/3 ACM y FLAIR negativo.","#22c55e","✅");

    h+=`</div>`;
  }
  return h;
}

  // Antecedentes con Fast-Track

    ${c.aspectsCriticoCondicional&&d.lvo===true?ab(`<strong>ASPECTS ${d.aspects} (≤2, <6h):</strong> EVT razonable COR 2a (AHA/ASA 2026). Preferible mRS previo 0–1. Decisión individualizada.`,"#eab308","🟡"):""}
    ${c.trombMeVOCondicional?ab(`<strong>MeVO (${d.territorioLVO}):</strong> EVT condicional COR 2b. Depende de anatomía, NIHSS y experiencia. No es indicación de rutina.`,"#eab308","🟡"):""}
    ${c.trombExtendidaBloqueadaPorMrs?ab(`<strong>mRS previo ${d.mrs} ≥3:</strong> Trombectomía en ventana extendida / ASPECTS bajo no recomendada. Puede valorarse de forma compasiva e individualizada.`,"#ef4444","⚠️"):""}
    ${vi?.zona==="extendida"?`<div style="background:#eab30815;border:1px solid #eab30844;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;color:#eab308;line-height:1.6"><strong>🟡 Ventana 4.5–9h:</strong> ${c.fibExtendidaMismatch?"Mismatch → fibrinólisis Clase IIa (EXTEND/ECASS-4/EPITHET).":"Sin mismatch → Clase IIb, decisión individualizada."}</div>`:""}
    ${vi?.zona==="tardia"?`<div style="background:#f9731615;border:1px solid #f9731640;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;color:#f97316;line-height:1.6"><strong>🟠 Ventana 9–24h:</strong> Fibrinólisis no indicada. Trombectomía si mismatch (DAWN/DEFUSE-3)${c.basilarDentro24h?" o basilar NIHSS ≥10 (Clase I)":""}.</div>`:""}
    ${c.contraAbsolutas.length>0?`<div style="background:#ef444411;border:1px solid #ef444433;border-radius:8px;padding:12px;margin-top:12px"><div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:8px">CONTRAINDICACIONES ABSOLUTAS</div>${c.contraAbsolutas.map(ca=>`<div style="font-size:13px;color:#fca5a5;padding:3px 0">• ${ca}</div>`).join("")}</div>`:""}
    ${c.candFib?`<div style="background:#0f172a;border:1px solid #22c55e33;border-radius:10px;padding:14px;margin-top:12px">
      <div style="font-size:12px;font-weight:700;color:#22c55e;margin-bottom:10px">DOSIS CALCULADAS (${d.peso} kg)</div>
      <div style="margin-bottom:12px"><div style="font-size:13px;color:#22c55e;font-weight:700;margin-bottom:6px">★ Tenecteplasa — 0.25 mg/kg, máx 25 mg (PREFERIDA)</div>${ri("Bolo IV único (5–10 s)",c.tncDosis+" mg","#22c55e")}</div>
      <div><div style="font-size:13px;color:#0ea5e9;font-weight:700;margin-bottom:6px">Alteplasa (rtPA) — 0.9 mg/kg, máx 90 mg (alternativa)</div>${ri("Dosis total",c.altDosis+" mg","#22c55e")}${ri("Bolo IV 10% (1–2 min)",c.altBolo+" mg")}${ri("Infusión 90% (60 min)",c.altInf+" mg")}</div>
      <div style="font-size:11px;color:#64748b;margin-top:8px">PA &lt;185/110 durante infusión · &lt;180/105 primeras 24h · No &lt;140 mmHg (Clase III).</div>
    </div>`:""}
    ${c.candTromb?`<div style="background:#0f172a;border:1px solid #a855f733;border-radius:10px;padding:14px;margin-top:12px">
      <div style="font-size:12px;font-weight:700;color:#a855f7;margin-bottom:10px">TROMBECTOMÍA MECÁNICA</div>
      ${ri("Territorio",d.territorioLVO,"#c084fc")}${ri("Ventana",vi?.label||"")}
      ${ri("Estrategia",c.candFib?"Puente: Fibrinólisis → Trombectomía":"Trombectomía directa","#c084fc")}
      ${c.needPerfusion&&!c.basilarDentro24h?ri("Criterio perfusión",(c.mismatchPositivo||c.mismatchAuto)?"Mismatch ✓":"Sin mismatch",(c.mismatchPositivo||c.mismatchAuto)?"#22c55e":"#ef4444"):""}
      ${c.basilarDentro24h?ri("Indicación basilar","NIHSS ≥10 + ≤24h — Clase I (sin mismatch obligatorio)","#22c55e"):""}
      ${c.lvoConDeficit?ri("Indicación","LVO + déficit incapacitante (NIHSS <6) — ESO 2023 Clase B","#eab308"):""}
      ${c.aspects35?ri("ASPECTS","3–5 → EVT COR 1 (AHA/ASA 2026)","#22c55e"):""}
      ${c.aspectsCriticoCondicional?ri("ASPECTS","≤2 → COR 2a en ventana <6h (AHA/ASA 2026)","#eab308"):""}
      ${c.esMeVO?ri("Clasificación","MeVO — EVT condicional COR 2b","#eab308"):""}
      ${d.stentIntracraneal===true?ri("Stent","Sí → DAPT urgente — consultar Neurointervencionismo","#f97316"):""}
      <div style="font-size:11px;color:#64748b;margin-top:8px">Activar código ictus. Tiempo puerta-ingle &lt;60 min (objetivo).</div>
    </div>`:""}
    ${!c.candFib&&!c.candFibCondicional&&!c.candTromb&&vi?.zona!=="desconocido"?`<div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;margin-top:12px;text-align:center;color:#94a3b8;font-size:14px">No procede reperfusión.<br>Tratamiento médico: antiagregación, estatinas, control PA y glucemia.</div>`:""}
  </div>`;

  // Antiagregación
  h+=`<div class="section-box" style="border-color:${tC[ea.tipo]}33"><div class="section-title" style="color:${tC[ea.tipo]}">2️⃣ Antiagregación</div>
    <div style="background:${tC[ea.tipo]}15;border:1px solid ${tC[ea.tipo]}40;border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Estrategia recomendada</div>
      <div style="font-size:22px;font-weight:800;color:${tC[ea.tipo]};margin-bottom:10px">${tL[ea.tipo]}</div>
      <div style="font-size:13px;margin-bottom:${ea.alt?6:0}px"><span style="color:#64748b">Motivo: </span><span style="color:#e2e8f0">${ea.motivo}</span></div>
      ${ea.alt?`<div style="font-size:13px"><span style="color:#64748b">Alternativa: </span><span style="color:#94a3b8">${ea.alt}</span></div>`:""}
    </div>
    ${ea.tipo==="CLOPI"?ri("Carga",ea.stent?"Consultar Neurointervencionismo (AAS + Clopidogrel 600 mg o Prasugrel/Ticagrelor)":"AAS 300 mg + Clopidogrel 300 mg","#0ea5e9")+ri("Mantenimiento","AAS 100 mg/día + Clopidogrel 75 mg/día")+ri("Duración",ea.stent?"≥3–6 meses (stent), luego monoterapia":"21 días, luego monoterapia"):""}
    ${ea.tipo==="TICA"?ri("Carga","AAS 300 mg + Ticagrelor 180 mg","#a855f7")+ri("Mantenimiento","AAS 100 mg/día + Ticagrelor 90 mg/12h")+ri("Duración","30 días (THALES), luego monoterapia"):""}
    ${ea.tipo==="AAS"?ri("Carga",d.aasPrevia===true?"No recargar — continuar 100 mg/día":"160–300 mg VO o IV","#22c55e")+ri("Mantenimiento","100 mg/día"):""}
    ${ri("Inicio",c.candFib?"Tras TAC 24h sin hemorragia":"Primeras 24h",c.candFib?"#ef4444":"#22c55e")}
    ${c.advertencias.length>0?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Advertencias</div>${c.advertencias.map(a=>ab(a)).join("")}</div>`:""}
  </div>`;

  // Anticoagulación
  h+=`<div class="section-box"><div class="section-title" style="color:#0ea5e9">3️⃣ Anticoagulación</div>`;
  if(d.etiologiaCardioembólica===true){
    h+=ib("Etiología cardioembólica → Anticoagulación oral indicada. Regla 1-3-6-12 (ESO/EHRA 2023).");
    h+=ri("Inicio recomendado",c.inicioAC||"","#22c55e");
    h+=`<div style="margin-top:10px"><div style="font-size:12px;color:#64748b;margin-bottom:8px">DOAC DE ELECCIÓN</div>`;
    h+=ri("Apixabán","5 mg/12h (2.5 mg/12h si ≥2 criterios)")+ri("Rivaroxabán","20 mg/día con cena (15 mg si FGe 15–49)")+ri("Dabigatrán","150 mg/12h (110 mg si ≥80a)")+ri("Edoxabán","60 mg/día (30 mg si ≤60 kg o FGe 15–50)");
    h+=`</div><div style="font-size:11px;color:#64748b;margin-top:8px">TAC de control antes de iniciar. Esperar a ausencia de transformación hemorrágica significativa.</div>`;
  } else {
    h+=`<div style="color:#64748b;font-size:14px;text-align:center;padding:8px">No indicada (etiología no cardioembólica). Completar estudio etiológico.</div>`;
  }
  h+=`</div>`;

  // Estatinas
  h+=`<div class="section-box"><div class="section-title" style="color:#0ea5e9">4️⃣ Estatinas Alta Intensidad</div>
    ${ri("Atorvastatina","80 mg/día","#0ea5e9")}${ri("Rosuvastatina","20–40 mg/día","#0ea5e9")}${ri("Inicio","Primeras 24–48h","#22c55e")}
    <div style="font-size:11px;color:#64748b;margin-top:8px">Clase I (ESC 2021, AHA/ASA 2026). Objetivo LDL &lt;55 mg/dL.</div>
  </div>`;

  // Control hemodinámico
  const paPreFib=c.candFib&&(c.pasN>185||c.padN>110);
  const paPreTromb=!c.candFib&&c.candTromb&&(c.pasN>185||c.padN>110);
  const paAltaSinTto=!c.candFib&&!c.candTromb&&(c.pasN>220||c.padN>120)&&d.pas;
  const paOKPermisiva=!c.candFib&&!c.candTromb&&c.pasN<=220&&c.padN<=120&&d.pas;
  h+=`<div class="section-box"><div class="section-title" style="color:#0ea5e9">5️⃣ Control Hemodinámico y Metabólico</div>
    ${c.candFib?`${ri("PA pre-fibrinólisis","< 185/110 mmHg — OBLIGATORIO","#f97316")}${ri("PA post-fibrinólisis (24h)","< 180/105 mmHg","#0ea5e9")}${ri("⚠ PA < 140 mmHg post-rtPA","CONTRAINDICADO — Clase III (AHA/ASA 2026)","#ef4444")}`:""}
    ${c.candTromb&&!c.candFib?`${ri("PA pre-trombectomía","< 185/110 mmHg antes de punción arterial","#f97316")}${ri("PA post-EVT (72h)","< 180/105 mmHg (no reducir < 140 mmHg)","#0ea5e9")}${ri("⚠ PA < 140 mmHg post-EVT","No reducir en primeras 72h — Clase III","#ef4444")}`:""}
    ${!c.candFib&&!c.candTromb?ri("PA sin reperfusión","Tratar solo si > 220/120 mmHg (manejo permisivo)","#94a3b8"):""}
    ${ri("Antihipertensivos IV","Labetalol · Nicardipino · Urapidilo","#0ea5e9")}
    ${ri("Glucemia objetivo","140–180 mg/dL","#0ea5e9")}
    ${ri("⚠ Control intensivo glucosa","NO recomendado — Clase III","#ef4444")}
    ${ri("Temperatura","Paracetamol 1 g si > 37.5 °C")}
    ${ri("Saturación O₂","Mantener SpO₂ ≥ 94%")}
    ${paPreFib?ab(`PA ${d.pas}/${d.pad} — controlar ANTES de fibrinólisis: labetalol/nicardipino/urapidilo IV.`,"#ef4444","🛑"):""}
    ${paPreTromb?ab(`PA ${d.pas}/${d.pad} — controlar ANTES de punción arterial para EVT.`,"#f97316","⚠️"):""}
    ${paAltaSinTto?ab(`PA ${d.pas}/${d.pad} — supera 220/120. Tratar gradualmente.`,"#ef4444","⚠️"):""}
    ${paOKPermisiva?ab(`PA ${d.pas}/${d.pad} — rango permisivo. No requiere tratamiento urgente.`,"#22c55e","✓"):""}
  </div>`;

  // Justificación
  h+=`<div class="section-box"><div class="section-title" style="color:#0ea5e9">6️⃣ Justificación Clínica</div>
    <div style="font-size:13px;color:#94a3b8;line-height:1.8">
      ${c.candFibEstandar?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Fibrinólisis estándar</strong> — ${c.motivoFib}</p>`:""}
      ${c.candFibWakeUp?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Fibrinólisis wake-up</strong> — ${c.motivoFib}</p>`:""}
      ${c.fibCondicionalViable&&!c.candFibEstandar&&!c.candFibWakeUp?`<p style="margin:0 0 8px">🟡 <strong style="color:#f1f5f9">Fibrinólisis condicional</strong> — ${c.motivoFib}</p>`:""}
      ${!c.candFib&&!c.candFibCondicional?`<p style="margin:0 0 8px">❌ <strong style="color:#f1f5f9">Fibrinólisis no indicada</strong> — ${c.motivoFib}</p>`:""}
      ${c.candTromb?`<p style="margin:0 0 8px">${c.trombMeVOCondicional?"🟡":"✅"} <strong style="color:#f1f5f9">Trombectomía ${c.trombMeVOCondicional?"condicional (MeVO COR 2b)":"indicada"}</strong> — ${c.motivoTromb}</p>`:""}
      ${!c.candTromb?`<p style="margin:0 0 8px">❌ <strong style="color:#f1f5f9">Trombectomía no indicada</strong> — ${c.motivoTromb}</p>`:""}
      <p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Antiagregación</strong> — ${ea.motivo}</p>
      ${d.etiologiaCardioembólica===true?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Anticoagulación</strong> — Fuente cardioembólica. ${c.inicioAC||""} (ESO/EHRA 2023, NIHSS ${nihssN}).</p>`:""}
      <p style="margin:0 0 8px">📊 <strong style="color:#f1f5f9">Riesgo hemorrágico</strong> — ${c.riesgoHem.label} (${c.scoreHem}/5).</p>
      <p style="margin:0 0 8px">🎯 <strong style="color:#f1f5f9">Pronóstico funcional</strong> — ${c.pronostico.label}. ${c.pronostico.desc}${c.mrsDependiente?" mRS previo ≥3 penaliza pronóstico.":""}</p>
      <p style="margin:0">📋 <strong style="color:#f1f5f9">Estatinas</strong> — inicio precoz. Objetivo LDL &lt;55 mg/dL (ESC 2021, AHA/ASA 2026).</p>
    </div>
  </div>`;

  h+=`<button onclick="resetAll()" style="width:100%;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;font-weight:600">🔄 Nuevo Paciente</button>`;
  h+=footer();
  return h;
}

function footer(){
  return `<div class="footer-app" style="margin-top:16px">⚕️ Herramienta de apoyo a la decisión clínica para profesionales sanitarios.<br>
    Guías ESO 2021/2023 · AHA/ASA 2026 · WAKE-UP · EXTEND · DAWN/DEFUSE-3 · SEN · SEMES<br>
    No sustituye el juicio clínico del facultativo responsable.<br>
    Farmacia Hospitalaria · Hospital Universitario Puerto Real</div>
  <div class="footer-credit">
    <div style="font-size:13px;color:#64748b;font-weight:600">Autor: <span style="color:#94a3b8">Yeray Reyes de la Mata</span></div>
    <div style="font-size:12px;color:#475569">Contacto: <a href="mailto:ydelamata01@gmail.com">ydelamata01@gmail.com</a></div>
  </div>`;
}

// ═══════════════ RENDER PRINCIPAL ═══════════════
function render(){
  const app = document.getElementById("app");
  const seq = getStepSequence();
  const isAbortMode = d.hemorragia === true;

  // Barra de progreso: pasos reales visibles (sin contar el step 5 final)
  const visibleSteps = seq.filter(s => s < 5).length;
  const currentVisIdx = seq.indexOf(step);
  const pct = visibleSteps > 1 ? Math.min((currentVisIdx / (visibleSteps)) * 100, 100) : 100;

  let h = "";
  h+=`<div style="text-align:center;font-weight:bold;margin-bottom:16px;color:#e2e8f0;line-height:1.6;letter-spacing:0.5px">
    <div style="font-size:20px;letter-spacing:2px;color:#f1f5f9">FARMACIA HOSPITALARIA</div>
    <div style="font-size:16px;letter-spacing:1px;color:#94a3b8">HOSPITAL UNIVERSITARIO PUERTO REAL</div>
  </div>
  <div style="text-align:center;margin-bottom:28px">
    <div style="display:inline-flex;align-items:center;gap:10px;background:#0f172a;border:1px solid #1e293b;border-radius:40px;padding:8px 20px;margin-bottom:12px">
      <span style="font-size:18px">🧠</span>
      <span style="font-size:13px;font-weight:700;color:#0ea5e9;letter-spacing:1px">ICTUS ISQUÉMICO AGUDO</span>
    </div>
    <h1>Motor de Decisión Terapéutica</h1>
    <p style="font-size:13px;color:#64748b;margin:0">Herramienta clínica · Guías ESO 2023 / AHA-ASA 2026</p>
  </div>`;

  // Barra de progreso solo si no estamos en el resultado
  if(step < 5){
    const labels = ["Datos","Gravedad","Imagen","Mismatch","Contras"];
    const visSeq = seq.filter(s => s < 5);
    h+=`<div class="progress-bar-wrap"><div class="progress-steps">`;
    visSeq.forEach((s, i) => {
      const done = currentVisIdx > i;
      const active = currentVisIdx === i;
      const bg=done||active?"#0ea5e9":"#1e293b", bc=done||active?"#0ea5e9":"#334155", fc=done||active?"#fff":"#64748b";
      h+=`<div class="progress-step"><div class="step-circle" style="background:${bg};border:2px solid ${bc};color:${fc}">${done?"✓":(i+1)}</div><div class="step-label" style="color:${active?"#0ea5e9":"#64748b"}">${labels[s]||""}</div></div>`;
    });
    h+=`</div><div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div></div>`;
  }

  if(step===0) h+=renderStep0();
  else if(step===1) h+=renderStep1();
  else if(step===2) h+=renderStep2();
  else if(step===3) h+=renderStep3();
  else if(step===4) h+=renderStep4();
  else h+=renderStep5();

  if(step < 5){
    const ok = canNext();
    const isAbortNext = isAbortMode && step === 2;
    const btnLabel = isAbortNext ? "🛑 ABORTAR PROTOCOLO — Ver veredicto" : (step === 4 ? "Ver Recomendación →" : "Siguiente →");
    const btnBg = ok ? (isAbortNext ? "background:linear-gradient(135deg,#ef4444,#dc2626)" : "background:linear-gradient(135deg,#0ea5e9,#6366f1)") : "background:#1e293b";
    const btnClass = isAbortNext && ok ? "abort-btn" : "";
    h+=`<div class="nav-btns">
      ${currentVisIdx > 0 ? `<button class="btn-prev" onclick="prevStep()">← Anterior</button>` : ""}
      <button id="btn-next" class="${btnClass}" onclick="nextStep()" ${ok?"":"disabled"} style="${btnBg};color:${ok?"#fff":"#475469"};cursor:${ok?"pointer":"not-allowed"};flex:2;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;transition:all .2s">
        ${btnLabel}
      </button>
    </div>`;
  }

  app.innerHTML = h;
}

render();
</script>
