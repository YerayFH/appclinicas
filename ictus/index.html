<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Ictus Isquémico Agudo — Motor de Decisión Terapéutica</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#020817;color:#f1f5f9;font-family:'Inter',sans-serif;padding:24px 16px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:22px;font-weight:800;margin:0 0 4px;color:#f1f5f9}
h2{font-size:20px;font-weight:800;color:#f1f5f9;margin:0}
input,select{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:10px 14px;width:100%;font-size:15px;outline:none}
select option{background:#1e293b}
button{cursor:pointer;font-family:inherit}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:#94a3b8;margin-bottom:6px;font-weight:500}
.field .hint{font-size:11px;color:#64748b;margin-top:4px}
.yesno{display:flex;gap:10px}
.yesno button{flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.yesno button.sel-yes{background:#ef4444;border-color:#ef4444;color:#fff}
.yesno button.sel-no{background:#22c55e;border-color:#22c55e;color:#fff}
.section-box{background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:18px 20px;margin-bottom:16px}
.section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.row-item{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e293b}
.row-item span:first-child{color:#94a3b8;font-size:14px}
.row-item span:last-child{font-weight:600;font-size:14px;text-align:right;max-width:60%}
.alert-box{border-radius:8px;padding:9px 12px;margin-top:8px;font-size:12px;display:flex;gap:8px;align-items:flex-start;line-height:1.5}
.info-box{border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;line-height:1.6}
.chip{border-radius:20px;padding:3px 12px;font-size:12px;font-weight:700;display:inline-block}
.motivo-box{background:#0f172a;border:1px solid #334155;border-radius:8px;padding:8px 12px;margin-top:6px;font-size:12px;color:#94a3b8;line-height:1.6}
.drug-list{border-radius:7px;padding:8px 12px;margin-top:6px;margin-bottom:4px}
.drug-list .dl-title{font-size:11px;font-weight:700;margin-bottom:6px;letter-spacing:0.5px}
.drug-list .dl-drugs{display:flex;flex-wrap:wrap;gap:4px 8px}
.drug-list .dl-drugs span{font-size:11px;color:#94a3b8;background:#1e293b;border:1px solid #334155;border-radius:4px;padding:2px 7px}
.progress-bar-wrap{margin-bottom:24px}
.progress-steps{display:flex;justify-content:space-between;margin-bottom:8px}
.progress-step{flex:1;text-align:center}
.step-circle{width:28px;height:28px;border-radius:50%;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.step-label{font-size:10px}
.progress-track{height:3px;background:#1e293b;border-radius:4px}
.progress-fill{height:100%;background:#0ea5e9;border-radius:4px;transition:width .3s}
.nav-btns{display:flex;gap:12px;margin-top:24px}
.nav-btns button{flex:2;padding:14px;border-radius:10px;font-size:15px;font-weight:700;border:none;transition:all .2s}
.nav-btns .btn-prev{flex:1;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;font-weight:600}
.mode-btn{flex:1;padding:10px;border-radius:8px;font-size:13px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.mode-btn.active{background:#0ea5e9;border-color:#0ea5e9;color:#fff}
.nihss-item{margin-bottom:10px}
.nihss-item-head{display:flex;align-items:center;gap:10px}
.nihss-item-info{flex:1}
.nihss-item-info .ni-label{font-size:12px;color:#94a3b8;margin-bottom:2px}
.nihss-item-info .ni-hint{font-size:10px;color:#475569}
.nihss-btns{display:flex;gap:4px}
.nihss-btn{width:32px;height:32px;border-radius:6px;font-size:13px;font-weight:700;border:1px solid #334155;background:#1e293b;color:#64748b}
.nihss-btn.active{background:#0ea5e9;border-color:#0ea5e9;color:#fff}
.nihss-total{margin-top:14px;padding:10px 12px;border-radius:8px;background:#0ea5e915;border:1px solid #0ea5e940;display:flex;justify-content:space-between;align-items:center}
.radio-opt{display:block;width:100%;text-align:left;margin-bottom:8px;padding:10px 14px;border-radius:8px;font-size:14px;border:1px solid #334155;background:#1e293b;color:#94a3b8;transition:all .2s}
.radio-opt.active{background:#0ea5e915;border-color:#0ea5e9;color:#f1f5f9}
.radio-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;border:2px solid #475569;background:transparent;transition:all .2s}
.radio-dot.active{border-color:#0ea5e9;background:#0ea5e9}
.score-card{border-radius:10px;padding:14px}
.footer-credit{margin-top:32px;padding-top:16px;border-top:1px solid #1e293b;text-align:center;line-height:1.8}
.footer-app{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;font-size:11px;color:#475569;text-align:center;line-height:1.7}
.tags{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.hidden{display:none}
a{color:#0ea5e9;text-decoration:none}
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════════════════
const INITIAL = {
  edad:"", peso:"", lkw:"", llegada:"",
  tiempoDesconocido:null, wakeUpDentro9h:null, sintomasReconocidos45h:null,
  nihssMode:"manual", nihss:"",
  nihssItems:{n1a:"",n1b:"",n1c:"",n2:"",n3:"",n4:"",n5a:"",n5b:"",n6a:"",n6b:"",n7:"",n8:"",n9:"",n10:"",n11:""},
  deficitIncapacitante:null,
  hemorragia:null, sospechaHSA:null, signosExtensosInfarto:null,
  aspects:"", lvo:null, territorioLVO:"",
  core:"", penumbra:"",
  dwiFlarMismatch:null, mismatchMode:null, mismatchAutoConfirm:false,
  pas:"", pad:"", plaquetas:"", glucemia:"", inr:"", ttpa:"",
  anticoagulante:"",
  heparina:null, heparinaIV:null,
  doacMenos48h:null, antiXaDisponible:null, antiXaNormal:null, idarucizumab:null,
  ictusReciente:null, cirugiaReciente:null, hemorragiaActiva:null,
  hicPrevio:null, hicPrevioReciente:null,
  embarazo:null, crisisEpileptica:null, iamReciente:null,
  neoplasiaCraneal:null, sangradoGIReciente:null, endocarditisActiva:null,
  aasPrevia:null, etiologiaCardioembólica:null,
  antecedenteHIC:null, hepatopatiaGrave:null,
  inhibidorCYP2C19:null, inhibidorCYP3A4:null,
  bradicardiaSignificativa:null, bloqueoAV:null,
  disneaGrave:null, hiperuricemia:null, stentIntracraneal:null
};

let step = 0;
let d = JSON.parse(JSON.stringify(INITIAL));

// ═══════════════════════════════════════════════════════
// CONSTANTES
// ═══════════════════════════════════════════════════════
const STEPS = ["Datos del Paciente","Gravedad Neurológica","Neuroimagen","Perfusión / Mismatch","Contraindicaciones","Recomendación Final"];

const NIHSS_ITEMS = [
  {key:"n1a",label:"1a. Nivel de conciencia",max:3,hint:"0=alerta · 1=somnoliento · 2=estuporoso · 3=coma"},
  {key:"n1b",label:"1b. Preguntas (mes/edad)",max:2,hint:"0=ambas correctas · 1=una · 2=ninguna"},
  {key:"n1c",label:"1c. Órdenes (cerrar ojos/mano)",max:2,hint:"0=ambas correctas · 1=una · 2=ninguna"},
  {key:"n2",label:"2. Mirada conjugada",max:2,hint:"0=normal · 1=paresia parcial · 2=desviación forzada"},
  {key:"n3",label:"3. Campos visuales",max:3,hint:"0=normal · 1=hemianopsia parcial · 2=completa · 3=ceguera bilateral"},
  {key:"n4",label:"4. Parálisis facial",max:3,hint:"0=normal · 1=leve · 2=parcial · 3=completa"},
  {key:"n5a",label:"5a. Motor brazo izquierdo",max:4,hint:"0=sin caída · 1=caída <5s · 2=caída <10s · 3=sin vs gravedad · 4=sin movimiento"},
  {key:"n5b",label:"5b. Motor brazo derecho",max:4,hint:"0=sin caída · 1=caída <5s · 2=caída <10s · 3=sin vs gravedad · 4=sin movimiento"},
  {key:"n6a",label:"6a. Motor pierna izquierda",max:4,hint:"0=sin caída · 1=caída <5s · 2=caída <10s · 3=sin vs gravedad · 4=sin movimiento"},
  {key:"n6b",label:"6b. Motor pierna derecha",max:4,hint:"0=sin caída · 1=caída <5s · 2=caída <10s · 3=sin vs gravedad · 4=sin movimiento"},
  {key:"n7",label:"7. Ataxia de extremidades",max:2,hint:"0=ausente · 1=una extremidad · 2=dos extremidades"},
  {key:"n8",label:"8. Sensibilidad",max:2,hint:"0=normal · 1=leve-moderada · 2=grave o ausente"},
  {key:"n9",label:"9. Lenguaje / Afasia",max:3,hint:"0=normal · 1=afasia leve · 2=afasia grave · 3=mudo/afasia global"},
  {key:"n10",label:"10. Disartria",max:2,hint:"0=normal · 1=leve-moderada · 2=grave/anartria"},
  {key:"n11",label:"11. Extinción / Negligencia",max:2,hint:"0=normal · 1=negligencia en una modalidad · 2=negligencia profunda"}
];

const ANTICOAGULANTES = [
  {value:"",label:"— Seleccionar —"},
  {value:"ninguno",label:"Ninguno"},
  {value:"warfarina",label:"Warfarina / Acenocumarol (AVK)"},
  {value:"dabigatran",label:"Dabigatrán (Pradaxa®)"},
  {value:"rivaroxaban",label:"Rivaroxabán (Xarelto®)"},
  {value:"apixaban",label:"Apixabán (Eliquis®)"},
  {value:"edoxaban",label:"Edoxabán (Lixiana®)"}
];

const LVO_OPTIONS = [
  {value:"",label:"— Seleccionar —"},
  {value:"ICA",label:"ACI / ICA"},
  {value:"M1",label:"M1 (ACM segmento 1)"},
  {value:"M2_proximal",label:"M2 proximal (ACM segmento 2)"},
  {value:"basilar",label:"Arteria basilar"},
  {value:"ACP",label:"ACP (arteria cerebral posterior)"}
];

const CYP2C19_DRUGS = ["Omeprazol","Esomeprazol","Fluoxetina","Fluvoxamina","Ketoconazol","Voriconazol","Claritromicina","Amiodarona","Cimetidina"];
const CYP3A4_DRUGS = ["Claritromicina","Eritromicina","Ketoconazol","Itraconazol","Voriconazol","Ritonavir","Cobicistat","Diltiazem","Verapamilo","Amiodarona"];

// ═══════════════════════════════════════════════════════
// LÓGICA CLÍNICA
// ═══════════════════════════════════════════════════════
function nihssCategory(n){
  if(n===0)  return {label:"Sin déficit",color:"#22c55e"};
  if(n<=3)   return {label:"Ictus menor",color:"#84cc16"};
  if(n<=5)   return {label:"Leve",color:"#eab308"};
  if(n<=14)  return {label:"Moderado",color:"#f97316"};
  if(n<=24)  return {label:"Grave",color:"#ef4444"};
  return            {label:"Muy grave",color:"#dc2626"};
}

function calcNihssAuto(){
  return NIHSS_ITEMS.reduce((acc,item)=>{
    const v=parseInt(d.nihssItems[item.key])||0;
    return acc+Math.min(v,item.max);
  },0);
}

function nihssAllFilled(){
  return NIHSS_ITEMS.every(item=>d.nihssItems[item.key]!=="");
}

function getNihssN(){
  if(d.nihssMode==="auto") return nihssAllFilled()?calcNihssAuto():0;
  return parseInt(d.nihss)||0;
}

function getVentanaMin(){
  if(!d.lkw||!d.llegada) return null;
  const a=new Date("2000-01-01T"+d.lkw), b=new Date("2000-01-01T"+d.llegada);
  let diff=(b-a)/60000; if(diff<0) diff+=1440; return diff;
}

function getVentanaInfo(){
  if(d.tiempoDesconocido===true) return {label:"Tiempo desconocido / Wake-up",color:"#a855f7",zona:"desconocido"};
  const vm=getVentanaMin();
  if(vm===null) return null;
  const vh=vm/60;
  if(vh<=4.5)  return {label:"≤4.5 h",color:"#22c55e",zona:"temprana",h:vh};
  if(vh<=9)    return {label:"4.5–9 h",color:"#eab308",zona:"extendida",h:vh};
  if(vh<=24)   return {label:"9–24 h",color:"#f97316",zona:"tardia",h:vh};
  return              {label:">24 h",color:"#ef4444",zona:"fuera",h:vh};
}

function getMismatch(){
  if(d.mismatchMode==="auto"&&d.mismatchAutoConfirm===true) return true;
  if(d.mismatchMode==="manual"&&d.core!==""&&d.penumbra!==""){
    const c=parseFloat(d.core), p=parseFloat(d.penumbra);
    if(c>70) return false;
    return (c>0?p/c:Infinity)>=1.8 && (p-c)>=15;
  }
  return false;
}

function calcAll(){
  const nihssN=getNihssN();
  const vi=getVentanaInfo();
  const pesoN=parseFloat(d.peso)||0;
  const edadN=parseFloat(d.edad)||0;
  const aspectsN=d.aspects!==""?(parseInt(d.aspects)??null):null;
  const pasN=parseFloat(d.pas)||0;
  const padN=parseFloat(d.pad)||0;
  const plaqN=parseFloat(d.plaquetas)||999;
  const glucN=parseFloat(d.glucemia)||100;
  const inrN=parseFloat(d.inr)||1;
  const ttpaE=parseFloat(d.ttpa)||0;
  const aspectsIntroducido=d.aspects!==""&&aspectsN!==null;

  const isDoac=["dabigatran","rivaroxaban","apixaban","edoxaban"].includes(d.anticoagulante);
  const isAntiXa=["rivaroxaban","apixaban","edoxaban"].includes(d.anticoagulante);
  const isDabigatran=d.anticoagulante==="dabigatran";
  const isWarfarina=d.anticoagulante==="warfarina";
  const avkActivo=isWarfarina;
  const doacActivo=isDoac;

  const avkContraFib=avkActivo&&inrN>1.7;
  const hepContraFib=d.heparina===true&&d.heparinaIV===true&&(ttpaE>40||ttpaE===0);
  const doacContraFib=doacActivo&&d.doacMenos48h===true&&
    (d.antiXaDisponible===false||(d.antiXaDisponible===true&&d.antiXaNormal===false));

  const nihssAptoFib=nihssN>=4||(nihssN<4&&d.deficitIncapacitante===true);

  const altoRiesgoHem=d.hemorragiaActiva===true||d.antecedenteHIC===true||
    d.hepatopatiaGrave===true||plaqN<100||d.cirugiaReciente===true;

  const aspectsMuyExtenso=aspectsIntroducido&&aspectsN!==null&&aspectsN<=5;
  const hicPrevioAbsoluta=d.hicPrevio===true&&(d.hicPrevioReciente===true||d.hicPrevioReciente===null);

  const contraAbsolutas=[
    d.hemorragia===true&&"Hemorragia intracraneal confirmada en TAC",
    d.sospechaHSA===true&&"Sospecha de hemorragia subaracnoidea (HSA)",
    aspectsMuyExtenso&&`ASPECTS ≤5 — contraindicación absoluta`,
    hicPrevioAbsoluta&&"Hemorragia intracraneal previa (reciente o antigüedad desconocida)",
    d.ictusReciente===true&&"Ictus isquémico en los últimos 3 meses",
    d.cirugiaReciente===true&&"Cirugía mayor o TCE grave reciente (<14 días)",
    d.hemorragiaActiva===true&&"Hemorragia activa o coagulopatía grave",
    avkContraFib&&"AVK activo con INR >1.7",
    doacContraFib&&"DOAC <48 h sin confirmación de aclaramiento",
    hepContraFib&&"Heparina IV con TTPa prolongado (>40 s)",
    (pasN>185||padN>110)&&"PA >185/110 mmHg no controlable",
    plaqN<100&&"Plaquetas <100.000/μL",
    (glucN<60||glucN>400)&&"Glucemia fuera de rango (60–400 mg/dL)",
    inrN>1.7&&"INR >1.7"
  ].filter(Boolean);

  const sinContra=contraAbsolutas.length===0&&d.hemorragia===false;
  const mismatchPositivo=getMismatch();

  const mismatchAuto=mismatchPositivo||(
    d.core!==""&&d.penumbra!==""&&(()=>{
      const c=parseFloat(d.core),p=parseFloat(d.penumbra);
      return c<=70&&(c===0?p>15:(p/c>=1.8&&(p-c)>=15));
    })()
  );

  const needPerfusion=vi?.zona==="tardia"||vi?.zona==="desconocido";
  const showMismatchExtendida=vi?.zona==="extendida";

  // Candidatos fibrinólisis
  const candFibEstandar=vi?.zona==="temprana"&&nihssAptoFib&&sinContra;
  const candFibCondicional=vi?.zona==="extendida"&&nihssAptoFib&&sinContra;
  const fibExtendidaMismatch=candFibCondicional&&mismatchPositivo;
  const fibCondicionalViable=candFibCondicional&&nihssN>=4;
  const candFibWakeUpA=vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.dwiFlarMismatch===true;
  const candFibWakeUpB=vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.wakeUpDentro9h===true&&mismatchPositivo;
  const candFibWakeUpC=vi?.zona==="desconocido"&&nihssAptoFib&&sinContra&&d.sintomasReconocidos45h===true;
  const candFibWakeUp=candFibWakeUpA||candFibWakeUpB||candFibWakeUpC;
  const candFib=candFibEstandar||fibCondicionalViable||candFibWakeUp;

  // Candidatos trombectomía
  const lvoConDeficit=d.lvo===true&&nihssN<6&&d.deficitIncapacitante===true;
  const nihssAptoTromb=nihssN>=6||lvoConDeficit;
  const nihssBasilarApto=d.territorioLVO==="basilar"&&nihssN>=10;
  const vh=getVentanaMin()!==null?getVentanaMin()/60:null;
  const basilarDentro24h=nihssBasilarApto&&(vh!==null?vh<=24:d.tiempoDesconocido===true||vi?.zona!=="fuera");
  const aspectsAptoTromb=aspectsN!==null?aspectsN>=3:true;
  const aspectsTrombCond=aspectsN!==null&&aspectsN>=3&&aspectsN<=5;
  const candTromb=d.lvo===true&&(nihssAptoTromb||nihssBasilarApto)&&aspectsAptoTromb&&(
    (vi?.zona==="temprana"||vi?.zona==="extendida")||
    basilarDentro24h||
    ((vi?.zona==="tardia"||vi?.zona==="desconocido")&&(mismatchPositivo||mismatchAuto))
  );

  // Dosis
  const altDosis=pesoN>0?Math.min(0.9*pesoN,90).toFixed(1):"—";
  const altBolo=pesoN>0?Math.min(0.9*pesoN*0.1,9).toFixed(1):"—";
  const altInf=pesoN>0?(Math.min(0.9*pesoN,90)*0.9).toFixed(1):"—";
  const tncDosis=pesoN>0?Math.min(0.25*pesoN,25).toFixed(1):"—";

  // Scores
  const scoreHemItems=[edadN>80,nihssN>15,glucN>180,pasN>180,
    aspectsIntroducido&&aspectsN!==null&&aspectsN<7&&aspectsN>0];
  const scoreHem=scoreHemItems.filter(Boolean).length;
  const riesgoHem=scoreHem<=1?{label:"Bajo",color:"#22c55e"}:scoreHem<=3?{label:"Moderado",color:"#eab308"}:{label:"Alto",color:"#ef4444"};

  let pronoScore=0;
  if(edadN>80) pronoScore+=2; else if(edadN>70) pronoScore+=1;
  if(nihssN>15) pronoScore+=3; else if(nihssN>10) pronoScore+=2; else if(nihssN>5) pronoScore+=1;
  if(aspectsIntroducido&&aspectsN!==null){if(aspectsN<6) pronoScore+=2; else if(aspectsN<8) pronoScore+=1;}
  if(d.lvo===true) pronoScore+=1;
  if(vh!==null&&vh>9) pronoScore+=1;
  if(vi?.zona==="desconocido") pronoScore+=1;
  const pronostico=pronoScore<=3
    ?{label:"Bueno",color:"#22c55e",desc:"Alta probabilidad de independencia funcional (mRS 0–2)"}
    :pronoScore<=6
    ?{label:"Intermedio",color:"#eab308",desc:"Pronóstico funcional moderado. Depende de respuesta al tratamiento."}
    :{label:"Malo",color:"#ef4444",desc:"Alta probabilidad de dependencia severa o muerte (mRS 4–6)"};

  // Contraindicaciones relativas
  const hicPrevioAntigua=d.hicPrevio===true&&d.hicPrevioReciente===false;
  const aspectsRelativo=aspectsIntroducido&&aspectsN!==null&&aspectsN===6;
  const contraRel=[
    d.signosExtensosInfarto===true&&(!aspectsIntroducido||(aspectsN!==null&&aspectsN>6))
      &&"Signos precoces de infarto extenso en TAC (ASPECTS aún >6)",
    aspectsRelativo&&"ASPECTS 6 — alto riesgo hemorrágico. Fibrinólisis posible con precaución (ESO 2023)",
    hicPrevioAntigua&&"HIC previa >3 meses — contraindicación relativa (ESO 2023)",
    avkActivo&&inrN<=1.7&&inrN>1&&"AVK con INR 1.0–1.7 — mayor riesgo hemorrágico",
    d.heparina===true&&d.heparinaIV===false&&"Heparina SC profiláctica — no contraindica (ESO 2023)",
    d.embarazo===true&&"Embarazo — contraindicación relativa",
    d.crisisEpileptica===true&&"Crisis epiléptica al inicio del ictus — valorar Todd",
    d.iamReciente===true&&"IAM reciente (<3 meses) — riesgo de rotura miocárdica",
    d.neoplasiaCraneal===true&&"Neoplasia intracraneal — contraindicación relativa",
    d.sangradoGIReciente===true&&"Sangrado GI/urinario reciente (<21 días)",
    d.endocarditisActiva===true&&"Endocarditis bacteriana activa",
    edadN>80&&"Edad >80 años — NO es contraindicación (Clase I AHA/ASA 2026)"
  ].filter(Boolean);

  // Inicio AC
  let inicioAC=null;
  if(d.etiologiaCardioembólica===true){
    if(nihssN===0) inicioAC="Día 1 (AIT — inicio inmediato o tras 24h de TAC)";
    else if(nihssN<8) inicioAC="Día 3 (ictus leve, NIHSS <8)";
    else if(nihssN<=15) inicioAC="Día 6–8 (ictus moderado, NIHSS 8–15)";
    else inicioAC="Día 12–14 (ictus grave, NIHSS >15)";
  }

  // Antiagregación
  const contraClopidogrel=d.hepatopatiaGrave===true||d.hemorragiaActiva===true;
  const contraTicagrelor=d.antecedenteHIC===true||d.hepatopatiaGrave===true||
    d.inhibidorCYP3A4===true||d.bradicardiaSignificativa===true||
    d.bloqueoAV===true||d.disneaGrave===true;
  const preferirTicagrelor=d.inhibidorCYP2C19===true;
  const forzarDAPT=nihssN<4&&d.deficitIncapacitante===false;

  let estrategiaAA;
  if(candFib){
    estrategiaAA={tipo:"AAS",motivo:"Tras fibrinólisis IV: AAS en monoterapia. No iniciar hasta TAC control a las 24h sin hemorragia (AHA/ASA 2026, ESO 2023).",alt:null,trasFibrinolisis:true};
  } else if(candTromb&&d.stentIntracraneal===true){
    estrategiaAA={tipo:"CLOPI",motivo:"Stent intracraneal → DAPT obligatoria para prevenir trombosis de stent.",alt:null,stent:true};
  } else if(altoRiesgoHem){
    const mot=[d.hemorragiaActiva&&"hemorragia activa",d.antecedenteHIC&&"antecedente HIC",
      d.hepatopatiaGrave&&"hepatopatía grave",plaqN<100&&"plaquetas <100.000",d.cirugiaReciente&&"cirugía reciente"]
      .filter(Boolean).join(", ");
    estrategiaAA={tipo:"AAS",motivo:`Alto riesgo hemorrágico (${mot}) → AAS en monoterapia.`,alt:null};
  } else if(forzarDAPT){
    if(contraClopidogrel&&contraTicagrelor)
      estrategiaAA={tipo:"AAS",motivo:"NIHSS <4 sin déficit incapacitante. DAPT indicada pero ambos contraindicados → AAS monoterapia.",alt:null};
    else if(contraClopidogrel||preferirTicagrelor){
      if(contraTicagrelor) estrategiaAA={tipo:"AAS",motivo:"NIHSS <4. Ticagrelor contraindicado y clopidogrel no disponible → AAS monoterapia.",alt:null};
      else estrategiaAA={tipo:"TICA",motivo:"NIHSS <4 sin déficit incapacitante. DAPT (AHA/ASA 2026). Inhibidor CYP2C19 → ticagrelor+AAS (THALES).",alt:null};
    } else
      estrategiaAA={tipo:"CLOPI",motivo:"NIHSS <4 sin déficit incapacitante — DAPT AAS+Clopidogrel según CHANCE/POINT (AHA/ASA 2026).",alt:contraTicagrelor?null:"AAS+Ticagrelor (THALES) como alternativa"};
  } else if(nihssN>5){
    const carga=d.aasPrevia===true?"Continuar AAS 100 mg/día (sin recarga)":"AAS 160–300 mg carga → 100 mg/día";
    estrategiaAA={tipo:"AAS",motivo:`NIHSS >5. Monoterapia AAS. ${carga}.`,alt:null};
  } else if(nihssN>=4&&nihssN<=5){
    if(contraTicagrelor) estrategiaAA={tipo:"AAS",motivo:"NIHSS 4–5. Ticagrelor contraindicado → AAS en monoterapia.",alt:null};
    else estrategiaAA={tipo:"TICA",motivo:"NIHSS 4–5. DAPT con ticagrelor según THALES (NEJM 2020) — 30 días.",alt:contraClopidogrel?null:"AAS+Clopidogrel si ticagrelor no tolerado"};
  } else {
    if(contraClopidogrel||preferirTicagrelor){
      if(contraTicagrelor) estrategiaAA=contraClopidogrel
        ?{tipo:"AAS",motivo:"NIHSS ≤3. Ambos contraindicados → AAS monoterapia.",alt:null}
        :{tipo:"CLOPI",motivo:"NIHSS ≤3. Ticagrelor contraindicado → clopidogrel.",alt:null};
      else estrategiaAA={tipo:"TICA",motivo:`NIHSS ≤3. ${contraClopidogrel?"Clopidogrel contraindicado.":"Inhibidor CYP2C19."} Preferible ticagrelor.`,alt:"AAS+Clopidogrel si ticagrelor no tolerado"};
    } else
      estrategiaAA={tipo:"CLOPI",motivo:"NIHSS ≤3. DAPT AAS+Clopidogrel según CHANCE/POINT — 21 días.",alt:contraTicagrelor?null:"AAS+Ticagrelor (THALES) como alternativa"};
  }

  // Motivo fibrinólisis
  let motivoFib;
  if(d.hemorragia===true) motivoFib="Contraindicada: hemorragia intracraneal en TAC.";
  else if(d.sospechaHSA===true) motivoFib="Contraindicada: sospecha de HSA.";
  else if(vi?.zona==="fuera") motivoFib="Fuera de ventana terapéutica (>24h).";
  else if(vi?.zona==="tardia") motivoFib="Ventana 9–24h: fibrinólisis IV no indicada de rutina. Valorar trombectomía si mismatch.";
  else if(vi?.zona==="desconocido"){
    if(candFibWakeUpC) motivoFib=`Wake-up con reconocimiento de síntomas <4.5h → fibrinólisis indicada (AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(candFibWakeUpA) motivoFib=`Wake-up con DWI-FLAIR mismatch confirmado → fibrinólisis indicada (WAKE-UP trial / ESO 2023 Clase IIa). NIHSS ${nihssN}.`;
    else if(candFibWakeUpB) motivoFib=`Wake-up dentro de 9h desde punto medio sueño con mismatch → fibrinólisis indicada (AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(d.dwiFlarMismatch===false&&!mismatchPositivo&&d.wakeUpDentro9h===false) motivoFib="Wake-up sin mismatch confirmado ni criterio de 9h → fibrinólisis no indicada. Valorar trombectomía si LVO.";
    else motivoFib="Tiempo desconocido / wake-up: evaluar DWI-FLAIR, mismatch de perfusión o reconocimiento <4.5h.";
  } else if(contraAbsolutas.length>0){
    motivoFib=`Contraindicada: ${contraAbsolutas[0]}${contraAbsolutas.length>1?" (y "+(contraAbsolutas.length-1)+" más)":""}`;
  } else if(!nihssAptoFib){
    if(d.deficitIncapacitante===false) motivoFib="NIHSS <4 sin déficit incapacitante — fibrinólisis no recomendada (AHA/ASA 2026). DAPT indicada.";
    else motivoFib="NIHSS <4 y déficit incapacitante no confirmado.";
  } else if(vi?.zona==="extendida"){
    if(fibExtendidaMismatch) motivoFib=`Ventana 4.5–9h con mismatch confirmado → fibrinólisis indicada (EXTEND/ECASS-4/EPITHET, AHA/ASA 2026 Clase IIa). NIHSS ${nihssN}.`;
    else if(fibCondicionalViable) motivoFib=`Ventana 4.5–9h, NIHSS ${nihssN} ≥4, sin mismatch documentado. Fibrinólisis condicional (Clase IIb).`;
    else motivoFib="Ventana 4.5–9h con NIHSS <4 sin déficit incapacitante. Fibrinólisis no recomendada.";
  } else if(candFibEstandar) motivoFib=`Cumple criterios estándar: ventana ≤4.5h, NIHSS ${nihssN}${nihssN<4?" con déficit incapacitante":""}, TAC sin hemorragia, sin contraindicaciones absolutas.`;
  else motivoFib="No cumple criterios para fibrinólisis en el contexto clínico actual.";

  // Motivo trombectomía
  let motivoTromb;
  if(d.lvo===false||d.lvo===null) motivoTromb="Sin oclusión de gran vaso (LVO) confirmada.";
  else if(!nihssAptoTromb&&!nihssBasilarApto) motivoTromb=`NIHSS ${nihssN} <6 sin déficit incapacitante. Requiere NIHSS ≥6, LVO con déficit incapacitante, u oclusión basilar con NIHSS ≥10.`;
  else if(aspectsN!==null&&aspectsN<=2) motivoTromb=`ASPECTS ${d.aspects} ≤2. Infarto devastador; trombectomía no recomendada.`;
  else if(vi?.zona==="fuera"&&!basilarDentro24h) motivoTromb="Fuera de ventana terapéutica (>24h). Trombectomía no indicada.";
  else if((vi?.zona==="tardia"||vi?.zona==="desconocido")&&!mismatchPositivo&&!mismatchAuto&&!basilarDentro24h) motivoTromb="Ventana tardía / tiempo desconocido sin mismatch ni criterio basilar. No cumple DAWN/DEFUSE-3.";
  else if(candTromb){
    const extra=lvoConDeficit?` (LVO con déficit incapacitante, NIHSS ${nihssN} <6 — ESO 2023 Clase B)`:"";
    const basilarMsg=basilarDentro24h?" ★ Basilar con NIHSS ≥10 — Clase I AHA/ASA 2026.":"";
    const aspMsg=aspectsTrombCond?` ASPECTS ${d.aspects} (3–5): decisión individualizada — SELECT2/TENSION/ANGEL-ASPECT.`:"";
    motivoTromb=`Cumple criterios: LVO (${d.territorioLVO}), NIHSS ${nihssN}, ventana ${vi?.label}.${extra}${basilarMsg}${aspMsg}`;
  } else motivoTromb="No cumple todos los criterios para trombectomía en el contexto clínico actual.";

  // Advertencias
  const advertencias=[
    d.inhibidorCYP2C19===true&&"Inhibidor CYP2C19 → menor respuesta a clopidogrel. Considerar ticagrelor.",
    d.antecedenteHIC===true&&"Antecedente HIC → ticagrelor contraindicado.",
    d.hepatopatiaGrave===true&&"Hepatopatía grave → contraindicación para clopidogrel y ticagrelor.",
    d.inhibidorCYP3A4===true&&"Inhibidor potente CYP3A4 → ticagrelor contraindicado.",
    d.bradicardiaSignificativa===true&&"Bradicardia significativa → evitar ticagrelor.",
    d.bloqueoAV===true&&"Bloqueo AV avanzado → evitar ticagrelor.",
    d.disneaGrave===true&&"Disnea grave → ticagrelor contraindicado.",
    d.hiperuricemia===true&&"Hiperuricemia / gota → ticagrelor puede elevar ácido úrico. Vigilar.",
    candFib&&"🛑 No iniciar antiagregación hasta TAC de control a las 24h sin hemorragia.",
    doacActivo&&d.doacMenos48h===true&&d.antiXaDisponible===true&&d.antiXaNormal===true&&"DOAC <48h pero nivel normal confirmado → no contraindica fibrinólisis.",
    doacActivo&&d.doacMenos48h===false&&"DOAC con última dosis ≥48h → no contraindica fibrinólisis.",
    altoRiesgoHem&&!candFib&&"Alto riesgo hemorrágico → DAPT contraindicada; AAS en monoterapia.",
    isAntiXa&&d.doacMenos48h===true&&"AntiXa reciente: confirmar aclaramiento con anti-Xa calibrado.",
    scoreHem>=4&&"🔴 Score hemorrágico ALTO — riesgo elevado de transformación hemorrágica.",
    candFib&&candTromb&&"🔗 Estrategia puente: iniciar fibrinólisis IV y activar simultáneamente sala de trombectomía.",
    vi?.zona==="desconocido"&&!candFibWakeUp&&"⏰ Wake-up: evaluar DWI-FLAIR, mismatch de perfusión o reconocimiento <4.5h.",
    contraRel.length>0&&"ℹ️ Contraindicación/situación relativa presente — ver sección de scores.",
    lvoConDeficit&&"ℹ️ LVO + NIHSS <6 con déficit incapacitante: trombectomía puede estar indicada (ESO 2023 Clase B).",
    d.aasPrevia===true&&nihssN>5&&"ℹ️ Paciente en AAS previo: no administrar dosis de carga. Continuar mantenimiento 100 mg/día.",
    forzarDAPT&&!candFib&&"ℹ️ NIHSS <4 sin déficit incapacitante: fibrinólisis no indicada (AHA/ASA 2026). DAPT es la estrategia de elección.",
    basilarDentro24h&&"🔴 Oclusión basilar + NIHSS ≥10 dentro de 24h → trombectomía CLASE I fuerte (AHA/ASA 2026).",
    aspectsTrombCond&&d.lvo===true&&"⚠️ ASPECTS 3–5: EVT condicional en centros expertos (SELECT2/TENSION/ANGEL-ASPECT — AHA/ASA 2026)."
  ].filter(Boolean);

  return {
    nihssN,vi,pesoN,edadN,aspectsN,pasN,padN,plaqN,glucN,inrN,ttpaE,
    aspectsIntroducido,isDoac,isAntiXa,isDabigatran,isWarfarina,avkActivo,doacActivo,
    avkContraFib,hepContraFib,doacContraFib,nihssAptoFib,altoRiesgoHem,
    aspectsMuyExtenso,hicPrevioAbsoluta,contraAbsolutas,sinContra,
    mismatchPositivo,mismatchAuto,needPerfusion,showMismatchExtendida,
    candFibEstandar,candFibCondicional,fibExtendidaMismatch,fibCondicionalViable,
    candFibWakeUpA,candFibWakeUpB,candFibWakeUpC,candFibWakeUp,candFib,
    lvoConDeficit,nihssAptoTromb,nihssBasilarApto,basilarDentro24h,
    aspectsAptoTromb,aspectsTrombCond,candTromb,
    altDosis,altBolo,altInf,tncDosis,
    scoreHem,riesgoHem,pronostico,pronoScore,contraRel,inicioAC,
    estrategiaAA,motivoFib,motivoTromb,advertencias,
    contraClopidogrel,contraTicagrelor,forzarDAPT
  };
}

// ═══════════════════════════════════════════════════════
// VALIDACIÓN PASOS
// ═══════════════════════════════════════════════════════
function canNext(){
  const c=calcAll();
  if(step===0) return d.edad&&d.peso&&(d.tiempoDesconocido===true||(d.lkw&&d.llegada));
  if(step===1){
    const nihssOk=d.nihssMode==="manual"?d.nihss!=="":nihssAllFilled();
    return nihssOk&&d.deficitIncapacitante!==null;
  }
  if(step===2) return d.hemorragia!==null&&d.aspects&&d.lvo!==null&&(d.lvo===false||d.territorioLVO);
  if(step===3){
    if(!c.needPerfusion&&!c.showMismatchExtendida) return true;
    if(d.mismatchMode===null) return false;
    if(d.mismatchMode==="manual"&&(d.core===""||d.penumbra==="")) return false;
    if(c.vi?.zona==="desconocido"&&d.dwiFlarMismatch===null&&d.wakeUpDentro9h===null&&d.sintomasReconocidos45h===null) return false;
    return true;
  }
  if(step===4){
    const doacOk=c.doacActivo
      ?(d.doacMenos48h!==null&&(d.doacMenos48h===false||(d.antiXaDisponible!==null&&(d.antiXaDisponible===false||d.antiXaNormal!==null))))
      :true;
    const hepOk=d.heparina===true?d.heparinaIV!==null:true;
    const hicOk=d.hicPrevio===true?d.hicPrevioReciente!==null:true;
    const aaOk=d.antecedenteHIC!==null&&d.hepatopatiaGrave!==null&&
      d.inhibidorCYP2C19!==null&&d.inhibidorCYP3A4!==null&&d.bradicardiaSignificativa!==null&&
      d.bloqueoAV!==null&&d.disneaGrave!==null&&d.hiperuricemia!==null;
    const crOk=d.embarazo!==null&&d.crisisEpileptica!==null&&d.iamReciente!==null&&
      d.neoplasiaCraneal!==null&&d.sangradoGIReciente!==null&&d.endocarditisActiva!==null;
    return d.pas&&d.pad&&d.plaquetas&&d.glucemia&&d.inr&&
      d.anticoagulante!==""&&doacOk&&d.heparina!==null&&hepOk&&
      d.ictusReciente!==null&&d.cirugiaReciente!==null&&
      d.hemorragiaActiva!==null&&d.hicPrevio!==null&&hicOk&&
      d.etiologiaCardioembólica!==null&&aaOk&&crOk;
  }
  return true;
}

// ═══════════════════════════════════════════════════════
// HELPERS HTML
// ═══════════════════════════════════════════════════════
function h(tag,attrs,content){
  const a=Object.entries(attrs||{}).map(([k,v])=>` ${k}="${v}"`).join("");
  if(content===undefined) return `<${tag}${a}/>`;
  return `<${tag}${a}>${content}</${tag}>`;
}

function field(label,content,hint=""){
  return `<div class="field">${h("label",{},label)}${content}${hint?`<p class="hint">${hint}</p>`:""}</div>`;
}

function input(key,type="number",extra=""){
  const val=key.includes(".")?d.nihssItems[key.split(".")[1]]:d[key];
  return `<input type="${type}" value="${val||""}" data-key="${key}" ${extra} oninput="handleInput(this)"/>`;
}

function select(key,options){
  const val=d[key]||"";
  const opts=options.map(o=>`<option value="${o.value}"${val===o.value?" selected":""}>${o.label}</option>`).join("");
  return `<select data-key="${key}" onchange="handleInput(this)">${opts}</select>`;
}

function yesno(key,extraClass=""){
  const val=d[key];
  const yes=val===true?"sel-yes":"";
  const no=val===false?"sel-no":"";
  return `<div class="yesno ${extraClass}">
    <button class="${yes}" onclick="handleYesNo('${key}',true)">Sí</button>
    <button class="${no}" onclick="handleYesNo('${key}',false)">No</button>
  </div>`;
}

function chip(color,text){
  return `<span class="chip" style="background:${color}22;color:${color};border:1px solid ${color}55">${text}</span>`;
}

function alertBox(content,color="#f97316",icon="⚠️"){
  return `<div class="alert-box" style="background:${color}15;border:1px solid ${color}40;color:${color}"><span style="flex-shrink:0">${icon}</span><span>${content}</span></div>`;
}

function infoBox(content,color="#0ea5e9"){
  return `<div class="info-box" style="background:${color}15;border:1px solid ${color}40;color:${color}">${content}</div>`;
}

function sectionBox(title,color,content){
  return `<div class="section-box"><div class="section-title" style="color:${color}">${title}</div>${content}</div>`;
}

function rowItem(label,value,color="#f1f5f9"){
  return `<div class="row-item"><span>${label}</span><span style="color:${color}">${value}</span></div>`;
}

function motivoBox(ok,motivo){
  const col=ok?"#22c55e":"#f97316";
  return `<div class="motivo-box"><span style="color:${col};font-weight:700;margin-right:6px">${ok?"✔ Motivo:":"✖ Motivo:"}</span>${motivo}</div>`;
}

function drugList(title,drugs,color){
  const items=drugs.map(d=>`<span>${d}</span>`).join("");
  return `<div class="drug-list" style="background:${color}10;border:1px solid ${color}30">
    <div class="dl-title" style="color:${color}">${title}</div>
    <div class="dl-drugs">${items}</div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// HANDLERS
// ═══════════════════════════════════════════════════════
function handleInput(el){
  const key=el.dataset.key;
  if(key&&key.startsWith("nihssItems.")){
    const sub=key.split(".")[1];
    d.nihssItems[sub]=el.value;
  } else if(key){
    d[key]=el.value;
  }
  render();
}

function handleYesNo(key,val){
  d[key]=val;
  // Limpieza de dependencias
  if(key==="tiempoDesconocido"){d.lkw="";d.llegada="";}
  if(key==="heparina"&&!val) d.heparinaIV=null;
  if(key==="hicPrevio"&&!val) d.hicPrevioReciente=null;
  if(key==="lvo"&&!val) d.territorioLVO="";
  render();
}

function handleMismatchMode(val){
  d.mismatchMode=val;
  if(val!=="auto") d.mismatchAutoConfirm=false;
  render();
}

function handleNihssMode(mode){
  d.nihssMode=mode;
  render();
}

function handleNihssBtn(key,val){
  d.nihssItems[key]=String(val);
  render();
}

function handleMismatchCheck(checked){
  d.mismatchAutoConfirm=checked;
  render();
}

function nextStep(){
  if(canNext()&&step<5){step++;render();}
}
function prevStep(){
  if(step>0){step--;render();}
}
function resetAll(){
  step=0;
  d=JSON.parse(JSON.stringify(INITIAL));
  render();
}

// ═══════════════════════════════════════════════════════
// RENDER PASOS
// ═══════════════════════════════════════════════════════
function renderStep0(){
  const c=calcAll();
  const vi=c.vi;
  let html=`<div style="font-size:18px;font-weight:700;margin-bottom:20px;color:#e2e8f0">📋 Datos del Paciente</div>`;
  html+=`<div class="grid2">
    ${field("Edad (años)",input("edad","number","min=0 max=120"))}
    ${field("Peso (kg)",input("peso","number","min=0 max=250"))}
  </div>`;
  html+=field("¿Tiempo de inicio desconocido o wake-up stroke?",yesno("tiempoDesconocido"),"Selecciona Sí si el paciente despertó con déficit o no se conoce la hora exacta");

  if(d.tiempoDesconocido===false){
    html+=field("Hora última vez visto bien (LKW)",input("lkw","time"),"Formato HH:MM");
    html+=field("Hora llegada al hospital",input("llegada","time"),"Formato HH:MM");
  }
  if(d.tiempoDesconocido===true){
    html+=alertBox("<strong>Wake-up stroke / tiempo desconocido</strong> — Elegibilidad para fibrinólisis basada en: (A) DWI-FLAIR mismatch en RM, (B) ≤9h desde el punto medio del sueño + mismatch de perfusión (AHA/ASA 2026 nueva Clase IIa), o (C) reconocimiento de síntomas hace menos de 4.5h. Trombectomía según DAWN/DEFUSE-3.","#a855f7","⏰");
  }
  if(vi&&d.tiempoDesconocido!==true){
    const vh=vi.h;
    const hh=Math.floor(vh), mm=Math.round((vh%1)*60);
    let msg="";
    if(vi.zona==="temprana") msg="✅ Ventana estándar ≤4.5h — fibrinólisis indicada si sin contraindicaciones";
    else if(vi.zona==="extendida") msg="🟡 Ventana extendida 4.5–9h — fibrinólisis con mismatch (EXTEND/ECASS-4/EPITHET, AHA/ASA 2026 Clase IIa); condicional sin mismatch";
    else if(vi.zona==="tardia") msg="🟠 Ventana tardía 9–24h — fibrinólisis NO indicada; trombectomía si mismatch de perfusión";
    else msg="🔴 >24h — fibrinólisis contraindicada; trombectomía no indicada";
    html+=`<div style="background:#0f172a;border:1px solid ${vi.color}44;border-radius:10px;padding:14px">
      <div style="font-size:13px;color:#64748b;margin-bottom:4px">Tiempo desde inicio de síntomas</div>
      <div style="font-size:22px;font-weight:800;color:${vi.color}">${hh}h ${mm}min <span style="font-size:13px;font-weight:500;color:#94a3b8">(${vi.label})</span></div>
      <div style="margin-top:10px;font-size:13px;padding:8px 10px;border-radius:7px;background:${vi.color}15;color:${vi.color};font-weight:600">${msg}</div>
    </div>`;
  }
  return html;
}

function renderStep1(){
  const c=calcAll();
  const nihssN=c.nihssN;
  const cat=nihssCategory(nihssN);
  let html=`<div style="font-size:18px;font-weight:700;margin-bottom:20px;color:#e2e8f0">🔢 Gravedad Neurológica — NIHSS</div>`;

  html+=`<div style="display:flex;gap:10px;margin-bottom:20px">
    <button class="mode-btn ${d.nihssMode==="manual"?"active":""}" onclick="handleNihssMode('manual')">✏️ NIHSS Manual</button>
    <button class="mode-btn ${d.nihssMode==="auto"?"active":""}" onclick="handleNihssMode('auto')">🧮 NIHSS Automático por ítems</button>
  </div>`;

  if(d.nihssMode==="manual"){
    html+=field("Puntuación NIHSS (0–42)",input("nihss","number","min=0 max=42"),"Introducir valor numérico total");
  } else {
    html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:12px;font-weight:700;color:#0ea5e9;margin-bottom:14px;letter-spacing:1px">ÍTEMS NIHSS</div>`;
    NIHSS_ITEMS.forEach(item=>{
      html+=`<div class="nihss-item"><div class="nihss-item-head">
        <div class="nihss-item-info">
          <div class="ni-label">${item.label}</div>
          <div class="ni-hint">${item.hint}</div>
        </div>
        <div class="nihss-btns">`;
      for(let i=0;i<=item.max;i++){
        const active=d.nihssItems[item.key]===String(i)?"active":"";
        html+=`<button class="nihss-btn ${active}" onclick="handleNihssBtn('${item.key}',${i})">${i}</button>`;
      }
      html+=`</div></div></div>`;
    });
    const total=nihssAllFilled()?calcNihssAuto():"—";
    html+=`<div class="nihss-total">
      <span style="font-size:13px;color:#0ea5e9;font-weight:700">NIHSS Total calculado</span>
      <span style="font-size:24px;font-weight:800;color:#0ea5e9">${total}</span>
    </div>`;
    if(!nihssAllFilled()) html+=`<div style="font-size:11px;color:#64748b;margin-top:6px;text-align:center">Completa todos los ítems para obtener el total</div>`;
    html+=`</div>`;
  }

  const nihssShowCat=(d.nihssMode==="manual"&&d.nihss!=="")|(d.nihssMode==="auto"&&nihssAllFilled());
  if(nihssShowCat){
    let msg="";
    if(nihssN===0) msg="Sin déficit detectable. Si déficit incapacitante (afasia, hemianopsia...) → fibrinólisis puede indicarse igualmente.";
    else if(nihssN<=3) msg="Ictus menor. Si sin déficit incapacitante → DAPT indicada (AHA/ASA 2026). Evaluar incapacidad para decidir fibrinólisis.";
    else if(nihssN<=5) msg="Ictus leve. Fibrinólisis indicada en ventana ≤4.5h. Estrategia THALES para antiagregación.";
    else if(nihssN<=14) msg="Ictus moderado. Fibrinólisis indicada. Evaluar LVO para trombectomía.";
    else msg="Ictus grave. Sin límite superior de NIHSS para fibrinólisis (Clase I). Trombectomía si LVO.";
    const emoji=nihssN===0?"✅":nihssN<=3?"🟢":nihssN<=5?"🟡":nihssN<=14?"🟠":"🔴";
    html+=`<div style="background:#0f172a;border:1px solid ${cat.color}44;border-radius:10px;padding:16px;margin-top:8px;margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-size:13px;color:#64748b">Clasificación automática</div>
          <div style="font-size:24px;font-weight:800;color:${cat.color}">${nihssN} — ${cat.label}</div>
        </div>
        <div style="font-size:38px">${emoji}</div>
      </div>
      <div style="margin-top:12px;padding:8px 10px;border-radius:7px;background:${cat.color}15;font-size:12px;color:${cat.color}">${msg}</div>
    </div>`;
  }

  html+=field("¿El déficit neurológico es incapacitante?",yesno("deficitIncapacitante"),"Afasia, hemianopsia, paresia u otro déficit que impida actividades básicas aunque NIHSS sea bajo");

  if(nihssN<4&&d.deficitIncapacitante===true)
    html+=alertBox(`NIHSS ${nihssN} con déficit incapacitante → fibrinólisis indicable (ESO 2023). Trombectomía posible si LVO.`,"#22c55e","ℹ️");
  if(nihssN<4&&d.deficitIncapacitante===false)
    html+=alertBox(`NIHSS ${nihssN} sin déficit incapacitante → fibrinólisis NO recomendada (AHA/ASA 2026). DAPT indicada. Monitorizar.`,"#0ea5e9","ℹ️");

  return html;
}

function renderStep2(){
  const c=calcAll();
  let html=`<div style="font-size:18px;font-weight:700;margin-bottom:20px;color:#e2e8f0">🖥️ Neuroimagen</div>`;

  // TAC
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:16px">
    <div class="section-title" style="color:#0ea5e9">TAC CRANEAL URGENTE</div>`;
  html+=field("¿Hemorragia intracraneal en TAC?",yesno("hemorragia"));

  html+=field("¿Signos precoces de infarto extenso (hipodensidad >1/3 ACM)?",yesno("signosExtensosInfarto"));
  html+=field("ASPECTS (0–10)",input("aspects","number","min=0 max=10"),"Alberta Stroke Program Early CT Score");

  if(d.aspects!==""){
    const a=parseInt(d.aspects)??0;
    const col=a>=7?"#22c55e":a===6?"#eab308":a>=3?"#f97316":"#ef4444";
    const lbl=a>=8?"Favorable ≥8":a===7?"Moderado 7 — valorar":a===6?"Alto riesgo 6 — relativa (no absoluta)":a>=3?"3–5 — condicional para EVT (centros expertos)":"≤2 — contraindicación absoluta";
    html+=`<div style="margin-top:8px">${chip(col,`ASPECTS ${d.aspects} — ${lbl}`)}</div>`;
    if(a<=2) html+=alertBox(`ASPECTS ${a} ≤2 — contraindicación ABSOLUTA para fibrinólisis y trombectomía.`,"#ef4444","🛑");
    else if(a<=5&&a>=3) html+=alertBox(`ASPECTS ${a} (3–5) — contraindicación ABSOLUTA para fibrinólisis. Para trombectomía: en centros expertos con mismatch de perfusión (SELECT2, TENSION, ANGEL-ASPECT — AHA/ASA 2026). Decisión individualizada.`,"#f97316","⚠️");
    else if(a===6) html+=alertBox("ASPECTS 6 — contraindicación RELATIVA (no absoluta). Fibrinólisis posible con precaución (ESO 2023).","#eab308","⚠️");
    else html+=alertBox(`ASPECTS ${a} — favorable. No contraindica fibrinólisis ni trombectomía.`,"#22c55e","ℹ️");
  }
  html+=`</div>`;

  // AngioCT
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px">
    <div class="section-title" style="color:#0ea5e9">ANGIOTAC / ANGIOTRM</div>`;
  html+=field("¿Oclusión de gran vaso (LVO)?",yesno("lvo"));
  if(d.lvo===true){
    html+=field("Territorio afectado",select("territorioLVO",LVO_OPTIONS));
    if(d.territorioLVO==="basilar"&&c.nihssN>=10)
      html+=alertBox("<strong>Oclusión basilar + NIHSS ≥10:</strong> Trombectomía FUERTEMENTE RECOMENDADA dentro de 24h (AHA/ASA 2026 Clase I, fuerte). Ventana de 24h sin necesidad de mismatch.","#22c55e","🔴");
    if(c.nihssN<6&&d.deficitIncapacitante===true)
      html+=alertBox("LVO con NIHSS <6 y déficit incapacitante — trombectomía puede estar indicada (ESO 2023 Clase B). Valorar individualmente.","#eab308","ℹ️");
  }
  if(d.lvo===false) html+=alertBox("Sin LVO — trombectomía no indicada. Continuar con evaluación de fibrinólisis y tratamiento médico óptimo.","#64748b","ℹ️");
  html+=`</div>`;
  return html;
}

function renderStep3(){
  const c=calcAll();
  const vi=c.vi;
  let html=`<div style="font-size:18px;font-weight:700;margin-bottom:8px;color:#e2e8f0">🩻 Evaluación de Mismatch</div>`;

  if(!c.needPerfusion&&!c.showMismatchExtendida){
    html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:20px;text-align:center">
      <div style="font-size:32px;margin-bottom:8px">⏱️</div>
      <div style="color:#94a3b8;font-size:15px">Ventana temporal: <strong style="color:${vi?.color}">${vi?.label}</strong></div>
      <div style="color:#64748b;font-size:13px;margin-top:8px">En ventana estándar ≤4.5h no es necesario el mismatch para decidir fibrinólisis. Puedes continuar sin este paso.</div>
    </div>`;
    return html;
  }

  const ibColor=vi?.zona==="desconocido"?"#a855f7":vi?.zona==="extendida"?"#eab308":"#f97316";
  let ibMsg="";
  if(vi?.zona==="desconocido") ibMsg="⏰ Wake-up / tiempo desconocido — El mismatch determina elegibilidad para fibrinólisis y trombectomía.";
  else if(vi?.zona==="extendida") ibMsg="🟡 Ventana 4.5–9h — Con mismatch: evidencia Clase IIa (EXTEND/ECASS-4/EPITHET, AHA/ASA 2026). Sin mismatch: Clase IIb, decisión individualizada.";
  else ibMsg=`⚠️ Ventana tardía (${vi?.label}) — Trombectomía solo si mismatch positivo (DAWN/DEFUSE-3). Fibrinólisis IV no indicada de rutina.`;
  html+=infoBox(ibMsg,ibColor);

  // Selector modo
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#0ea5e9">EVALUACIÓN DE MISMATCH</div>`;
  const mOpts=[
    {value:"auto",label:"Mismatch conocido",hint:"Core pequeño y penumbra grande confirmados por radiólogo"},
    {value:"manual",label:"Cálculo manual de mismatch",hint:"Introducir volúmenes de core y penumbra"},
    {value:"ninguno",label:"No hay mismatch",hint:"Sin penumbra salvable significativa o estudio no disponible"}
  ];
  mOpts.forEach(opt=>{
    const active=d.mismatchMode===opt.value?"active":"";
    const dotActive=d.mismatchMode===opt.value?"active":"";
    html+=`<button class="radio-opt ${active}" onclick="handleMismatchMode('${opt.value}')">
      <div style="display:flex;align-items:center;gap:10px">
        <div class="radio-dot ${dotActive}"></div>
        <div><div style="font-weight:600">${opt.label}</div><div style="font-size:11px;color:#64748b;margin-top:2px">${opt.hint}</div></div>
      </div>
    </button>`;
  });
  html+=`</div>`;

  if(d.mismatchMode==="auto"){
    html+=`<div style="background:#22c55e10;border:1px solid #22c55e40;border-radius:10px;padding:14px;margin-bottom:14px">
      <div class="section-title" style="color:#22c55e">MISMATCH CONOCIDO — CONFIRMACIÓN</div>
      <label style="display:flex;align-items:flex-start;gap:12px;cursor:pointer">
        <input type="checkbox" ${d.mismatchAutoConfirm?"checked":""} onchange="handleMismatchCheck(this.checked)" style="width:18px;height:18px;margin-top:2px;cursor:pointer;accent-color:#22c55e"/>
        <span style="font-size:14px;color:#e2e8f0;line-height:1.5">✔ Core pequeño y penumbra grande confirmados (TC-perfusión, RM-DWI/PWI o criterio radiológico)</span>
      </label>`;
    if(d.mismatchAutoConfirm) html+=alertBox("Mismatch confirmado → tratamiento en ventana extendida indicado.","#22c55e","✅");
    else html+=alertBox("Marca el checkbox para confirmar el mismatch.","#64748b","ℹ️");
    html+=`</div>`;
  }

  if(d.mismatchMode==="manual"){
    html+=`<div style="background:#0ea5e910;border:1px solid #0ea5e930;border-radius:10px;padding:14px;margin-bottom:14px">
      <div class="section-title" style="color:#0ea5e9">CÁLCULO MANUAL DE MISMATCH</div>
      <div class="grid2">
        ${field("Volumen de core (mL)",input("core","number","min=0"),"Tejido infartado (DWI o CBF <30%)")}
        ${field("Volumen de penumbra (mL)",input("penumbra","number","min=0"),"Tejido en riesgo salvable (Tmax >6s o PWI)")}
      </div>`;
    if(d.core!==""&&d.penumbra!==""){
      const cv=parseFloat(d.core), pv=parseFloat(d.penumbra);
      const diff=pv-cv, ratio=cv>0?pv/cv:Infinity;
      const coreOK=cv<=70, ratioOK=ratio>=1.8, diffOK=diff>=15;
      const ok=coreOK&&ratioOK&&diffOK;
      const topMsg=cv>70?"❌ Core ≥70 mL — fuera de criterios":ok?"✅ Mismatch compatible":"❌ Mismatch no significativo";
      const topCol=ok?"#22c55e":"#ef4444";
      html+=`<div style="background:${topCol}11;border:1px solid ${topCol}44;border-radius:8px;padding:12px;margin-top:4px">
        <div style="font-size:13px;font-weight:700;color:${topCol};margin-bottom:8px">${topMsg}</div>
        <div class="grid3">`;
      [{label:"Core",ok:coreOK,txt:`${cv.toFixed(0)} mL ${coreOK?"≤70":"— excede 70 mL"}`},
       {label:"Ratio",ok:ratioOK,txt:`${cv>0?ratio.toFixed(2):"∞"} ${ratioOK?"≥1.8":"— <1.8"}`},
       {label:"Dif.",ok:diffOK,txt:`${diff.toFixed(0)} mL ${diffOK?"≥15":"— <15"}`}].forEach(item=>{
        const c2=item.ok?"#22c55e":"#ef4444";
        html+=`<div style="background:${c2}15;border:1px solid ${c2}30;border-radius:6px;padding:6px 10px;font-size:12px;color:#94a3b8">
          <div style="color:${c2};font-weight:700;margin-bottom:2px">${item.ok?"✓":"✗"} ${item.label}</div>
          <div>${item.txt}</div>
        </div>`;
      });
      html+=`</div><div style="font-size:11px;color:#64748b;margin-top:8px">Criterios DAWN/DEFUSE-3: core ≤70 mL · ratio ≥1.8 · diferencia ≥15 mL</div></div>`;
    }
    html+=`</div>`;
  }

  if(d.mismatchMode==="ninguno")
    html+=alertBox("Sin mismatch — terapias en ventana extendida no indicadas por criterio de perfusión.","#ef4444","🛑");

  // Wake-up criterios adicionales
  if(vi?.zona==="desconocido"){
    html+=`<div style="background:#a855f715;border:1px solid #a855f740;border-radius:10px;padding:14px;margin-top:12px">
      <div class="section-title" style="color:#a855f7">CRITERIOS ADICIONALES PARA FIBRINÓLISIS EN WAKE-UP / TIEMPO DESCONOCIDO</div>`;
    if(!c.mismatchPositivo){
      html+=field("Opción A — RM: ¿DWI positivo con FLAIR negativo?",yesno("dwiFlarMismatch"),"Indica ictus probable <4.5h. Criterio WAKE-UP trial (Lancet 2018, ESO 2023 Clase IIa)");
    }
    if(d.dwiFlarMismatch===true) html+=alertBox("DWI-FLAIR mismatch → fibrinólisis indicada en wake-up (ESO 2023 / AHA/ASA 2026 Clase IIa).","#22c55e","✅");
    html+=field("Opción B — ¿Síntomas reconocidos hace ≤9h desde el punto medio del sueño estimado?",yesno("wakeUpDentro9h"),"Ej: dormido a medianoche, despertó a las 7h → punto medio 3:30h. Si los síntomas se reconocieron hace ≤9h desde ese punto, puede optar a fibrinólisis si hay mismatch de perfusión (AHA/ASA 2026 nueva Clase IIa)");
    if(d.wakeUpDentro9h===true&&c.mismatchPositivo) html+=alertBox("≤9h desde punto medio sueño + mismatch de perfusión → fibrinólisis indicada (AHA/ASA 2026 nueva Clase IIa).","#22c55e","✅");
    if(d.wakeUpDentro9h===true&&!c.mismatchPositivo) html+=alertBox("≤9h desde punto medio sueño pero sin mismatch de perfusión documentado → se requiere mismatch. Confirmar con TC-perfusión o RM-DWI/PWI.","#eab308","⚠️");
    html+=field("Opción C — ¿El reconocimiento de síntomas fue hace menos de 4.5h?",yesno("sintomasReconocidos45h"),"Si el paciente notó los síntomas hace menos de 4.5h (aunque LKW sea desconocido), es candidato a fibrinólisis si la lesión DWI es <1/3 ACM y FLAIR es negativo (AHA/ASA 2026 Clase IIa)");
    if(d.sintomasReconocidos45h===true) html+=alertBox("Reconocimiento de síntomas <4.5h → candidato a fibrinólisis (AHA/ASA 2026 Clase IIa). Verificar lesión DWI <1/3 ACM y FLAIR negativo.","#22c55e","✅");
    if(d.dwiFlarMismatch===false&&!c.mismatchPositivo&&d.wakeUpDentro9h===false&&d.sintomasReconocidos45h===false)
      html+=alertBox("Ningún criterio de fibrinólisis wake-up cumplido → fibrinólisis no indicada. Valorar trombectomía si LVO.","#ef4444","🛑");
    html+=`</div>`;
  }
  return html;
}

function renderStep4(){
  const c=calcAll();
  let html=`<div style="font-size:18px;font-weight:700;margin-bottom:20px;color:#e2e8f0">⚠️ Contraindicaciones y Evaluación Farmacológica</div>`;

  // Hemodinámica
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#f97316">HEMODINÁMICA</div>
    <div class="grid2">
      ${field("PAS (mmHg)",input("pas","number","min=0"))}
      ${field("PAD (mmHg)",input("pad","number","min=0"))}
    </div>`;
  if(d.pas&&d.pad&&(c.pasN>185||c.padN>110))
    html+=alertBox(`PA ${d.pas}/${d.pad} mmHg — supera umbral para fibrinólisis (185/110 mmHg). Controlar con: Labetalol 10–20 mg IV · Nicardipino 5 mg/h IV · Urapidilo 25 mg IV.`);
  html+=`</div>`;

  // Laboratorio
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#f97316">LABORATORIO</div>
    <div class="grid3">
      ${field("Plaquetas (×10³/μL)",input("plaquetas","number","min=0"))}
      ${field("Glucemia (mg/dL)",input("glucemia","number","min=0"))}
      ${field("INR",input("inr","number","min=0 step=0.1"))}
    </div>`;
  if(c.plaqN<100&&d.plaquetas) html+=alertBox(`Plaquetas ${d.plaquetas} ×10³/μL — contraindicación absoluta (<100.000).`);
  if((c.glucN<60||c.glucN>400)&&d.glucemia) html+=alertBox(`Glucemia ${d.glucemia} mg/dL — fuera de rango seguro (60–400). Corregir antes de fibrinólisis.`);
  if(c.inrN>1.7&&d.inr) html+=alertBox(`INR ${d.inr} — contraindicación absoluta para fibrinólisis si >1.7.${c.avkActivo?" Considerar reversión con vitamina K + CCP.":""}`);
  if(c.avkActivo&&c.inrN<=1.7&&c.inrN>1&&d.inr) html+=alertBox(`INR ${d.inr} con AVK — dentro del rango permisivo (≤1.7). Fibrinólisis posible con mayor vigilancia hemorrágica.`,"#eab308");
  html+=`</div>`;

  // Anticoagulación
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#f97316">ANTICOAGULACIÓN PREVIA</div>
    ${field("Anticoagulante actual",select("anticoagulante",ANTICOAGULANTES),"Selecciona el anticoagulante que está tomando el paciente.")}`;
  if(c.isWarfarina)
    html+=alertBox("Warfarina activa — contraindica fibrinólisis si INR >1.7. Si INR ≤1.7 puede proceder. Vitamina K + CCP disponibles para reversión urgente.","#eab308","⚠️");
  if(c.isDoac){
    html+=`<div style="background:#0ea5e910;border:1px solid #0ea5e930;border-radius:8px;padding:10px 12px;margin-top:4px;margin-bottom:8px">
      <div style="font-size:11px;color:#0ea5e9;font-weight:700;margin-bottom:10px;letter-spacing:1px">EVALUACIÓN ${d.anticoagulante.toUpperCase()} — RIESGO FIBRINÓLISIS</div>
      ${field("¿Última dosis hace <48h?",yesno("doacMenos48h"))}`;
    if(d.doacMenos48h===true){
      if(c.isDabigatran){
        html+=`<div style="background:#a855f715;border:1px solid #a855f740;border-radius:8px;padding:8px 12px;margin-bottom:8px">
          <div style="font-size:11px;color:#a855f7;font-weight:700;margin-bottom:6px">DABIGATRÁN — ANTÍDOTO IDARUCIZUMAB (Praxbind® 5g IV)</div>
          ${field("¿Administrar idarucizumab antes de fibrinólisis?",yesno("idarucizumab"))}`;
        if(d.idarucizumab===true) html+=alertBox("Idarucizumab indicado → administrar y confirmar reversión antes de rtPA.","#22c55e","✓");
        if(d.idarucizumab===false) html+=alertBox("Sin idarucizumab → confirmar aclaramiento con TT/ECT calibrado.","#f97316","⚠️");
        html+=`</div>`;
      }
      if(c.isAntiXa)
        html+=alertBox(`${d.anticoagulante==="rivaroxaban"?"Rivaroxabán":d.anticoagulante==="apixaban"?"Apixabán":"Edoxabán"} reciente — Andexanet alfa disponible en centros seleccionados. Confirmar aclaramiento con anti-Xa calibrado.`,"#f97316","⚠️");
      html+=field("¿Nivel anti-Xa / TT disponible?",yesno("antiXaDisponible"),c.isDabigatran?"TT o ECT calibrado para dabigatrán":"Anti-Xa calibrado para el fármaco específico");
      if(d.antiXaDisponible===true)
        html+=field("¿Nivel dentro de rango normal (actividad anticoagulante descartada)?",yesno("antiXaNormal"));
      if(d.antiXaDisponible===false) html+=alertBox("Nivel no disponible → actividad no descartable. DOAC contraindica fibrinólisis.","#ef4444");
      if(d.antiXaDisponible===true&&d.antiXaNormal===false) html+=alertBox("Nivel anormal → actividad anticoagulante presente. Fibrinólisis contraindicada.","#ef4444");
      if(d.antiXaDisponible===true&&d.antiXaNormal===true) html+=alertBox("Nivel normal → actividad descartada. DOAC no contraindica fibrinólisis.","#22c55e","✓");
    }
    if(d.doacMenos48h===false) html+=alertBox("Última dosis ≥48h → DOAC no contraindica fibrinólisis por este motivo.","#22c55e","✓");
    html+=`</div>`;
  }
  html+=field("¿Heparina reciente?",yesno("heparina"));
  if(d.heparina===true){
    html+=`<div style="margin-left:8px">`;
    html+=field("¿Heparina IV a dosis terapéutica (no solo SC profiláctica)?",yesno("heparinaIV"),"Heparina SC profiláctica NO contraindica fibrinólisis (ESO 2023)");
    if(d.heparinaIV===true)
      html+=field("TTPa actual (segundos)",input("ttpa","number","min=0"),"Normal: 25–35 s. >40 s indica anticoagulación significativa");
    if(d.heparinaIV===false) html+=alertBox("Heparina SC profiláctica — NO contraindica fibrinólisis (ESO 2023).","#22c55e","✓");
    if(d.heparinaIV===true&&c.ttpaE>40) html+=alertBox(`TTPa ${d.ttpa}s >40 — anticoagulación activa. Contraindicación para fibrinólisis.`,"#ef4444");
    if(d.heparinaIV===true&&c.ttpaE<=40&&c.ttpaE>0) html+=alertBox(`TTPa ${d.ttpa}s — dentro de rango. No contraindica fibrinólisis.`,"#22c55e","✓");
    html+=`</div>`;
  }
  html+=`</div>`;

  // Antecedentes
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#f97316">ANTECEDENTES RELEVANTES</div>
    ${field("¿Ictus isquémico en los últimos 3 meses?",yesno("ictusReciente"))}
    ${field("¿Cirugía mayor o TCE grave reciente (<14 días)?",yesno("cirugiaReciente"))}
    ${field("¿Hemorragia activa o coagulopatía grave?",yesno("hemorragiaActiva"))}
    ${field("¿Hemorragia intracraneal previa?",yesno("hicPrevio"))}`;
  if(d.hicPrevio===true){
    html+=`<div style="margin-left:8px">
      ${field("¿Fue hace menos de 3 meses o en localización de alto riesgo?",yesno("hicPrevioReciente"),"Localización de alto riesgo: ganglios basales, tronco, cerebelo")}`;
    if(d.hicPrevioReciente===true) html+=alertBox("HIC previa reciente — contraindicación ABSOLUTA para fibrinólisis.","#ef4444");
    if(d.hicPrevioReciente===false) html+=alertBox("HIC previa antigua (>3 meses) — contraindicación RELATIVA. Valoración individualizada (ESO 2023).","#eab308");
    html+=`</div>`;
  }
  html+=field("¿Estaba el paciente en AAS antes del ictus?",yesno("aasPrevia"));
  html+=`</div>`;

  // Contraindicaciones relativas
  html+=`<div style="background:#0f172a;border:1px solid #eab30844;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#eab308">CONTRAINDICACIONES RELATIVAS PARA FIBRINÓLISIS</div>
    <div style="font-size:11px;color:#64748b;margin-bottom:14px">Ninguna contraindica automáticamente. Se recogen para facilitar la decisión individualizada (ESO 2023, AHA/ASA 2026).</div>
    ${field("¿Embarazo actual?",yesno("embarazo"),"Contraindicación relativa — valorar riesgo vital materno")}
    ${field("¿Crisis epiléptica al inicio del ictus?",yesno("crisisEpileptica"),"Valorar diagnóstico diferencial con Todd postcrítico")}
    ${field("¿IAM reciente (<3 meses)?",yesno("iamReciente"),"Riesgo de rotura miocárdica o hemopericardio")}
    ${field("¿Neoplasia intracraneal conocida?",yesno("neoplasiaCraneal"),"Sin metástasis hemorrágicas = relativa")}
    ${field("¿Sangrado GI o urinario reciente (<21 días)?",yesno("sangradoGIReciente"),"Mayor riesgo hemorrágico sistémico")}
    ${field("¿Endocarditis bacteriana activa?",yesno("endocarditisActiva"),"Riesgo de hemorragia en infartos sépticos")}
  </div>`;

  // Antiagregantes
  html+=`<div style="background:#0f172a;border:1px solid #7c3aed44;border-radius:10px;padding:14px;margin-bottom:14px">
    <div class="section-title" style="color:#a855f7">EVALUACIÓN PARA ANTIAGREGANTES</div>
    ${field("¿Antecedente de hemorragia intracraneal?",yesno("antecedenteHIC"))}
    ${field("¿Insuficiencia hepática grave?",yesno("hepatopatiaGrave"))}
    ${field("¿Bradicardia significativa (<50 lpm)?",yesno("bradicardiaSignificativa"))}
    ${field("¿Bloqueo AV avanzado (2.º–3.er grado sin marcapasos)?",yesno("bloqueoAV"))}
    ${field("¿Disnea grave (EPOC grave u otra causa)?",yesno("disneaGrave"))}
    ${field("¿Hiperuricemia conocida o antecedente de gota?",yesno("hiperuricemia"),"Ticagrelor puede elevar ácido úrico")}
    ${field("¿Stent intracraneal implantado durante trombectomía?",yesno("stentIntracraneal"))}
    ${field("¿Uso de inhibidores CYP2C19?",yesno("inhibidorCYP2C19"),"Reducen eficacia de clopidogrel")}
    ${drugList("Fármacos inhibidores CYP2C19 — reducen eficacia de clopidogrel",CYP2C19_DRUGS,"#eab308")}
    ${field("¿Uso de inhibidores potentes CYP3A4?",yesno("inhibidorCYP3A4"),"Contraindicados con ticagrelor")}
    ${drugList("Fármacos inhibidores potentes CYP3A4 — contraindicados con ticagrelor",CYP3A4_DRUGS,"#a855f7")}
  </div>`;

  // Etiología
  html+=`<div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:14px">
    <div class="section-title" style="color:#0ea5e9">ETIOLOGÍA</div>
    ${field("¿Etiología cardioembólica confirmada o probable? (FA, trombo intracardiaco, valvulopatía, IAM reciente...)",yesno("etiologiaCardioembólica"))}
  </div>`;

  return html;
}

function renderStep5(){
  const c=calcAll();
  const nihssN=c.nihssN;
  const cat=nihssCategory(nihssN);
  const vi=c.vi;
  const nihssDisplay=d.nihssMode==="auto"?(nihssAllFilled()?calcNihssAuto():"—"):(d.nihss||"—");
  const tipoLabel={CLOPI:"AAS + Clopidogrel",TICA:"AAS + Ticagrelor",AAS:"Aspirina en monoterapia"};
  const tipoColor={CLOPI:"#0ea5e9",TICA:"#a855f7",AAS:"#22c55e"};
  const ea=c.estrategiaAA;

  let html=`<div style="text-align:center;margin-bottom:24px">
    <div style="font-size:13px;color:#64748b;margin-bottom:4px">RECOMENDACIÓN TERAPÉUTICA PERSONALIZADA</div>

    <div class="tags">
      ${chip(cat.color,cat.label)}
      ${vi?chip(vi.color,vi.label):""}
      ${d.lvo===true?chip("#a855f7","LVO "+d.territorioLVO):""}
      ${d.aspects?chip(c.aspectsN!==null&&c.aspectsN>=7?"#22c55e":c.aspectsN===6?"#eab308":c.aspectsN>=3?"#f97316":"#ef4444","ASPECTS "+d.aspects):""}
      ${d.deficitIncapacitante===true&&nihssN<4?chip("#eab308","Déficit incapacitante"):""}
      ${c.candFib?chip("#ef4444","⏰ TAC 24h obligatorio"):""}
      ${vi?.zona==="desconocido"?chip("#a855f7","⏰ Wake-up"):""}
      ${c.candFibWakeUp?chip("#22c55e","Mismatch wake-up ✓"):""}
      ${c.fibExtendidaMismatch?chip("#22c55e","Mismatch extendida ✓"):""}
      ${c.basilarDentro24h?chip("#22c55e","Basilar Clase I"):""}
      ${c.aspectsTrombCond&&d.lvo===true?chip("#f97316","ASPECTS condicional"):""}
    </div>
  </div>`;

  // SCORES
  html+=`<div class="section-box">
    <div class="section-title" style="color:#0ea5e9">📊 Scores Clínicos</div>
    <div class="grid2">
      <div class="score-card" style="background:${c.riesgoHem.color}11;border:1px solid ${c.riesgoHem.color}40">
        <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Riesgo Hemorrágico</div>
        <div style="font-size:20px;font-weight:800;color:${c.riesgoHem.color}">${c.riesgoHem.label}</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">Score ${c.scoreHem}/5</div>
        <div style="margin-top:8px;font-size:11px;color:#94a3b8">
          ${c.edadN>80?"<div>⚠ Edad >80</div>":""}
          ${nihssN>15?"<div>⚠ NIHSS >15</div>":""}
          ${c.glucN>180?"<div>⚠ Glucosa >180 mg/dL</div>":""}
          ${c.pasN>180?"<div>⚠ PAS >180 mmHg</div>":""}
          ${c.aspectsIntroducido&&c.aspectsN!==null&&c.aspectsN<7&&c.aspectsN>0?"<div>⚠ ASPECTS <7</div>":""}
          ${c.scoreHem===0?"<div style='color:#22c55e'>✓ Sin factores de riesgo adicionales</div>":""}
        </div>
      </div>
      <div class="score-card" style="background:${c.pronostico.color}11;border:1px solid ${c.pronostico.color}40">
        <div style="font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Pronóstico Funcional</div>
        <div style="font-size:20px;font-weight:800;color:${c.pronostico.color}">${c.pronostico.label}</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">Score ${c.pronoScore} pts</div>
        <div style="margin-top:6px;font-size:11px;color:#94a3b8;line-height:1.5">${c.pronostico.desc}</div>
      </div>
    </div>
    ${c.scoreHem>=4?alertBox(`Score hemorrágico ALTO (${c.scoreHem}/5) — Riesgo elevado de transformación hemorrágica sintomática post-fibrinólisis.`,"#ef4444","🔴"):""}
    ${c.contraRel.length>0?`<div style="margin-top:8px"><div style="font-size:11px;color:#eab308;font-weight:700;margin-bottom:4px;letter-spacing:0.5px">SITUACIONES RELATIVAS PRESENTES</div>${c.contraRel.map(cr=>alertBox(cr,"#eab308","ℹ️")).join("")}</div>`:""}
  </div>`;

  // REPERFUSIÓN
  const fibColor=c.candFib?"#22c55e":c.candFibCondicional||vi?.zona==="desconocido"?"#eab308":"#ef4444";
  const fibEmoji=c.candFib?"✅":c.candFibCondicional||vi?.zona==="desconocido"?"🟡":"❌";
  const trombColor=c.candTromb?"#22c55e":c.aspectsTrombCond&&d.lvo===true?"#f97316":"#ef4444";
  const trombEmoji=c.candTromb?"✅":c.aspectsTrombCond&&d.lvo===true?"🟡":"❌";

  let fibLabel="No candidato";
  if(c.candFibEstandar) fibLabel="Candidato (ventana estándar ≤4.5h)";
  else if(c.candFibWakeUpA) fibLabel="Candidato wake-up (DWI-FLAIR ✓)";
  else if(c.candFibWakeUpB) fibLabel="Candidato wake-up (≤9h+mismatch ✓)";
  else if(c.candFibWakeUpC) fibLabel="Candidato wake-up (reconoc. <4.5h ✓)";
  else if(c.fibExtendidaMismatch) fibLabel="Candidato extendido (mismatch ✓)";
  else if(c.fibCondicionalViable) fibLabel="Condicional (4.5–9h)";
  else if(c.candFibCondicional) fibLabel="Valorar individualmente";
  else if(vi?.zona==="desconocido") fibLabel="Requiere criterio wake-up";

  let trombLabel=c.candTromb?(c.basilarDentro24h?"Candidato (basilar Clase I)":c.aspectsTrombCond?"Condicional (ASPECTS 3–5)":"Candidato"):"No candidato";

  html+=`<div class="section-box">
    <div class="section-title" style="color:#22c55e">1️⃣ Reperfusión Cerebral</div>
    <div class="grid2" style="margin-bottom:4px">
      <div style="background:${fibColor}11;border:1px solid ${fibColor}44;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;margin-bottom:4px">${fibEmoji}</div>
        <div style="font-weight:700;font-size:14px;color:${fibColor}">Fibrinólisis IV</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">${fibLabel}</div>
      </div>
      <div style="background:${trombColor}11;border:1px solid ${trombColor}44;border-radius:10px;padding:14px;text-align:center">
        <div style="font-size:28px;margin-bottom:4px">${trombEmoji}</div>
        <div style="font-weight:700;font-size:14px;color:${trombColor}">Trombectomía</div>
        <div style="font-size:11px;color:#64748b;margin-top:4px">${trombLabel}</div>
      </div>
    </div>
    ${motivoBox(c.candFib,c.motivoFib)}
    ${motivoBox(c.candTromb,c.motivoTromb)}
    ${c.candFib?`<div style="background:#ef444415;border:1px solid #ef444444;border-radius:8px;padding:10px 14px;margin-top:12px;font-size:13px;color:#ef4444;font-weight:600">🛑 No iniciar antiagregación hasta TAC de control a las 24h sin hemorragia</div>`:""}
    ${c.candFib&&c.candTromb?alertBox("<strong>Estrategia puente:</strong> Iniciar fibrinólisis IV y activar simultáneamente la sala de trombectomía. No retrasar fibrinólisis por esperar trombectomía.","#a855f7","🔗"):""}
    ${c.basilarDentro24h?alertBox("<strong>Oclusión basilar + NIHSS ≥10:</strong> Trombectomía FUERTEMENTE RECOMENDADA dentro de 24h (AHA/ASA 2026 Clase I). Sin necesidad de mismatch.","#22c55e","🔴"):""}
    ${c.aspectsTrombCond&&d.lvo===true?alertBox(`<strong>ASPECTS ${d.aspects} (3–5):</strong> EVT condicional. Considerar en centros expertos con mismatch de perfusión (SELECT2, TENSION, ANGEL-ASPECT — AHA/ASA 2026). Decisión multidisciplinar.`,"#f97316","⚠️"):""}
    ${vi?.zona==="extendida"?`<div style="background:#eab30815;border:1px solid #eab30844;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;color:#eab308;line-height:1.6"><strong>🟡 Ventana 4.5–9h:</strong> ${c.fibExtendidaMismatch?"Mismatch confirmado → fibrinólisis Clase IIa (EXTEND/ECASS-4/EPITHET, AHA/ASA 2026).":"Sin mismatch documentado → fibrinólisis condicional (Clase IIb). Decisión individualizada."}</div>`:""}
    ${vi?.zona==="tardia"?`<div style="background:#f9731615;border:1px solid #f9731640;border-radius:8px;padding:10px 14px;margin-top:8px;font-size:13px;color:#f97316;line-height:1.6"><strong>🟠 Ventana 9–24h:</strong> Fibrinólisis IV no indicada de rutina. Trombectomía si mismatch (DAWN/DEFUSE-3)${c.basilarDentro24h?" o basilar con NIHSS ≥10 (AHA/ASA 2026 Clase I)":""}.</div>`:""}
    ${c.doacActivo&&d.doacMenos48h===true?alertBox(`<strong>DOAC reciente (${d.anticoagulante})</strong> — Confirmar aclaramiento antes de fibrinólisis.${c.isDabigatran?" Idarucizumab (5g IV) como antídoto específico.":""}${c.isAntiXa?" Andexanet alfa en centros seleccionados.":""}`,"#ef4444","💊"):""}
    ${c.contraAbsolutas.length>0?`<div style="background:#ef444411;border:1px solid #ef444433;border-radius:8px;padding:12px;margin-top:12px">
      <div style="font-size:12px;font-weight:700;color:#ef4444;margin-bottom:8px">CONTRAINDICACIONES ABSOLUTAS PRESENTES</div>
      ${c.contraAbsolutas.map(ca=>`<div style="font-size:13px;color:#fca5a5;padding:3px 0">• ${ca}</div>`).join("")}
    </div>`:""}
    ${c.candFib?`<div style="background:#0f172a;border:1px solid #22c55e33;border-radius:10px;padding:14px;margin-top:12px">
      <div style="font-size:12px;font-weight:700;color:#22c55e;margin-bottom:4px">DOSIS CALCULADAS (${d.peso} kg)</div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:#22c55e;font-weight:700;margin-bottom:6px">★ Tenecteplasa — 0.25 mg/kg, máx 25 mg (PREFERIDA)</div>
        ${rowItem("Bolo IV único (5–10 segundos)",c.tncDosis+" mg","#22c55e")}
      </div>
      <div style="margin-bottom:12px">
        <div style="font-size:13px;color:#0ea5e9;font-weight:700;margin-bottom:6px">Alteplasa (rtPA) — 0.9 mg/kg, máx 90 mg (alternativa)</div>
        ${rowItem("Dosis total",c.altDosis+" mg","#22c55e")}
        ${rowItem("Bolo IV 10% (1–2 min)",c.altBolo+" mg")}

      </div>
      <div style="font-size:11px;color:#64748b;margin-top:10px">Mantener PA &lt;185/110 mmHg durante infusión y &lt;180/105 mmHg las primeras 24h. No reducir a &lt;140 mmHg (AHA/ASA 2026 Clase III). Monitorización neurológica continua.</div>
    </div>`:""}
    ${c.candTromb?`<div style="background:#0f172a;border:1px solid #a855f733;border-radius:10px;padding:14px;margin-top:12px">
      <div style="font-size:12px;font-weight:700;color:#a855f7;margin-bottom:10px">TROMBECTOMÍA MECÁNICA</div>
      ${rowItem("Territorio",d.territorioLVO,"#c084fc")}
      ${rowItem("Ventana",vi?.label||"")}

      ${c.basilarDentro24h?rowItem("Indicación basilar","NIHSS ≥10 + ≤24h — Clase I AHA/ASA 2026 (sin mismatch obligatorio)","#22c55e"):""}

      ${c.lvoConDeficit?rowItem("Indicación","LVO con déficit incapacitante (NIHSS <6) — ESO 2023 Clase B","#eab308"):""}
      ${d.stentIntracraneal===true?rowItem("Stent intracraneal","Sí → DAPT obligatoria","#f97316"):""}
      <div style="font-size:11px;color:#64748b;margin-top:10px">Activar código ictus. Neurointervencionismo urgente. Tiempo aguja-ingle &lt;60 min (objetivo).</div>
    </div>`:""}
    ${!c.candFib&&!c.candFibCondicional&&!c.candTromb&&vi?.zona!=="desconocido"?`<div style="background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px;margin-top:12px;text-align:center;color:#94a3b8;font-size:14px">
      No procede tratamiento de reperfusión.<br>Tratamiento médico óptimo: antiagregación, estatinas, control PA, glucemia, temperatura.
    </div>`:""}
  </div>`;

  // ANTIAGREGACIÓN
  html+=`<div class="section-box" style="border-color:${tipoColor[ea.tipo]}33">
    <div class="section-title" style="color:${tipoColor[ea.tipo]}">2️⃣ Antiagregación</div>
    <div style="background:${tipoColor[ea.tipo]}15;border:1px solid ${tipoColor[ea.tipo]}40;border-radius:10px;padding:14px 16px;margin-bottom:14px">
      <div style="font-size:11px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Estrategia recomendada</div>
      <div style="font-size:22px;font-weight:800;color:${tipoColor[ea.tipo]};margin-bottom:10px">${tipoLabel[ea.tipo]}</div>
      <div style="font-size:13px;margin-bottom:${ea.alt?6:0}px"><span style="color:#64748b">Motivo: </span><span style="color:#e2e8f0">${ea.motivo}</span></div>
      ${ea.alt?`<div style="font-size:13px"><span style="color:#64748b">Alternativa: </span><span style="color:#94a3b8">${ea.alt}</span></div>`:""}
    </div>
    ${ea.tipo==="CLOPI"?rowItem("Carga",ea.stent?"AAS 300 mg + Clopidogrel 300 mg (urgente)":"AAS 300 mg + Clopidogrel 300 mg","#0ea5e9")+""+rowItem("Mantenimiento","AAS 100 mg/día + Clopidogrel 75 mg/día")+rowItem("Duración",ea.stent?"≥3–6 meses (stent intracraneal), luego monoterapia":"21 días, luego monoterapia"):""}
    ${ea.tipo==="TICA"?rowItem("Carga","AAS 300 mg + Ticagrelor 180 mg","#a855f7")+rowItem("Mantenimiento","AAS 100 mg/día + Ticagrelor 90 mg/12h")+rowItem("Duración ticagrelor","30 días (THALES), luego monoterapia"):""}
    ${ea.tipo==="AAS"?rowItem("Carga",d.aasPrevia===true?"No recargar — continuar mantenimiento":"160–300 mg VO o IV","#22c55e")+rowItem("Mantenimiento","100 mg/día"):""}
    ${rowItem("Inicio",c.candFib?"Tras TAC 24h sin hemorragia":"Primeras 24h",c.candFib?"#ef4444":"#22c55e")}
    ${c.advertencias.length>0?`<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:#f97316;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Advertencias clínicas</div>${c.advertencias.map(a=>alertBox(a)).join("")}</div>`:""}
  </div>`;

  // ANTICOAGULACIÓN
  html+=`<div class="section-box">
    <div class="section-title" style="color:#0ea5e9">3️⃣ Anticoagulación</div>`;
  if(d.etiologiaCardioembólica===true){
    html+=infoBox("Etiología cardioembólica → Anticoagulación oral indicada. Inicio según regla 1-3-6-12 (ESO/EHRA 2023).");
    html+=rowItem("Inicio recomendado",c.inicioAC||"","#22c55e");
    html+=`<div style="margin-top:10px"><div style="font-size:12px;color:#64748b;margin-bottom:8px">DOAC DE ELECCIÓN (superioridad sobre AVK en FA)</div>`;
