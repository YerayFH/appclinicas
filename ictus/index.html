    html+=rowItem("Rivaroxabán","20 mg/día con cena (15 mg si FGe 15–49)");
    html+=rowItem("Dabigatrán","150 mg/12h (110 mg si ≥80 años o riesgo hem. alto)");
    html+=rowItem("Edoxabán","60 mg/día (30 mg si ≤60 kg o FGe 15–50)");
    html+=`</div><div style="font-size:11px;color:#64748b;margin-top:8px">TAC de control antes de iniciar. Si infarto extenso o HT hemorrágica, esperar hasta ausencia de transformación hemorrágica significativa.</div>`;
  } else {
    html+=`<div style="color:#64748b;font-size:14px;text-align:center;padding:8px">No indicada (etiología no cardioembólica o no confirmada). Completar estudio etiológico.</div>`;
  }
  html+=`</div>`;

  // ESTATINAS
  html+=`<div class="section-box">
    <div class="section-title" style="color:#0ea5e9">4️⃣ Estatinas de Alta Intensidad</div>
    ${rowItem("Atorvastatina","80 mg/día","#0ea5e9")}
    ${rowItem("Rosuvastatina","20–40 mg/día","#0ea5e9")}
    ${rowItem("Inicio","Primeras 24–48h","#22c55e")}
    <div style="font-size:11px;color:#64748b;margin-top:8px">Inicio independiente del LDL basal. Clase I (ESC 2021, AHA/ASA 2026). Objetivo LDL &lt;55 mg/dL a largo plazo.</div>
  </div>`;

  // CONTROL HEMODINÁMICO
  const pasAlerta=c.candFib&&(c.pasN>185||c.padN>110);
  const paOK=!c.candFib&&c.pasN<=220&&c.padN<=120&&d.pas;
  const paAlta=!c.candFib&&(c.pasN>220||c.padN>120)&&d.pas;
  html+=`<div class="section-box">
    <div class="section-title" style="color:#0ea5e9">5️⃣ Control Hemodinámico y Metabólico</div>
    ${rowItem("PA antes fibrinólisis","< 185/110 mmHg",c.candFib?"#f97316":"#64748b")}
    ${rowItem("PA después fibrinólisis (24h)","< 180/105 mmHg (objetivo permisivo)",c.candFib?"#0ea5e9":"#64748b")}
    ${rowItem("⚠ Objetivo PA < 140 mmHg","CONTRAINDICADO tras fibrinólisis (AHA/ASA 2026 Clase III)","#ef4444")}
    ${rowItem("PA sin fibrinólisis","Tratar solo si > 220/120 mmHg (permisiva)")}
    ${rowItem("PA tras trombectomía exitosa","< 180/105 mmHg (primeras 24h)",c.candTromb?"#0ea5e9":"#64748b")}
    ${rowItem("⚠ PA < 140 mmHg post-EVT","No reducir en primeras 72h (AHA/ASA 2026 Clase III)","#ef4444")}
    ${rowItem("Antihipertensivos IV","Labetalol · Nicardipino · Urapidilo","#0ea5e9")}
    ${rowItem("Glucemia objetivo","140–180 mg/dL","#0ea5e9")}
    ${rowItem("⚠ Control intensivo glucosa","NO recomendado (AHA/ASA 2026 Clase III)","#ef4444")}
    ${rowItem("Temperatura","Tratar fiebre > 37.5 °C con paracetamol 1 g")}
    ${rowItem("Saturación O₂","Mantener SpO₂ ≥ 94%")}
    ${pasAlerta?alertBox(`PA actual ${d.pas}/${d.pad} mmHg — controlar con labetalol/nicardipino/urapidilo IV antes de iniciar fibrinólisis.`,"#ef4444","🛑"):""}
    ${paOK?alertBox(`PA ${d.pas}/${d.pad} mmHg — rango permisivo. No requiere tratamiento urgente.`,"#22c55e","✓"):""}
    ${paAlta?alertBox(`PA ${d.pas}/${d.pad} mmHg — supera 220/120 mmHg. Tratar con antihipertensivo IV gradual.`,"#ef4444","⚠️"):""}
  </div>`;

  // JUSTIFICACIÓN
  html+=`<div class="section-box">
    <div class="section-title" style="color:#0ea5e9">6️⃣ Justificación Clínica</div>
    <div style="font-size:13px;color:#94a3b8;line-height:1.8">
      ${c.candFibEstandar?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Fibrinólisis estándar</strong> — ${c.motivoFib}</p>`:""}
      ${c.candFibWakeUp?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Fibrinólisis wake-up</strong> — ${c.motivoFib}</p>`:""}
      ${c.fibCondicionalViable&&!c.candFibEstandar&&!c.candFibWakeUp?`<p style="margin:0 0 8px">🟡 <strong style="color:#f1f5f9">Fibrinólisis condicional/extendida</strong> — ${c.motivoFib}</p>`:""}
      ${!c.candFib&&!c.candFibCondicional?`<p style="margin:0 0 8px">❌ <strong style="color:#f1f5f9">Fibrinólisis no indicada</strong> — ${c.motivoFib}</p>`:""}
      ${c.candTromb?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Trombectomía indicada</strong> — ${c.motivoTromb}</p>`:""}
      ${!c.candTromb?`<p style="margin:0 0 8px">❌ <strong style="color:#f1f5f9">Trombectomía no indicada</strong> — ${c.motivoTromb}</p>`:""}
      <p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Antiagregación</strong> — ${ea.motivo}</p>
      ${d.etiologiaCardioembólica===true?`<p style="margin:0 0 8px">✅ <strong style="color:#f1f5f9">Anticoagulación</strong> — Fuente cardioembólica identificada. ${c.inicioAC||""} (ESO/EHRA 2023, NIHSS ${nihssN}).</p>`:""}
      <p style="margin:0 0 8px">📊 <strong style="color:#f1f5f9">Riesgo hemorrágico</strong> — ${c.riesgoHem.label} (${c.scoreHem}/5).${c.scoreHem>=4?" ⚠️ Alerta: riesgo alto.":""}</p>
      <p style="margin:0 0 8px">🎯 <strong style="color:#f1f5f9">Pronóstico funcional</strong> — ${c.pronostico.label}. ${c.pronostico.desc}</p>
      <p style="margin:0">📋 <strong style="color:#f1f5f9">Estatinas</strong> — inicio precoz independiente del LDL. Objetivo &lt;55 mg/dL (ESC 2021, AHA/ASA 2026).</p>
    </div>
  </div>`;

  // Footer app
  html+=`<div class="footer-app">
    ⚕️ Herramienta de apoyo a la decisión clínica para profesionales sanitarios.<br>
    Validada según Guías ESO 2021/2023 · AHA/ASA 2026 · WAKE-UP · EXTEND · DAWN/DEFUSE-3 · SEN · SEMES<br>
    No sustituye el juicio clínico del facultativo responsable. Verificar datos antes de prescribir.<br>
    Farmacia Hospitalaria · Hospital Universitario Puerto Real
  </div>`;

  html+=`<button onclick="resetAll()" style="width:100%;margin-top:16px;padding:14px;background:#1e293b;border:1px solid #334155;border-radius:10px;color:#94a3b8;font-size:15px;font-weight:600">🔄 Nuevo Paciente</button>`;
  return html;
}

// ═══════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════
function render(){
  const app=document.getElementById("app");
  let html="";

  // Cabecera hospital
  html+=`<div style="text-align:center;font-weight:bold;margin-bottom:16px;color:#e2e8f0;line-height:1.6;letter-spacing:0.5px">
    <div style="font-size:20px;letter-spacing:2px;color:#f1f5f9">FARMACIA HOSPITALARIA</div>
    <div style="font-size:16px;letter-spacing:1px;color:#94a3b8">HOSPITAL UNIVERSITARIO PUERTO REAL</div>
  </div>`;

  // Cabecera app
  html+=`<div style="text-align:center;margin-bottom:28px">
    <div style="display:inline-flex;align-items:center;gap:10px;background:#0f172a;border:1px solid #1e293b;border-radius:40px;padding:8px 20px;margin-bottom:12px">
      <span style="font-size:18px">🧠</span>
      <span style="font-size:13px;font-weight:700;color:#0ea5e9;letter-spacing:1px">ICTUS ISQUÉMICO AGUDO</span>
    </div>
    <h1>Motor de Decisión Terapéutica</h1>
    <p style="font-size:13px;color:#64748b;margin:0">Herramienta clínica para profesionales sanitarios · Guías ESO 2023 / AHA-ASA 2026</p>
  </div>`;

  // Barra de progreso
  if(step<5){
    const pct=(step/4)*100;
    html+=`<div class="progress-bar-wrap">
      <div class="progress-steps">`;
    for(let i=0;i<5;i++){
      const circ=i<step?"✓":(i+1).toString();
      const bg=i<=step?"#0ea5e9":"#1e293b";
      const bc=i<=step?"#0ea5e9":"#334155";
      const fc=i<=step?"#fff":"#64748b";
      html+=`<div class="progress-step">
        <div class="step-circle" style="background:${bg};border:2px solid ${bc};color:${fc}">${circ}</div>
        ${step<2?`<div class="step-label" style="color:${i===step?"#0ea5e9":"#64748b"}">${STEPS[i]}</div>`:""}
      </div>`;
    }
    html+=`</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  // Contenido del paso
  if(step===0) html+=renderStep0();
  else if(step===1) html+=renderStep1();
  else if(step===2) html+=renderStep2();
  else if(step===3) html+=renderStep3();
  else if(step===4) html+=renderStep4();
  else html+=renderStep5();

  // Botones de navegación
  if(step<5){
    const ok=canNext();
    const btnStyle=ok
      ?"background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none"
      :"background:#1e293b;color:#475469;border:none;cursor:not-allowed";
    html+=`<div class="nav-btns">
      ${step>0?`<button class="btn-prev" onclick="prevStep()">← Anterior</button>`:""}
      <button onclick="nextStep()" ${ok?"":"disabled"} style="${btnStyle};flex:2;padding:14px;border-radius:10px;font-size:15px;font-weight:700;transition:all .2s">
        ${step===4?"Ver Recomendación →":"Siguiente →"}
      </button>
    </div>`;
  }

  // Footer de autoría
  html+=`<div class="footer-credit">
    <div style="font-size:13px;color:#64748b;font-weight:600">Autor: <span style="color:#94a3b8">Yeray Reyes de la Mata</span></div>
    <div style="font-size:12px;color:#475569">Contacto: <a href="mailto:ydelamata01@gmail.com">ydelamata01@gmail.com</a></div>
  </div>`;

  app.innerHTML=html;
}

// Arranque
render();
</script>
</body>
</html>
